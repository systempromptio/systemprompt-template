tokio.workspace = true

rmcp.workspace = true

axum.workspace = true

schemars.workspace = true
serde.workspace = true
serde_json.workspace = true

tracing.workspace = true

shell-words.workspace = true

systemprompt-mcp-shared.workspace = true

[lints]
workspace = true
