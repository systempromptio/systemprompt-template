name: Bug report
description: Something in the local evaluation template is broken
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve the systemprompt.io evaluation template.
        For production / commercial support, please email support@systemprompt.io.

  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: A clear, one-paragraph description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: How to reproduce
      description: The exact `just` or `systemprompt` commands that trigger it.
      placeholder: |
        1. just build
        2. just setup-local "$ANTHROPIC_KEY" "" ""
        3. ./demo/governance/01-happy-path.sh
      render: shell
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected vs actual
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error logs
      description: Output of `systemprompt infra logs view --level error --since 1h`
      render: shell

  - type: input
    id: os
    attributes:
      label: OS / kernel
      placeholder: "Ubuntu 24.04, macOS 15.2, WSL2 Debian 12, …"
    validations:
      required: true

  - type: input
    id: rustc
    attributes:
      label: rustc version
      placeholder: "rustc 1.82.0 (stable)"
    validations:
      required: true

  - type: input
    id: postgres
    attributes:
      label: PostgreSQL version
      placeholder: "18.1 (Docker image)"
    validations:
      required: true

  - type: input
    id: commit
    attributes:
      label: Template commit SHA
      description: "`git rev-parse HEAD`"
    validations:
      required: true
