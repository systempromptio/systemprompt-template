name: Docker

# Publishes ghcr.io/systempromptio/systemprompt-template on every push to main
# that can change the image, so :latest never goes stale (deploy buttons pull it).

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "docker/**"
      - "demo/**"
      - "src/**"
      - "extensions/**"
      - "services/**"
      - "storage/**"
      - "migrations/**"
      - "web/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".sqlx/**"
      - ".github/workflows/docker.yml"
  workflow_dispatch:

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    name: Build and push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/systempromptio/systemprompt-template
          tags: |
            type=raw,value=latest
            type=sha

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
