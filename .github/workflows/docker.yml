name: Docker

# Publishes ghcr.io/systempromptio/systemprompt-template.
#
# Tag scheme (see docs/RELEASING.md):
#   push to main       -> :edge, :sha-<sha>        (moving development image)
#   release published  -> :X.Y.Z, :X.Y, :X, :latest (multi-arch, signed)
#
# Releases trigger via `release: published` (emitted by release-gateway.yml on
# v* tags), NOT `push: tags` — a push trigger with a paths: filter never
# matches tag pushes (no changed-file diff), which silently skips the build.
#
# Multi-arch is built natively per-arch (amd64 + arm64 runners), pushed by
# digest, then merged into one manifest list — QEMU cross-building the Rust
# workspace is too slow to be practical.

on:
  release:
    types: [published]
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "docker/**"
      - "demo/**"
      - "src/**"
      - "extensions/**"
      - "services/**"
      - "storage/**"
      - "migrations/**"
      - "web/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".sqlx/**"
      - ".github/workflows/docker.yml"
  workflow_dispatch:
    inputs:
      version:
        description: "Force release tags for this semver (X.Y.Z) — rebuild/backfill a release image from the current ref"
        required: false

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/systempromptio/systemprompt-template

jobs:
  build:
    name: Build (${{ matrix.arch }})
    # bridge-v* releases are the client bundle — only gateway v* tags ship images.
    if: github.event_name != 'release' || startsWith(github.event.release.tag_name, 'v')
    strategy:
      fail-fast: true
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE }}

      - uses: docker/build-push-action@v6
        id: build
        with:
          context: .
          platforms: linux/${{ matrix.arch }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge manifest, tag, sign
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write # cosign keyless
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve version override (workflow_dispatch backfill)
        id: over
        env:
          INPUT_VERSION: ${{ inputs.version || '' }}
        run: |
          v="$INPUT_VERSION"
          {
            echo "set=$([ -n "$v" ] && echo true || echo false)"
            echo "full=$v"
            echo "majmin=${v%.*}"
            echo "maj=${v%%.*}"
          } >> "$GITHUB_OUTPUT"

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=edge,branch=main,enable=${{ steps.over.outputs.set == 'false' }}
            type=sha,enable=${{ steps.over.outputs.set == 'false' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=${{ steps.over.outputs.full }},enable=${{ steps.over.outputs.set == 'true' }}
            type=raw,value=${{ steps.over.outputs.majmin }},enable=${{ steps.over.outputs.set == 'true' }}
            type=raw,value=${{ steps.over.outputs.maj }},enable=${{ steps.over.outputs.set == 'true' }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') || steps.over.outputs.set == 'true' }}

      - name: Create and push manifest list
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< '${{ steps.meta.outputs.json }}') \
            $(printf "$IMAGE@sha256:%s " *)

      - name: Resolve manifest digest
        id: digest
        run: |
          digest=$(docker buildx imagetools inspect "$IMAGE:${{ steps.meta.outputs.version }}" --format '{{json .Manifest.Digest}}' | tr -d '"')
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"

      - uses: sigstore/cosign-installer@v3

      - name: Cosign sign (keyless)
        run: cosign sign --yes "$IMAGE@${{ steps.digest.outputs.digest }}"
