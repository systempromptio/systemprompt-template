name: Release (bridge client bundle)

# Publishes the bridge client bundle — precompiled binaries downloaded from
# systempromptio/systemprompt-core and re-attached to a template GH Release.
# The bridge is the CLIENT-side agent that runs on developer workstations
# (macOS, Windows, Linux) and talks to a running systemprompt-gateway.
#
# The gateway itself (the server) is a SEPARATE product published by the
# private systemprompt-deploy repo on `v*` tags. This workflow does not
# produce gateway assets.
#
# Triggered on tags matching `bridge-v*` so the two product streams never
# collide on the same release.

on:
  push:
    tags:
      - "bridge-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Template tag to (re)publish (e.g. bridge-v0.9.0)"
        required: true
      bridge_tag:
        description: "systemprompt-core bridge release tag to bundle (Linux/Win/aarch64-mac)"
        required: true
        default: "bridge-v0.10.0"
      bridge_mac_x64_tag:
        description: "systemprompt-core bridge-mac release tag for Intel macOS zip (blank to skip)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  publish:
    name: Publish bridge client bundle release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tags
        id: tags
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "template_tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "template_tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi
          bridge_tag="${{ inputs.bridge_tag }}"
          echo "bridge_tag=${bridge_tag:-${GITHUB_REF_NAME}}" >> "$GITHUB_OUTPUT"
          echo "bridge_mac_x64_tag=${{ inputs.bridge_mac_x64_tag }}" >> "$GITHUB_OUTPUT"

      - name: Download bridge artifacts from systemprompt-core
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p dist
          gh release download "${{ steps.tags.outputs.bridge_tag }}" \
            --repo systempromptio/systemprompt-core \
            --dir dist \
            --pattern 'systemprompt-bridge-*' \
            --pattern 'SHA256SUMS*'
          mac_tag="${{ steps.tags.outputs.bridge_mac_x64_tag }}"
          if [ -n "$mac_tag" ]; then
            gh release download "$mac_tag" \
              --repo systempromptio/systemprompt-core \
              --dir dist \
              --pattern 'systemprompt-bridge-macos-x64*' || echo "no macOS x64 zip in $mac_tag"
          else
            echo "no bridge_mac_x64_tag supplied; skipping Intel macOS zip"
          fi
          # Rename anything SHA256SUMS* → SHA256SUMS.bridge* so the bridge release
          # never collides semantically with the gateway SHA256SUMS.gateway series.
          cd dist
          [ -f SHA256SUMS ] && mv SHA256SUMS SHA256SUMS.bridge || true
          [ -f SHA256SUMS.sig ] && mv SHA256SUMS.sig SHA256SUMS.bridge.sig || true
          [ -f SHA256SUMS.pem ] && mv SHA256SUMS.pem SHA256SUMS.bridge.pem || true
          ls -la

      - name: Generate release notes
        id: notes
        # Gateway deploy-target matrix lives in docs/README.md (canonical) and in
        # release-gateway.yml's notes — don't duplicate the full table here.
        run: |
          cat > notes.md <<'EOF'
          # systemprompt-bridge ${{ steps.tags.outputs.template_tag }}

          **The workstation agent for the self-owned AI control plane.**
          The bridge connects developer machines and Claude Desktop to a governed
          **systemprompt-gateway**: device auth, code-worktree operations, and a
          native GUI on macOS and Windows. Every request it routes is
          authenticated, authorized, rate-limited, audited, and costed by the
          gateway it points at, so your team keeps using the tools they already
          have while you keep the evidence.

          > Looking for the **gateway** server? It's a separate product published
          > under `v*` tags with 15+ one-click deploy targets (Docker, Helm,
          > Railway, Render, Coolify, and more): see the
          > [latest gateway release](https://github.com/systempromptio/systemprompt-template/releases?q=%22systemprompt-gateway%22)
          > and the [full deploy matrix](https://github.com/systempromptio/systemprompt-template/blob/main/docs/README.md).

          ## Platforms

          Bundles bridge binaries from [systempromptio/systemprompt-core](https://github.com/systempromptio/systemprompt-core):
          Linux x86_64, Windows x86_64, macOS aarch64, all cosign-signed —
          upstream release [${{ steps.tags.outputs.bridge_tag }}](https://github.com/systempromptio/systemprompt-core/releases/tag/${{ steps.tags.outputs.bridge_tag }}).

          ## Install

          - Homebrew (macOS): `brew install systempromptio/tap/bridge`
          - Scoop (Windows): [docs/cowork/scoop.md](https://github.com/systempromptio/systemprompt-template/blob/main/docs/cowork/scoop.md)
          - Manual: [macOS](https://github.com/systempromptio/systemprompt-template/blob/main/docs/cowork/install-macos.md) ·
            [Windows](https://github.com/systempromptio/systemprompt-template/blob/main/docs/cowork/install-windows.md) ·
            [Linux / headless Claude Code](https://github.com/systempromptio/systemprompt-template/blob/main/docs/cowork/claude-code-linux.md)
          - GUI tour and setup wizard: [docs/cowork/desktop-app.md](https://github.com/systempromptio/systemprompt-template/blob/main/docs/cowork/desktop-app.md)

          ## Verify

          Cosign-signed (keyless OIDC, upstream at `systemprompt-core`):

          ```
          cosign verify-blob \
            --certificate-identity-regexp='https://github.com/systempromptio/systemprompt-core/' \
            --certificate-oidc-issuer='https://token.actions.githubusercontent.com' \
            --signature <file>.sig \
            --certificate <file>.pem \
            <file>
          ```

          `SHA256SUMS.bridge` is also signed. See `bin/bridge/CHANGELOG.md` in
          systemprompt-core for the bridge changelog.

          ---

          [systemprompt.io](https://systemprompt.io) ·
          [Documentation](https://github.com/systempromptio/systemprompt-template/blob/main/docs/README.md) ·
          [Discord](https://discord.gg/wkAbSuPWpr) ·
          [Gateway releases](https://github.com/systempromptio/systemprompt-template/releases?q=%22systemprompt-gateway%22)
          EOF

      - name: Create or update template release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.tags.outputs.template_tag }}"
          title="systemprompt-bridge $tag"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" --title "$title" --notes-file notes.md
          else
            gh release create "$tag" \
              --title "$title" \
              --notes-file notes.md
          fi
          gh release upload "$tag" --clobber dist/*
