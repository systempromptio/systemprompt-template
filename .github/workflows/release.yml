name: Release (bundle cowork binaries)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Template tag to (re)publish"
        required: true
      cowork_tag:
        description: "systemprompt-core cowork release tag to bundle (Linux/Win/aarch64-mac)"
        required: true
        default: "v0.3.3"
      cowork_mac_x64_tag:
        description: "systemprompt-core cowork-mac release tag for Intel macOS zip"
        required: true
        default: "cowork-mac-v0.3.2"

permissions:
  contents: write

jobs:
  publish:
    name: Publish template release with cowork bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tags
        id: tags
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "template_tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "template_tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi
          cowork_tag="${{ inputs.cowork_tag }}"
          echo "cowork_tag=${cowork_tag:-v0.3.3}" >> "$GITHUB_OUTPUT"
          mac_tag="${{ inputs.cowork_mac_x64_tag }}"
          echo "cowork_mac_x64_tag=${mac_tag:-cowork-mac-v0.3.2}" >> "$GITHUB_OUTPUT"

      - name: Download cowork artifacts from systemprompt-core
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p dist
          gh release download "${{ steps.tags.outputs.cowork_tag }}" \
            --repo systempromptio/systemprompt-core \
            --dir dist \
            --pattern 'systemprompt-cowork-*' \
            --pattern 'SHA256SUMS*'
          gh release download "${{ steps.tags.outputs.cowork_mac_x64_tag }}" \
            --repo systempromptio/systemprompt-core \
            --dir dist \
            --pattern 'systemprompt-cowork-macos-x64*' || echo "no macOS x64 zip in ${{ steps.tags.outputs.cowork_mac_x64_tag }}"
          ls -la dist

      - name: Generate release notes
        id: notes
        run: |
          cat > notes.md <<EOF
          systemprompt-template ${{ steps.tags.outputs.template_tag }}

          Bundles cowork binaries from systemprompt-core:
          - Linux x86_64, Windows x86_64, macOS aarch64 (cosign-signed) — [${{ steps.tags.outputs.cowork_tag }}](https://github.com/systempromptio/systemprompt-core/releases/tag/${{ steps.tags.outputs.cowork_tag }})
          - macOS x86_64 zip — [${{ steps.tags.outputs.cowork_mac_x64_tag }}](https://github.com/systempromptio/systemprompt-core/releases/tag/${{ steps.tags.outputs.cowork_mac_x64_tag }})

          Binaries are cosign-signed (keyless, OIDC). Verify with:

          \`\`\`
          cosign verify-blob \\
            --certificate-identity-regexp='https://github.com/systempromptio/systemprompt-core/' \\
            --certificate-oidc-issuer='https://token.actions.githubusercontent.com' \\
            --signature <file>.sig \\
            --certificate <file>.pem \\
            <file>
          \`\`\`

          SHA256SUMS is also signed. See \`bin/cowork/CHANGELOG.md\` in systemprompt-core for cowork changelog.
          EOF

      - name: Create or update template release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.tags.outputs.template_tag }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" --notes-file notes.md
          else
            gh release create "$tag" \
              --title "systemprompt-template $tag" \
              --notes-file notes.md
          fi
          gh release upload "$tag" --clobber dist/*
