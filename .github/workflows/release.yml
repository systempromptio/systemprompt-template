name: Release (bridge client bundle)

# Publishes the bridge client bundle — precompiled binaries downloaded from
# systempromptio/systemprompt-core and re-attached to a template GH Release.
# The bridge is the CLIENT-side agent that runs on developer workstations
# (macOS, Windows, Linux) and talks to a running systemprompt-gateway.
#
# The gateway itself (the server) is a SEPARATE product published by the
# private systemprompt-deploy repo on `v*` tags. This workflow does not
# produce gateway assets.
#
# Triggered on tags matching `bridge-v*` so the two product streams never
# collide on the same release.

on:
  push:
    tags:
      - "bridge-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Template tag to (re)publish (e.g. bridge-v0.9.0)"
        required: true
      bridge_tag:
        description: "systemprompt-core bridge release tag to bundle (Linux/Win/aarch64-mac)"
        required: true
        default: "bridge-v0.10.0"
      bridge_mac_x64_tag:
        description: "systemprompt-core bridge-mac release tag for Intel macOS zip (blank to skip)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  publish:
    name: Publish bridge client bundle release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tags
        id: tags
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "template_tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "template_tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi
          bridge_tag="${{ inputs.bridge_tag }}"
          echo "bridge_tag=${bridge_tag:-${GITHUB_REF_NAME}}" >> "$GITHUB_OUTPUT"
          echo "bridge_mac_x64_tag=${{ inputs.bridge_mac_x64_tag }}" >> "$GITHUB_OUTPUT"

      - name: Download bridge artifacts from systemprompt-core
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p dist
          gh release download "${{ steps.tags.outputs.bridge_tag }}" \
            --repo systempromptio/systemprompt-core \
            --dir dist \
            --pattern 'systemprompt-bridge-*' \
            --pattern 'SHA256SUMS*'
          mac_tag="${{ steps.tags.outputs.bridge_mac_x64_tag }}"
          if [ -n "$mac_tag" ]; then
            gh release download "$mac_tag" \
              --repo systempromptio/systemprompt-core \
              --dir dist \
              --pattern 'systemprompt-bridge-macos-x64*' || echo "no macOS x64 zip in $mac_tag"
          else
            echo "no bridge_mac_x64_tag supplied; skipping Intel macOS zip"
          fi
          # Rename anything SHA256SUMS* → SHA256SUMS.bridge* so the bridge release
          # never collides semantically with the gateway SHA256SUMS.gateway series.
          cd dist
          [ -f SHA256SUMS ] && mv SHA256SUMS SHA256SUMS.bridge || true
          [ -f SHA256SUMS.sig ] && mv SHA256SUMS.sig SHA256SUMS.bridge.sig || true
          [ -f SHA256SUMS.pem ] && mv SHA256SUMS.pem SHA256SUMS.bridge.pem || true
          ls -la

      - name: Generate release notes
        id: notes
        run: |
          cat > notes.md <<'EOF'
          # systemprompt-bridge ${{ steps.tags.outputs.template_tag }}

          **Client install bundle for macOS + Windows + Linux.** Installs the
          `systemprompt-bridge` agent on a developer workstation. The bridge talks
          to a running **systemprompt-gateway** for device auth + code-worktree
          operations.

          > Looking for the **gateway** server (to deploy into Kubernetes / Docker /
          > a Linux VM / PaaS)? It's a separate product published under `v*` tags —
          > see [latest gateway release](https://github.com/systempromptio/systemprompt-template/releases?q=%22systemprompt-gateway%22).

          ## What's in this release

          Bundles bridge binaries from [systempromptio/systemprompt-core](https://github.com/systempromptio/systemprompt-core):
          - Linux x86_64, Windows x86_64, macOS aarch64 (cosign-signed) — [${{ steps.tags.outputs.bridge_tag }}](https://github.com/systempromptio/systemprompt-core/releases/tag/${{ steps.tags.outputs.bridge_tag }})

          ## Install

          See [docs/cowork/install-macos.md](https://github.com/systempromptio/systemprompt-template/blob/main/docs/cowork/install-macos.md)
          and [docs/cowork/install-windows.md](https://github.com/systempromptio/systemprompt-template/blob/main/docs/cowork/install-windows.md).

          ## Verify

          Cosign-signed (keyless OIDC, upstream at `systemprompt-core`):

          ```
          cosign verify-blob \
            --certificate-identity-regexp='https://github.com/systempromptio/systemprompt-core/' \
            --certificate-oidc-issuer='https://token.actions.githubusercontent.com' \
            --signature <file>.sig \
            --certificate <file>.pem \
            <file>
          ```

          `SHA256SUMS.bridge` is also signed. See `bin/bridge/CHANGELOG.md` in
          systemprompt-core for the bridge changelog.
          EOF

      - name: Create or update template release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.tags.outputs.template_tag }}"
          title="systemprompt-bridge $tag"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" --title "$title" --notes-file notes.md
          else
            gh release create "$tag" \
              --title "$title" \
              --notes-file notes.md
          fi
          gh release upload "$tag" --clobber dist/*
