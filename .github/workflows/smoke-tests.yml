name: Smoke tests (post-publish)

# Exercises every published install channel against a real release tag.
# Runs automatically when a gateway release is published; dispatchable for
# ad-hoc verification. Ported from systemprompt-deploy (apt/rpm remain
# deferred alongside their publish workflows; helm/nix live with their
# own pipelines).

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to smoke-test (e.g. v0.5.0)"
        required: true

jobs:
  version:
    runs-on: ubuntu-latest
    # bridge-v* releases are the client bundle — only gateway v* tags have
    # the channels below.
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.event.release.tag_name, 'v') }}
    outputs:
      tag: ${{ steps.t.outputs.tag }}
      version: ${{ steps.t.outputs.version }}
    steps:
      - id: t
        run: |
          tag="${{ inputs.tag || github.event.release.tag_name }}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

  ghcr:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - run: |
          docker pull ghcr.io/systempromptio/systemprompt-template:latest
          docker run --rm --entrypoint /app/bin/systemprompt \
            ghcr.io/systempromptio/systemprompt-template:latest --version

  release-tags:
    name: Release tag set + signature
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: sigstore/cosign-installer@v3
      - name: All release tags resolve to one signed multi-arch digest
        env:
          IMAGE: ghcr.io/systempromptio/systemprompt-template
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          # The Docker workflow builds concurrently with this one on the same
          # tag — wait for the versioned tag to appear (max ~40 min).
          for i in $(seq 1 80); do
            docker buildx imagetools inspect "$IMAGE:$VERSION" >/dev/null 2>&1 && break
            sleep 30
          done
          maj="${VERSION%%.*}"; majmin="${VERSION%.*}"
          ref=$(docker buildx imagetools inspect "$IMAGE:$VERSION" --format '{{json .Manifest.Digest}}')
          for tag in "$majmin" "$maj" latest; do
            d=$(docker buildx imagetools inspect "$IMAGE:$tag" --format '{{json .Manifest.Digest}}')
            echo "$IMAGE:$tag -> $d"
            test "$d" = "$ref" || { echo "DIGEST MISMATCH: :$tag != :$VERSION"; exit 1; }
          done
          # Multi-arch: both platforms present.
          docker buildx imagetools inspect "$IMAGE:$VERSION" | grep -q "linux/amd64"
          docker buildx imagetools inspect "$IMAGE:$VERSION" | grep -q "linux/arm64"
          # Keyless signature from the Docker workflow identity.
          cosign verify "$IMAGE@$(echo "$ref" | tr -d '"')" \
            --certificate-identity-regexp "https://github.com/systempromptio/systemprompt-template/.github/workflows/docker.yml@.*" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com

  helm-release:
    name: Helm chart serves the release
    needs: [version, release-tags]
    runs-on: ubuntu-latest
    steps:
      - name: Chart appVersion matches the release
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          helm repo add systemprompt https://charts.systemprompt.io
          # helm.yml publishes concurrently — wait for the index to update.
          for i in $(seq 1 40); do
            helm repo update >/dev/null
            app=$(helm show chart systemprompt/gateway | sed -n 's/^appVersion: "\{0,1\}\([0-9.]*\).*/\1/p')
            [ "$app" = "$VERSION" ] && { echo "chart appVersion: $app"; exit 0; }
            sleep 30
          done
          echo "charts.systemprompt.io never served appVersion $VERSION (last: $app)"
          exit 1

  binary:
    needs: version
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - run: |
          bash scripts/install.sh --version ${{ needs.version.outputs.tag }} --prefix "$HOME/.local"
          "$HOME/.local/bin/systemprompt" --version

  homebrew:
    needs: version
    runs-on: macos-14
    steps:
      - run: |
          brew tap systempromptio/tap
          # Newer brew refuses formulae from untrusted third-party taps;
          # older brew has no trust subcommand — hence the fallback.
          brew trust systempromptio/tap || true
          brew install gateway
          systemprompt --version

  scoop:
    needs: version
    runs-on: windows-latest
    steps:
      - shell: pwsh
        run: |
          iwr -useb get.scoop.sh -outfile install-scoop.ps1
          .\install-scoop.ps1 -RunAsAdmin
          $env:Path = "$env:USERPROFILE\scoop\shims;$env:Path"
          scoop bucket add systemprompt https://github.com/systempromptio/scoop-bucket
          scoop install bridge
          systemprompt-bridge --version

  compose:
    name: docker-compose / Coolify template
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Boot the Coolify compose and wait for health
        run: |
          python3 -c "import json; print(json.load(open('deploy/coolify/service-template.json'))['compose'])" > compose-test.yml
          export POSTGRES_PASSWORD=smoketest ANTHROPIC_API_KEY=sk-ant-dummy SERVICE_PORT_GATEWAY=18080
          docker compose -f compose-test.yml -p smoke up -d
          for i in $(seq 1 60); do
            curl -sf http://localhost:18080/api/v1/health && exit 0
            sleep 5
          done
          echo "gateway never became healthy"
          docker compose -f compose-test.yml -p smoke logs --tail 50
          exit 1

  compose-oneclick:
    name: canonical one-click compose
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Boot the canonical catalog compose and wait for health
        run: |
          export POSTGRES_PASSWORD=smoketest ANTHROPIC_API_KEY=sk-ant-dummy HTTP_PORT=18081
          docker compose -f deploy/compose/one-click.docker-compose.yml -p oneclick up -d
          for i in $(seq 1 60); do
            curl -sf http://localhost:18081/api/v1/health && exit 0
            sleep 5
          done
          echo "gateway never became healthy"
          docker compose -f deploy/compose/one-click.docker-compose.yml -p oneclick logs --tail 50
          exit 1

  compose-drift:
    name: catalog compose matches root topology
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compare service/volume topology with root docker-compose.yml
        run: |
          topo() {
            python3 -c "
          import sys, yaml
          d = yaml.safe_load(open(sys.argv[1]))
          for name, svc in sorted(d['services'].items()):
              print(name, sorted(v.split(':')[0] for v in svc.get('volumes', [])))
          print('volumes', sorted(d.get('volumes', {})))
          " "$1"
          }
          diff <(topo docker-compose.yml) <(topo deploy/compose/one-click.docker-compose.yml)

  railway-template:
    name: Railway template published
    needs: version
    runs-on: ubuntu-latest
    steps:
      - name: Verify the one-click template still resolves as PUBLISHED
        run: |
          status=$(curl -sf https://backboard.railway.com/graphql/v2 \
            -H 'content-type: application/json' \
            -d '{"query":"query { template(code: \"systempromptio-the-self-owned-ai-control\") { status } }"}' \
            | python3 -c "import json,sys; print(json.load(sys.stdin)['data']['template']['status'])")
          echo "template status: ${status}"
          test "${status}" = "PUBLISHED"
