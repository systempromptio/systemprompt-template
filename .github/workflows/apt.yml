name: APT — publish deb repo

# DEFERRED — APT channel parked until a Linux-sysadmin user asks for it.
# Requires: APT_REPO_TOKEN, APT_GPG_PRIVATE_KEY, APT_GPG_PASSPHRASE, APT_GPG_KEYID.
# Re-enable by restoring the `release: published` trigger below.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish"
        required: true

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag
        id: t
        run: |
          tag="${{ inputs.tag || github.ref_name }}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Download .deb artefacts from Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p incoming
          gh release download "${{ steps.t.outputs.tag }}" \
            --repo systempromptio/systemprompt-template \
            --dir incoming \
            --pattern 'systemprompt_*.deb'

      - name: Checkout apt repo
        uses: actions/checkout@v4
        with:
          repository: systempromptio/apt
          token: ${{ secrets.APT_REPO_TOKEN }}
          path: apt
          ref: gh-pages

      - name: Install reprepro + gpg
        run: sudo apt-get update && sudo apt-get install -y reprepro gnupg

      - name: Import signing key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.APT_GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.APT_GPG_PASSPHRASE }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --yes --import
          echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          echo "$GPG_PASSPHRASE" | gpg --batch --yes --passphrase-fd 0 --pinentry-mode loopback --sign --output /dev/null <<< "test" || true

      - name: Include packages
        run: |
          cd apt
          mkdir -p conf
          if [ ! -f conf/distributions ]; then
            cat > conf/distributions <<'EOF'
          Origin: systemprompt.io
          Label: systemprompt
          Suite: stable
          Codename: stable
          Architectures: amd64 arm64
          Components: main
          Description: systemprompt APT repository
          SignWith: ${{ secrets.APT_GPG_KEYID }}
          EOF
          fi
          for deb in ../incoming/*.deb; do
            reprepro --ask-passphrase --basedir . includedeb stable "$deb"
          done
          gpg --armor --export ${{ secrets.APT_GPG_KEYID }} > gpg.key

      - name: Commit and push
        working-directory: apt
        run: |
          git config user.name  "systemprompt-bot"
          git config user.email "bot@systemprompt.io"
          git add -A
          git commit -m "publish ${{ steps.t.outputs.tag }}" || echo "nothing to commit"
          git push
