name: RPM — publish yum repo

# DEFERRED — RPM channel parked until a RHEL/Fedora user asks for it.
# Requires: RPM_REPO_TOKEN, RPM_GPG_PRIVATE_KEY, RPM_GPG_KEYID.
# Re-enable by restoring the `release: published` trigger below.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish"
        required: true

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    container: rockylinux:9
    steps:
      - name: Install tools
        run: |
          dnf -y install git gh createrepo_c rpm-sign gnupg2

      - uses: actions/checkout@v4

      - name: Resolve tag
        id: t
        run: |
          tag="${{ inputs.tag || github.ref_name }}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Download .rpm artefacts from Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p incoming
          gh release download "${{ steps.t.outputs.tag }}" \
            --repo systempromptio/systemprompt-template \
            --dir incoming \
            --pattern 'systemprompt-*.rpm'

      - name: Checkout rpm repo
        uses: actions/checkout@v4
        with:
          repository: systempromptio/rpm
          token: ${{ secrets.RPM_REPO_TOKEN }}
          path: rpm
          ref: gh-pages

      - name: Import signing key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.RPM_GPG_PRIVATE_KEY }}
        run: echo "$GPG_PRIVATE_KEY" | gpg --batch --yes --import

      - name: Sign + publish
        env:
          GPG_KEYID: ${{ secrets.RPM_GPG_KEYID }}
        run: |
          mkdir -p rpm/stable/x86_64 rpm/stable/aarch64
          for r in incoming/*.rpm; do
            arch=$(rpm -qp --queryformat '%{ARCH}\n' "$r")
            rpm --define "_gpg_name ${GPG_KEYID}" --addsign "$r"
            cp "$r" "rpm/stable/${arch}/"
          done
          for d in rpm/stable/x86_64 rpm/stable/aarch64; do
            createrepo_c "$d"
            gpg --detach-sign --armor "${d}/repodata/repomd.xml"
          done
          gpg --armor --export "${GPG_KEYID}" > rpm/gpg.key
          cat > rpm/systemprompt.repo <<'EOF'
          [systemprompt]
          name=systemprompt
          baseurl=https://rpm.systemprompt.io/stable/$basearch/
          enabled=1
          gpgcheck=1
          gpgkey=https://rpm.systemprompt.io/gpg.key
          EOF

      - name: Commit and push
        working-directory: rpm
        run: |
          git config user.name  "systemprompt-bot"
          git config user.email "bot@systemprompt.io"
          git add -A
          git commit -m "publish ${{ steps.t.outputs.tag }}" || echo "nothing to commit"
          git push
