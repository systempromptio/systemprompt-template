name: Helm — lint, test, release

on:
  push:
    branches: [main]
    paths:
      - "helm/**"
      - ".github/workflows/helm.yml"
  pull_request:
    paths:
      - "helm/**"
  release:
    types: [published]

permissions:
  contents: write
  pages: write

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - uses: helm/chart-testing-action@v2.6.1

      - name: Run chart-testing (lint)
        run: ct lint --charts helm/gateway --validate-maintainers=false

      - uses: helm/kind-action@v1.10.0
        if: github.event_name != 'release'

      - name: Install chart into kind
        if: github.event_name != 'release'
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm dependency update helm/gateway
          ls -la helm/gateway/charts/
          helm install gateway helm/gateway \
            --set postgresql.auth.password=testpw \
            --set secrets.anthropicApiKey=dummy \
            --wait --timeout 300s
          kubectl wait --for=condition=Available deployment/gateway-gateway --timeout=180s
          helm test gateway

  release:
    if: github.event_name == 'release'
    needs: lint-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name  "systemprompt-bot"
          git config user.email "bot@systemprompt.io"

      - uses: azure/setup-helm@v4

      - name: Release chart to systempromptio/charts
        uses: helm/chart-releaser-action@v1.6.0
        env:
          CR_TOKEN: ${{ secrets.CHARTS_REPO_TOKEN }}
        with:
          charts_dir: helm
          config: helm/cr.yaml
