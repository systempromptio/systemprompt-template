name: GHCR prune

# Retention for ghcr.io/systempromptio/systemprompt-template
# (policy in docs/RELEASING.md):
#   - keep the 5 newest release versions (X.Y.Z) — alias tags (:X, :X.Y,
#     :latest, :edge) point at kept digests and are unaffected
#   - delete sha-* development tags older than 30 days
#   - delete untagged manifests older than 30 days (snok v3 protects child
#     manifests of kept multi-arch tags — do not swap for a naive
#     delete-package-versions loop, that corrupts manifest lists)

on:
  schedule:
    - cron: "17 4 * * 1" # weekly, Monday 04:17 UTC
  workflow_run:
    workflows: [Docker]
    types: [completed]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Log what would be deleted without deleting"
        type: boolean
        default: false

jobs:
  prune:
    # After a Docker workflow run, only prune when it succeeded on a release tag.
    if: >-
      github.event_name != 'workflow_run' ||
      (github.event.workflow_run.conclusion == 'success' &&
       startsWith(github.event.workflow_run.head_branch, 'v'))
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Prune old release versions (keep newest 5)
        uses: snok/container-retention-policy@v3.0.0
        with:
          account: systempromptio
          token: ${{ secrets.GITHUB_TOKEN }}
          image-names: systemprompt-template
          image-tags: "[0-9]*.[0-9]*.[0-9]*"
          tag-selection: tagged
          keep-n-most-recent: 5
          cut-off: 4w
          dry-run: ${{ inputs.dry_run || false }}

      - name: Prune stale sha-* development tags
        uses: snok/container-retention-policy@v3.0.0
        with:
          account: systempromptio
          token: ${{ secrets.GITHUB_TOKEN }}
          image-names: systemprompt-template
          image-tags: "sha-*"
          tag-selection: tagged
          cut-off: 4w
          dry-run: ${{ inputs.dry_run || false }}

      - name: Prune untagged manifests
        uses: snok/container-retention-policy@v3.0.0
        with:
          account: systempromptio
          token: ${{ secrets.GITHUB_TOKEN }}
          image-names: systemprompt-template
          tag-selection: untagged
          cut-off: 4w
          dry-run: ${{ inputs.dry_run || false }}
