# Local-dev + CI default cargo config.
#
# Linker is pinned to `clang` for a slightly faster linker than GNU ld.
# If you want mold for a big local-dev speedup, set it via a *personal*
# override (uncomment the RUSTFLAGS line in your shell profile or use a
# local .cargo/config.toml.local). Baking `-fuse-ld=mold` into the tracked
# config forced every CI container and every new developer to install mold
# before anything compiled.
#
#   export RUSTFLAGS="-C link-arg=-fuse-ld=mold"

[target.x86_64-unknown-linux-gnu]
linker = "clang"

[env]
SQLX_OFFLINE = { value = "true", force = false }
