[workspace]
members = [
    "crates/services/mcp/systemprompt-admin",
]
resolver = "2"

[workspace.package]
edition = "2021"
version = "0.1.0"
authors = ["Your Name <your.email@example.com>"]
license = "MIT"

[workspace.dependencies]
# Core dependencies from systemprompt-core (READ-ONLY subtree)
systemprompt-models = { path = "core/crates/shared/models" }
systemprompt-identifiers = { path = "core/crates/shared/identifiers" }
systemprompt-traits = { path = "core/crates/shared/traits" }
systemprompt-core-database = { path = "core/crates/modules/database" }
systemprompt-core-config = { path = "core/crates/modules/config" }
systemprompt-core-api = { path = "core/crates/modules/api" }
systemprompt-core-mcp = { path = "core/crates/modules/mcp" }
systemprompt-core-agent = { path = "core/crates/modules/agent" }
systemprompt-core-oauth = { path = "core/crates/modules/oauth" }
systemprompt-core-users = { path = "core/crates/modules/users" }
systemprompt-core-logging = { path = "core/crates/modules/log" }
systemprompt-core-ai = { path = "core/crates/modules/ai" }
systemprompt-core-blog = { path = "core/crates/modules/blog" }
systemprompt-core-scheduler = { path = "core/crates/modules/scheduler" }
systemprompt-core-system = { path = "core/crates/modules/core" }

# Core runtime dependencies
tokio = { version = "1.47", features = ["full"] }
tokio-test = "0.4"
tokio-stream = "0.1"
tokio-util = "0.7"
anyhow = "1.0"
thiserror = "2.0"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
async-trait = "0.1"

# Database
sqlx = { version = "0.8", features = ["runtime-tokio-rustls", "sqlite", "postgres", "migrate", "chrono", "rust_decimal"] }
rust_decimal = "1.37"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_yaml = "0.9"
serde_json = { version = "1.0", features = ["preserve_order"] }
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1.18", features = ["v4", "serde"] }
validator = { version = "0.16", features = ["derive"] }
regex = "1.11"
cargo_metadata = "0.18"
indexmap = { version = "2.0", features = ["serde"] }

# HTTP/API
axum = "0.8"
axum-test = "15.0"
reqwest = { version = "0.12", features = ["json", "stream"] }
http = "1.0"
tower-http = { version = "0.6", features = ["cors", "trace", "fs"] }
tower = { version = "0.5", features = ["util"] }

# CLI
clap = { version = "4.4", features = ["derive", "env"] }
console = "0.15"
dialoguer = "0.11"
tabled = "0.17"
colored = "2.2"

# Process management
nix = { version = "0.29", features = ["process", "signal"] }
ctrlc = "3.0"

# Utilities
inventory = "0.3"
dotenvy = "0.15"
dotenv = "0.15"
tempfile = "3.0"
walkdir = "2.0"
futures = "0.3"
futures-util = "0.3"
futures-channel = "0.3"
bytes = "1.0"
hex = "0.4"
base64-url = "2.0"
serde_urlencoded = "0.7"
chacha20poly1305 = "0.10"
schemars = { version = "0.8", features = ["derive"] }
pin-project = "1.0"
sse-stream = "0.2.1"

# MCP Protocol
rmcp = { version = "0.8.1", features = ["server", "client", "transport-io", "transport-streamable-http-server", "transport-streamable-http-server-session", "transport-streamable-http-client", "transport-streamable-http-client-reqwest", "macros", "auth"] }
rmcp-macros = "0.8"
tokio-tungstenite = "0.24"

# JSON-RPC
jsonrpc-core = "18.0"
jsonrpc-derive = "18.0"

# Security
argon2 = "0.5"
rand = "0.8"
bcrypt = "0.15"
urlencoding = "2.1"
base64 = "0.22"
jsonwebtoken = "9.3"
sha2 = "0.10"
oauth2 = "5.0"
md5 = "0.7"
hmac = "0.12"
webauthn-rs = { version = "0.5", features = ["danger-allow-state-serialisation"] }
bincode = "1.3"

# Additional dependencies
tower_governor = "0.8"
indicatif = "0.17"
config = { version = "0.14", features = ["yaml"] }
tokio-cron-scheduler = "0.10"
maxminddb = "0.24"
once_cell = "1.21"
url = "2.5"
semver = { version = "1.0", features = ["serde"] }

[workspace.lints.clippy]
all = { level = "deny", priority = -1 }
pedantic = { level = "deny", priority = -1 }
missing_docs_in_private_items = "allow"
module_name_repetitions = "allow"
missing_errors_doc = "allow"

[workspace.lints.rust]
unsafe_code = "forbid"
