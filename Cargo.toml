[package]
name = "systemprompt"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "SystemPrompt OS - Unified CLI for agent orchestration, AI operations, and system management"

[[bin]]
name = "systemprompt"
path = "src/main.rs"

[dependencies]
# Core runtime
tokio = { workspace = true }
anyhow = { workspace = true }
clap = { workspace = true }

# SystemPrompt crates
systemprompt-core-system = { path = "crates/modules/core" }
systemprompt-core-agent = { path = "crates/modules/agent" }
systemprompt-core-mcp = { path = "crates/modules/mcp" }
systemprompt-core-api = { path = "crates/modules/api" }
systemprompt-core-logging = { path = "crates/modules/log" }
systemprompt-core-users = { path = "crates/modules/users" }
systemprompt-core-oauth = { path = "crates/modules/oauth" }
systemprompt-core-database = { path = "crates/modules/database" }
systemprompt-core-config = { path = "crates/modules/config" }
systemprompt-core-blog = { path = "crates/modules/blog" }
systemprompt-core-scheduler = { path = "crates/modules/scheduler" }
systemprompt-models = { path = "crates/shared/models" }
systemprompt-identifiers = { path = "crates/shared/identifiers" }

# Additional dependencies used by CLI modules
sqlx = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml = { workspace = true }
chrono = { workspace = true }
colored = { workspace = true }
console = { workspace = true }
tabled = { workspace = true }
inventory = { workspace = true }
dotenv = { workspace = true }
dotenvy = { workspace = true }
uuid = { workspace = true }
atty = "0.2"

[[test]]
name = "integration"
path = "tests/integration/lib.rs"
harness = true

[[test]]
name = "a2a_integration_tests"
path = "tests/integration/a2a_integration_tests.rs"
harness = true

[dev-dependencies]
reqwest = { version = "0.12", features = ["json", "cookies", "stream"] }
systemprompt-core-system = { path = "crates/modules/core" }
uuid = { version = "1.0", features = ["v4", "serde"] }
serde_json = "1.0"
tokio = { version = "1", features = ["full"] }
futures = "0.3"
base64 = "0.22"
rand = "0.8"
jsonwebtoken = "9.0"
chrono = { version = "0.4", features = ["serde"] }

[workspace]
members = [
    "crates/shared/traits",
    "crates/shared/models",
    "crates/modules/core",
    "crates/modules/database",
    "crates/modules/config",
    "crates/modules/users",
    "crates/modules/oauth",
    "crates/modules/log",
    "crates/modules/agent",
    "crates/modules/api",
    "crates/modules/mcp",
    "crates/modules/ai",
    "crates/modules/blog",
    "crates/modules/scheduler",
]
resolver = "2"

[workspace.package]
edition = "2021"
authors = ["SystemPrompt Team"]
license = "Apache-2.0"
version = "0.0.9"
repository = "https://github.com/systempromptio/systemprompt-core"
homepage = "https://systemprompt.io"
documentation = "https://docs.systemprompt.io"

[workspace.lints.clippy]
all = { level = "deny", priority = -1 }
pedantic = { level = "deny", priority = -1 }
nursery = { level = "warn", priority = -1 }
cargo = { level = "warn", priority = -1 }
cargo_common_metadata = "allow"
multiple_crate_versions = "allow"
return_self_not_must_use = "allow"
must_use_candidate = "allow"
trivially_copy_pass_by_ref = "allow"
cast_possible_truncation = "allow"
cast_sign_loss = "allow"
cast_precision_loss = "allow"
cast_possible_wrap = "allow"
format_push_string = "allow"
result_unit_err = "allow"
perf = { level = "warn", priority = -1 }
suspicious = { level = "deny", priority = -1 }
missing_docs_in_private_items = "allow"
too_many_arguments = "allow"
module_name_repetitions = "allow"
missing_errors_doc = "allow"
missing_panics_doc = "allow"
cognitive_complexity = "warn"
type_complexity = "warn"
too_many_lines = "warn"
expect_used = "warn"
unwrap_used = "warn"
panic = "warn"
unimplemented = "warn"
todo = "warn"
inefficient_to_string = "warn"
unnecessary_wraps = "warn"
unused_async = "warn"

[workspace.lints.rust]
unsafe_code = "forbid"
missing_debug_implementations = "warn"
missing_copy_implementations = "warn"
trivial_casts = "warn"
trivial_numeric_casts = "warn"
unused_import_braces = "warn"
unused_qualifications = "warn"
variant_size_differences = "warn"

[workspace.dependencies]
# Core dependencies
tokio = { version = "1.47", features = ["full"] }
tokio-test = "0.4"
axum-test = "15.0"
anyhow = "1.0"
thiserror = "2.0"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
async-trait = "0.1"

# Database
sqlx = { version = "0.8", features = ["runtime-tokio-rustls", "sqlite", "postgres", "migrate", "chrono", "rust_decimal"] }
rust_decimal = "1.37"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_yaml = "0.9"
serde_json = { version = "1.0", features = ["preserve_order"] }
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1.18", features = ["v4", "serde"] }
validator = { version = "0.16", features = ["derive"] }
regex = "1.11"
cargo_metadata = "0.18"
indexmap = { version = "2.0", features = ["serde"] }

# HTTP/API (for API crate)
axum = "0.8"
reqwest = { version = "0.12", features = ["json", "stream"] }
http = "1.0"
tower-http = { version = "0.6", features = ["cors", "trace", "fs"] }
tower = { version = "0.5", features = ["util"] }
tower_governor = "0.8"

# CLI (for system crate)
clap = { version = "4.4", features = ["derive", "env"] }
console = "0.15"
dialoguer = "0.11"
tabled = "0.17"
indicatif = "0.17"

# Process management (for services)
nix = { version = "0.29", features = ["process", "signal"] }
ctrlc = "3.0"


# Utilities
inventory = "0.3"
dotenvy = "0.15"
dotenv = "0.15"
tempfile = "3.0"
walkdir = "2.0"
config = { version = "0.14", features = ["yaml"] }
tokio-cron-scheduler = "0.10"
maxminddb = "0.24"

# Additional utilities that may be needed
futures = "0.3"
futures-util = "0.3"
tokio-stream = "0.1"
tokio-util = "0.7"
bytes = "1.0"
hex = "0.4"
base64-url = "2.0"
serde_urlencoded = "0.7"
chacha20poly1305 = "0.10"
colored = "2.2"
schemars = { version = "0.8", features = ["derive"] }
once_cell = "1.21"
url = "2.5"
semver = { version = "1.0", features = ["serde"] }

# MCP additional dependencies
tokio-tungstenite = "0.24"
futures-channel = "0.3"
pin-project = "1.0"
sse-stream = "0.2.1"
rmcp = { version = "0.8.1", features = ["server", "client", "transport-io", "transport-streamable-http-server", "transport-streamable-http-server-session", "transport-streamable-http-client", "transport-streamable-http-client-reqwest", "macros", "auth"] }
# JSON-RPC dependencies for agent crate
jsonrpc-core = "18.0"
jsonrpc-derive = "18.0"
rmcp-macros = "0.8"

# Security
argon2 = "0.5"
rand = "0.8"
bcrypt = "0.15"
urlencoding = "2.1"
base64 = "0.22"
jsonwebtoken = "9.3"
sha2 = "0.10"
oauth2 = "5.0"
md5 = "0.7"
hmac = "0.12"
webauthn-rs = { version = "0.5", features = ["danger-allow-state-serialisation"] }
bincode = "1.3"


[profile.release]
lto = true
codegen-units = 1
panic = "abort"
strip = true