# Content Sources Configuration
# Define where your content lives and how it's indexed

content_sources:
  blog:
    path: "services/content/blog"
    source_id: "blog"
    category_id: "blog"
    enabled: true
    description: "Blog articles"
    allowed_content_types: ["article"]
    indexing:
      clear_before: false
      recursive: true
    sitemap:
      enabled: true
      url_pattern: "/blog/{slug}"
      priority: 0.8
      changefreq: "weekly"
      fetch_from: "database"
      parent_route:
        enabled: true
        url: "/blog"
        priority: 0.9
        changefreq: "daily"

  legal:
    path: "services/content/legal"
    source_id: "legal"
    category_id: "pages"
    enabled: true
    allowed_content_types: ["page"]
    indexing:
      recursive: true
    sitemap:
      enabled: true
      url_pattern: "/legal/{slug}"
      priority: 0.3
      changefreq: "monthly"
      fetch_from: "database"

categories:
  blog:
    name: "Blog"
    slug: "blog"
  pages:
    name: "Pages"
    slug: "pages"

metadata:
  default_author: "Author"
  language: "en"
