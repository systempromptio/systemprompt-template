# Scheduler Configuration
# Background jobs and scheduled tasks.
#
# Every job declares an explicit `owner:` — a real users.name that authorizes
# this job's actions. The configured owner becomes JobContext.actor for every
# `execute()` call and is the principal recorded in audit rows.
#
# No "system" user. No magic strings. `admin` is the bootstrap admin user
# created at install time (`just setup-local`). Deployments that want a
# different authorizer should change `owner:` to a different admin's username.

scheduler:
  enabled: true
  jobs:
    # Core jobs (defined in systemprompt-core)
    - name: cleanup_anonymous_users
      extension: core
      owner: admin
      schedule: "0 0 3 * * *"
      enabled: true

    - name: cleanup_empty_contexts
      extension: core
      owner: admin
      schedule: "0 0 * * * *"
      enabled: true

    - name: cleanup_inactive_sessions
      extension: core
      owner: admin
      schedule: "0 0 * * * *"
      enabled: true

    - name: database_cleanup
      extension: core
      owner: admin
      schedule: "0 0 4 * * *"
      enabled: true

    # Web extension jobs (publishing pipeline)
    - name: publish_pipeline
      extension: web
      owner: admin
      schedule: "0 */15 * * * *"
      enabled: true

  # Run once, serially, at startup before the cron loop begins.
  #
  # governance_bootstrap is boot-only: it has no `jobs` entry (so it is never
  # cron-scheduled) and declares an empty schedule. Its owner defaults to the
  # system admin. It materialises the profile's gateway-route entities and
  # projects services/access-control + gateway-policy YAML into the authz tables
  # so authorization is correct at app start.
  bootstrap_jobs:
    - governance_bootstrap
    - database_cleanup
    - cleanup_inactive_sessions
    # Publish web assets before the cron loop: web/dist is generated, not
    # shipped in the image, so without this the site 404s until the first
    # 15-minute publish_pipeline tick.
    - publish_pipeline
