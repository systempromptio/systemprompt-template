plugin:
  id: enterprise-demo
  name: Enterprise Governance Demo
  description: "Governance examples — a dangerous skill blocked by policy hooks, and a simple web search skill demonstrating tool governance"
  version: "2.0.0"
  enabled: true
  author:
    name: systemprompt.io
    email: support@systemprompt.io
  keywords:
    - governance
    - demo
    - enterprise
  license: proprietary
  category: governance
  skills:
    source: explicit
    include:
      - use_dangerous_secret
      - example_web_search
    exclude: []
  agents:
    source: explicit
    include:
      - developer_agent
      - associate_agent
    exclude: []
  mcp_servers:
    - systemprompt
    - skill-manager
  content_sources: []
  hooks:
    PreToolUse:
      - matcher: "*"
        hooks:
          - type: command
            command: "curl -s -X POST http://localhost:3000/api/public/hooks/govern?plugin_id=enterprise-demo"
            async: false
            timeout: 5000
            statusMessage: "Governance check: validating tool call against policy"
    PostToolUse:
      - matcher: "*"
        hooks:
          - type: command
            command: "curl -s -X POST http://localhost:3000/api/public/hooks/track?plugin_id=enterprise-demo"
            async: true
            timeout: 3000
            statusMessage: "Tracking tool usage for analytics"
  scripts:
    - name: seed-demo
      source: "demo/01-seed-data.sh"
    - name: sweep
      source: "demo/sweep.sh"
