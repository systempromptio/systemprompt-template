plugin:
  id: sales-skills
  name: "sales-skills"
  description: "CRM reports, pipeline health monitoring, diagnostics, and email delivery for the sales team"
  version: "1.1.0"
  enabled: true

  skills:
    source: explicit
    include:
      - sales_crm_health_monitor
      - sales_crm_send_emails
      - sales_crm_report
      - sales_crm_debug

  agents:
    source: explicit
    include:
      - sales_analyst

  mcp_servers:
    []

  hooks: {}

  roles:
    []

  scripts: []

  keywords:
    - sales
    - crm
    - pipeline
    - reports
    - diagnostics
    - health
    - email
  category: general

  license: "proprietary"
  author:
    name: "systemprompt.io"
    email: "support@systemprompt.io"
