# Role-scoped access control rules.
#
# This file is the BOOTSTRAP source of truth. On startup the publish pipeline
# reads it and upserts each rule into `access_control_rules` (rule_type=role).
# Dashboard edits write to the database only — there is NO write-back to this
# file. To make a rule permanent across deployments, edit this file in the
# source repo and redeploy.
#
# Schema:
#   rules:
#     - entity_type: gateway_route | mcp_server | plugin | agent | marketplace | skill
#       entity_id:   string id of the entity
#       access:      allow | deny  (default: allow)
#       default_included: bool     (default: false)
#       roles:       list of role names to grant (or deny) access
#
# Example:
#
# rules:
#   - entity_type: gateway_route
#     entity_id: claude-star-3cbb7d
#     access: allow
#     roles: [admin, developer]
#   - entity_type: mcp_server
#     entity_id: systemprompt
#     access: allow
#     roles: [admin]

rules:
  # enterprise-demo plugin
  - entity_type: plugin
    entity_id: enterprise-demo
    access: allow
    default_included: true
    roles: [user]

  # skills shipped with enterprise-demo
  - entity_type: skill
    entity_id: example_web_search
    access: allow
    default_included: true
    roles: [user]
  - entity_type: skill
    entity_id: use_dangerous_secret
    access: allow
    default_included: true
    roles: [user]

  # agents shipped with enterprise-demo
  - entity_type: agent
    entity_id: associate_agent
    access: allow
    default_included: true
    roles: [user]
  - entity_type: agent
    entity_id: developer_agent
    access: allow
    default_included: true
    roles: [user]

  # mcp servers shipped with enterprise-demo
  - entity_type: mcp_server
    entity_id: systemprompt
    access: allow
    default_included: true
    roles: [user]

  # gateway routes shipped with enterprise-demo
  - entity_type: gateway_route
    entity_id: claude-star-3cbb7d
    access: allow
    default_included: true
    roles: [user]
  - entity_type: gateway_route
    entity_id: gpt-star-e2e01
    access: allow
    default_included: true
    roles: [user]
  - entity_type: gateway_route
    entity_id: gemini-star-minimax
    access: allow
    default_included: true
    roles: [user]

  # gateway models (catalog ids — see .systemprompt/profiles/*/catalog.yaml).
  # The gateway runs a two-pass authz (model + route); both must allow.
  - entity_type: gateway_model
    entity_id: claude-haiku-4-5
    access: allow
    default_included: true
    roles: [user]
  - entity_type: gateway_model
    entity_id: claude-sonnet-4-20250514
    access: allow
    default_included: true
    roles: [user]
  - entity_type: gateway_model
    entity_id: claude-opus-4-7
    access: allow
    default_included: true
    roles: [user]
  - entity_type: gateway_model
    entity_id: claude-opus-4-7[1m]
    access: allow
    default_included: true
    roles: [user]
  - entity_type: gateway_model
    entity_id: gpt-4-turbo
    access: allow
    default_included: true
    roles: [user]
  - entity_type: gateway_model
    entity_id: gemini-2.5-flash
    access: allow
    default_included: true
    roles: [user]
