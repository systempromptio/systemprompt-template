# Role-scoped access control rules.
#
# This file is the BOOTSTRAP source of truth. On startup the publish pipeline
# reads it and upserts each rule into `access_control_rules` (rule_type=role).
# Dashboard edits write to the database only — there is NO write-back to this
# file. To make a rule permanent across deployments, edit this file in the
# source repo and redeploy.
#
# Schema:
#   rules:
#     - entity_type:    gateway_route | mcp_server | plugin | agent | marketplace | skill | hook
#       entity_id:      string id of the entity        (exactly one of entity_id / entity_match)
#       entity_match:   glob pattern over catalog ids  (exactly one of entity_id / entity_match)
#       access:         allow | deny  (default: allow)
#       default_included: bool        (default: false)
#       roles:          list of role names to grant (or deny) access
#
# Example:
#
# rules:
#   - entity_type: gateway_route
#     entity_match: "*"
#     access: allow
#     roles: [admin, developer]
#   - entity_type: mcp_server
#     entity_id: systemprompt
#     access: allow
#     roles: [admin]

rules:
  # enterprise-demo marketplace. The bridge manifest filter resolves this rule
  # and cascades it onto every member skill/agent/mcp that lacks an own rule
  # (see marketplace_filter.rs). Mirrors marketplace.access in
  # services/marketplaces/enterprise-demo/config.yaml.
  - entity_type: marketplace
    entity_id: enterprise-demo
    access: allow
    default_included: true
    roles: [user]

  # Skills shipped with enterprise-demo need NO per-skill rule: they inherit the
  # marketplace grant above via the parent cascade in marketplace_filter.rs (the
  # bridge listing) and authz.rs (runtime authz). Add a `entity_type: skill` rule
  # here only to DENY a specific skill — an entity-level deny overrides the
  # inherited marketplace allow (deny-overrides).

  # agents shipped with enterprise-demo
  - entity_type: agent
    entity_id: associate_agent
    access: allow
    default_included: true
    roles: [user]
  - entity_type: agent
    entity_id: developer_agent
    access: allow
    default_included: true
    roles: [user]

  # mcp servers shipped with enterprise-demo
  - entity_type: mcp_server
    entity_id: systemprompt
    access: allow
    default_included: true
    roles: [user]

  # gateway routes shipped with enterprise-demo — wildcard grant over every
  # route in the catalog. Per-route enumeration was retired alongside the
  # gateway_model EntityKind in core 0.11.x.
  - entity_type: gateway_route
    entity_match: "*"
    access: allow
    default_included: true
    roles: [user]

  # Proxy all Anthropic (claude-*) requests to Gemini Flash. The wildcard above
  # only GRANTS routes that the publish pipeline already materialised from the
  # live profile; it cannot create the entity row. An explicit entity_id is a
  # RuleTarget::Id, so the ACL loader self-materialises the row (upsert_entity)
  # at every boot — independent of profile-route registration or pipeline
  # timing — so the reroute survives a clean install. The id is the
  # deterministic synthesize_route_id("claude-*", "gemini").
  - entity_type: gateway_route
    entity_id: claude-star-39ccd3
    access: allow
    default_included: true
    roles: [user]
