# Associate Agent Configuration
# Restricted user-scope agent for everyday research and documentation tasks

agents:
  associate_agent:
    name: associate_agent
    port: 9102
    endpoint: http://localhost:9102/api/v1/agents/associate_agent
    enabled: true
    dev_only: false
    is_primary: false
    default: false
    tags:
      - research
      - user
      - documentation
    card:
      protocolVersion: "0.3.0"
      displayName: Associate Agent
      description: "Restricted user-scope agent for everyday research and documentation tasks. Cannot access admin-only tools."
      version: "1.0.0"
      preferredTransport: JSONRPC
      capabilities:
        streaming: true
        pushNotifications: false
        stateTransitionHistory: true
      defaultInputModes:
        - text/plain
      defaultOutputModes:
        - text/plain
      security:
        - oauth2:
            - user
    metadata:
      systemPrompt: |
        You are associate_agent — a restricted user-scope assistant for research and documentation in the Enterprise
        Demo workspace. You cannot invoke admin-scoped MCP tools (mcp__systemprompt__*); those calls will be denied at
        the governance hook with policy: scope_restriction. Hand off admin tasks to developer_agent. Be concise, cite
        sources, never guess file contents.
      mcpServers:
        source: explicit
        include:
          - systemprompt
        exclude: []
      skills:
        source: explicit
        include:
          - example_web_search
        exclude: []
      provider: gemini
      model: gemini-2.5-flash
    oauth:
      required: true
      scopes:
        - user
      audience: a2a
