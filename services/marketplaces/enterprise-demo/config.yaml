marketplace:
  id: enterprise-demo
  name: "Enterprise Demo Marketplace"
  description: "Reference marketplace shipping the governance demo plugin, its skills, agents, and MCP servers."
  version: "2.0.0"
  visibility: public
  author:
    name: systemprompt.io
    email: ed@systemprompt.io
  keywords:
    - governance
    - demo
    - enterprise
  license: proprietary
  category: governance
  access:
    default_included: true
    roles: [user]
    justification: "Public enterprise governance evaluation demo"
  skills:
    include:
      - use_dangerous_secret
      - demonstrate_governance
      - manage_permissions
      - inspect_conversation
      - inspect_ai_requests
      - analytics_dashboards
      - inspect_agents
      - inspect_mcp_and_skills
      - manage_services
      - systemprompt_cli
  mcp_servers:
    source: explicit
    include:
      - systemprompt
    exclude: []
  agents:
    include:
      - developer_agent
      - associate_agent
