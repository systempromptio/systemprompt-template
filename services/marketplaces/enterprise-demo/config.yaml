marketplace:
  id: enterprise-demo
  name: "Enterprise Demo Marketplace"
  description: "Reference marketplace shipping the governance demo plugin, its skills, agents, and MCP servers."
  version: "2.0.0"
  visibility: public
  author:
    name: systemprompt.io
    email: support@systemprompt.io
  keywords:
    - governance
    - demo
    - enterprise
  license: proprietary
  category: governance

  # All ids must resolve to top-level resources defined in services/.
  # Loader (in core) validates referential integrity at startup.
  # Skills/agents/mcp_servers/plugins live in the database — the YAML
  # bootstrap loader (commit 1803f2d) seeds them at startup. Keeping the
  # marketplace shell empty avoids needing every entity declared in
  # services/config/config.yaml's `includes:` list.
  skills:
    include: []
  mcp_servers:
    source: explicit
    include: []
    exclude: []
  agents:
    include: []
