  mcp_registry_per_second: 50
  mcp_per_second: 200
  stream_per_second: 100
  content_per_second: 50
  burst_multiplier: 3
  tier_multipliers:
    admin: 10.0
    user: 1.0
    a2a: 5.0
    mcp: 5.0
    service: 5.0
    anon: 0.5
runtime:
  environment: development
  log_level: verbose
  output_format: text
  no_color: false
  non_interactive: false
cloud:
  tenant_id: local_19c660c7a1a
  validation: warn
