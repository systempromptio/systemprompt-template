# SystemPrompt Profile: Local Development
# Generated from environment variables
# Edit this file to customize your local environment

name: local
display_name: Local Development
site:
  name: systemprompt-template
  github_link: https://github.com/systempromptio/systemprompt-template
  service_display_name: null
  service_version: null
database:
  type: postgres
  url: postgresql://postgres:postgres@localhost:5432/site_systemprompt_template
  postgres_user: null
  postgres_password: null
  postgres_db: null
  test_user: null
  test_password: null
  test_db: null
server:
  host: 127.0.0.1
  port: 8080
  api_server_url: http://localhost:8080
  api_external_url: http://localhost:8080
  use_https: false
  cors_allowed_origins:
  - http://localhost:8080
  - http://localhost:5173
paths:
  system: /var/www/html/systemprompt-template
  services: /var/www/html/systemprompt-template/services
  skills: /var/www/html/systemprompt-template/services/skills
  config: /var/www/html/systemprompt-template/services/config/config.yml
  storage: /var/www/html/systemprompt-template/files
  cargo_target: /var/www/html/systemprompt-template/core/target
  binary_dir: null
  geoip_database: null
  ai_config: /var/www/html/systemprompt-template/services/ai/config.yml
  content_config: /var/www/html/systemprompt-template/services/content/config.yml
  web_config: /var/www/html/systemprompt-template/services/web/config.yml
  web_metadata: /var/www/html/systemprompt-template/services/web/metadata.yml
  web_path: /var/www/html/systemprompt-template/core/web
  scg_templates: null
  scg_assets: null
security:
  jwt_issuer: systemprompt
  jwt_secret: dev-secret-change-in-production
  jwt_access_token_expiration: 3600
  jwt_refresh_token_expiration: 604800
api_keys:
  gemini: AIzaSyB5TGz2SewCgiZV7W82vi5qKNts0mmSGYU
  github: null
  anthropic: null
  openai: null
rate_limits:
  disabled: true
  oauth_public_per_second: 2
  oauth_auth_per_second: 2
  contexts_per_second: 50
  tasks_per_second: 10
  artifacts_per_second: 15
  agent_registry_per_second: 20
  agents_per_second: 3
  mcp_registry_per_second: 20
  mcp_per_second: 100
  stream_per_second: 1
  content_per_second: 20
  burst_multiplier: 2
