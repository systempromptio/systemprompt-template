# demo.systemprompt.io Profile: Production
# Generated by 'systemprompt cloud profile create'

name: production
display_name: Production
target: cloud
site:
  name: Enterprise Demo
  github_link: null
database:
  type: postgres
  external_db_access: true
server:
  host: 0.0.0.0
  port: 8080
  api_server_url: https://demo.systemprompt.io
  api_internal_url: http://localhost:8080
  api_external_url: https://demo.systemprompt.io
  use_https: true
  cors_allowed_origins:
  - https://demo.systemprompt.io
  content_negotiation:
    enabled: false
    markdown_suffix: .md
  security_headers:
    enabled: true
    hsts: max-age=63072000; includeSubDomains; preload
    frame_options: DENY
    content_type_options: nosniff
    referrer_policy: strict-origin-when-cross-origin
    permissions_policy: camera=(), microphone=(), geolocation=()
    content_security_policy: null
paths:
  system: /app
  services: /app/services
  bin: /app/bin
  web_path: /app/web
  storage: /app/storage
  geoip_database: null
security:
  jwt_issuer: systemprompt
  jwt_access_token_expiration: 2592000
  jwt_refresh_token_expiration: 15552000
  jwt_audiences:
  - web
  - api
  - a2a
  - mcp
  allow_registration: true
rate_limits:
  disabled: false
  oauth_public_per_second: 10
  oauth_auth_per_second: 10
  contexts_per_second: 100
  tasks_per_second: 50
  artifacts_per_second: 50
  agent_registry_per_second: 50
  agents_per_second: 20
  mcp_registry_per_second: 50
  mcp_per_second: 200
  stream_per_second: 100
  content_per_second: 50
  burst_multiplier: 3
  tier_multipliers:
    admin: 10.0
    user: 1.0
    a2a: 5.0
    mcp: 5.0
    service: 5.0
    anon: 0.5
runtime:
  environment: production
  log_level: normal
  output_format: json
  no_color: true
  non_interactive: true
cloud:
  tenant_id: f7ae798f-9c2a-4dc9-9aa9-a574a4cff5bf
  validation: strict
secrets:
  secrets_path: ./secrets.json
  validation: strict
  source: env
extensions:
  disabled: []
