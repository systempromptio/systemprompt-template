<div class="agentic-mesh-animation" aria-hidden="true">
    <svg
        viewBox="165 105 470 290"
        class="agentic-mesh-svg"
        preserveAspectRatio="xMidYMid meet"
        xmlns="http://www.w3.org/2000/svg"
    >
        <defs>
            
            <filter id="registry-glow" x="-50%" y="-50%" width="200%" height="200%">
                <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
                <feMerge>
                    <feMergeNode in="coloredBlur"/>
                    <feMergeNode in="SourceGraphic"/>
                </feMerge>
            </filter>
            
            <filter id="agent-glow" x="-50%" y="-50%" width="200%" height="200%">
                <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
                <feMerge>
                    <feMergeNode in="coloredBlur"/>
                    <feMergeNode in="SourceGraphic"/>
                </feMerge>
            </filter>
            
            <filter id="particle-glow" x="-50%" y="-50%" width="200%" height="200%">
                <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
                <feMerge>
                    <feMergeNode in="coloredBlur"/>
                    <feMergeNode in="SourceGraphic"/>
                </feMerge>
            </filter>

            <path id="a2a-path-6" d="M505,200 Q400,250 295,300" fill="none"/>

        <g class="registry-hub" transform="translate(400, 250)">

                <animate attributeName="r" values="70;85;70" dur="4s" repeatCount="indefinite"/>
                <animate attributeName="opacity" values="0.15;0.05;0.15" dur="4s" repeatCount="indefinite"/>
            </circle>
            
            <circle r="60" fill="none" stroke="var(--sp-orange-500)" stroke-width="0.5" opacity="0.1">
                <animate attributeName="r" values="60;72;60" dur="4s" repeatCount="indefinite" begin="0.5s"/>
            </circle>

            <circle r="50" fill="var(--sp-orange-600)" opacity="0.06" filter="url(#registry-glow)"/>

            <polygon points="0,-45 39,-22.5 39,22.5 0,45 -39,22.5 -39,-22.5"
                     fill="var(--sp-color-surface, #0a0a0a)"
                     stroke="var(--sp-orange-500)"

            <polygon points="0,-32 28,-16 28,16 0,32 -28,16 -28,-16"
                     fill="none"
                     stroke="var(--sp-orange-600)"
                     stroke-width="0.5"
                     stroke-dasharray="4,4"
                     opacity="0.5"/>

            <svg x="-14" y="-14" width="28" height="28" viewBox="0 0 24 24"
                 fill="none" stroke="var(--sp-orange-500)" stroke-width="1.5"
                 stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="2.5"/>
                <circle cx="5" cy="6" r="1.5"/>
                <circle cx="19" cy="6" r="1.5"/>
                <circle cx="5" cy="18" r="1.5"/>
                <circle cx="19" cy="18" r="1.5"/>

                <line x1="14" y1="10.5" x2="17.8" y2="7.2"/>
                <line x1="10" y1="13.5" x2="6.2" y2="16.8"/>
                <line x1="14" y1="13.5" x2="17.8" y2="16.8"/>

                  font-family="var(--sp-font-brand), system-ui, sans-serif" font-size="9" font-weight="600" letter-spacing="0.12em">

                  font-family="var(--sp-font-body), system-ui, sans-serif" font-size="7" letter-spacing="0.08em">
                AGENTS + MCP
            </text>

                      stroke="var(--sp-orange-500)" stroke-width="1.5"/>

                     fill="none" stroke="var(--sp-orange-400)" stroke-width="1.5">

                    <path d="M12 7v4"/>
                    <circle cx="8" cy="16" r="1"/>
                    <circle cx="16" cy="16" r="1"/>
                </svg>
                <text text-anchor="middle" y="-38" fill="var(--sp-orange-300)"
                      font-family="var(--sp-font-brand), system-ui, sans-serif" font-size="8" letter-spacing="0.1em">AGENT A</text>
                
                <circle cx="40" cy="-25" r="3" fill="#22c55e" opacity="0.9"/>
                
                <rect x="-38" y="8" width="76" height="18" rx="4"
                      fill="var(--sp-color-surface, #0a0a0a)" stroke="var(--sp-orange-600)" stroke-width="0.5"/>
                <image href="/files/images/logo.svg" x="-30" y="10" width="60" height="14"/>
            </g>

            <g class="agent-node" transform="translate(555, 165)" filter="url(#agent-glow)">
                <rect x="-50" y="-35" width="100" height="70" rx="8"
                      fill="var(--sp-orange-600)" fill-opacity="0.08"
                      stroke="var(--sp-orange-500)" stroke-width="1.5"/>
                <svg x="-10" y="-28" width="20" height="20" viewBox="0 0 24 24"
                     fill="none" stroke="var(--sp-orange-400)" stroke-width="1.5">
                    <rect x="3" y="11" width="18" height="10" rx="2"/>
                    <circle cx="12" cy="5" r="2"/>
                    <path d="M12 7v4"/>
                    <circle cx="8" cy="16" r="1"/>
                    <circle cx="16" cy="16" r="1"/>
                </svg>
                <text text-anchor="middle" y="-38" fill="var(--sp-orange-300)"
                      font-family="var(--sp-font-brand), system-ui, sans-serif" font-size="8" letter-spacing="0.1em">AGENT B</text>
                <circle cx="40" cy="-25" r="3" fill="#22c55e" opacity="0.9"/>
                <rect x="-38" y="8" width="76" height="18" rx="4"
                      fill="var(--sp-color-surface, #0a0a0a)" stroke="var(--sp-orange-600)" stroke-width="0.5"/>
                <image href="/files/images/logo.svg" x="-30" y="10" width="60" height="14"/>
            </g>

            <g class="agent-node" transform="translate(245, 335)" filter="url(#agent-glow)">
                <rect x="-50" y="-35" width="100" height="70" rx="8"
                      fill="var(--sp-orange-600)" fill-opacity="0.08"
                      stroke="var(--sp-orange-500)" stroke-width="1.5"/>
                <svg x="-10" y="-28" width="20" height="20" viewBox="0 0 24 24"
                     fill="none" stroke="var(--sp-orange-400)" stroke-width="1.5">
                    <rect x="3" y="11" width="18" height="10" rx="2"/>
                    <circle cx="12" cy="5" r="2"/>
                    <path d="M12 7v4"/>
                    <circle cx="8" cy="16" r="1"/>
                    <circle cx="16" cy="16" r="1"/>
                </svg>
                <text text-anchor="middle" y="-38" fill="var(--sp-orange-300)"
                      font-family="var(--sp-font-brand), system-ui, sans-serif" font-size="8" letter-spacing="0.1em">AGENT C</text>
                <circle cx="40" cy="-25" r="3" fill="#22c55e" opacity="0.9"/>
                <rect x="-38" y="8" width="76" height="18" rx="4"
                      fill="var(--sp-color-surface, #0a0a0a)" stroke="var(--sp-orange-600)" stroke-width="0.5"/>
                <image href="/files/images/logo.svg" x="-30" y="10" width="60" height="14"/>
            </g>

            <g class="agent-node" transform="translate(555, 335)" filter="url(#agent-glow)">
                <rect x="-50" y="-35" width="100" height="70" rx="8"
                      fill="var(--sp-orange-600)" fill-opacity="0.08"
                      stroke="var(--sp-orange-500)" stroke-width="1.5"/>
                <svg x="-10" y="-28" width="20" height="20" viewBox="0 0 24 24"

                    <circle cx="8" cy="16" r="1"/>
                    <circle cx="16" cy="16" r="1"/>
                </svg>
                <text text-anchor="middle" y="-38" fill="var(--sp-orange-300)"
                      font-family="var(--sp-font-brand), system-ui, sans-serif" font-size="8" letter-spacing="0.1em">AGENT D</text>
                <circle cx="40" cy="-25" r="3" fill="#22c55e" opacity="0.9"/>
                <rect x="-38" y="8" width="76" height="18" rx="4"
                      fill="var(--sp-color-surface, #0a0a0a)" stroke="var(--sp-orange-600)" stroke-width="0.5"/>
                <image href="/files/images/logo.svg" x="-30" y="10" width="60" height="14"/>
            </g>
        </g>

        <g class="mesh-links">
            
            <path d="M295,130 Q400,100 505,130" fill="none" stroke="var(--sp-orange-600)" stroke-width="1.5" stroke-dasharray="8,4" opacity="0.35"/>
            
            <path d="M295,370 Q400,400 505,370" fill="none" stroke="var(--sp-orange-600)" stroke-width="1.5" stroke-dasharray="8,4" opacity="0.35"/>
            
            <path d="M195,165 Q170,250 195,335" fill="none" stroke="var(--sp-orange-600)" stroke-width="1.5" stroke-dasharray="8,4" opacity="0.35"/>
            
            <path d="M605,165 Q630,250 605,335" fill="none" stroke="var(--sp-orange-600)" stroke-width="1.5" stroke-dasharray="8,4" opacity="0.35"/>
            
            <path d="M295,200 Q400,250 505,300" fill="none" stroke="var(--sp-orange-600)" stroke-width="1" stroke-dasharray="6,4" opacity="0.2"/>
            
            <path d="M505,200 Q400,250 295,300" fill="none" stroke="var(--sp-orange-600)" stroke-width="1" stroke-dasharray="6,4" opacity="0.2"/>
        </g>

        <g class="registry-connections">
            <path d="M400,205 L295,130" fill="none" stroke="var(--sp-orange-500)" stroke-width="2" opacity="0.4"/>
            <path d="M400,205 L505,130" fill="none" stroke="var(--sp-orange-500)" stroke-width="2" opacity="0.4"/>
            <path d="M400,295 L295,370" fill="none" stroke="var(--sp-orange-500)" stroke-width="2" opacity="0.4"/>
            <path d="M400,295 L505,370" fill="none" stroke="var(--sp-orange-500)" stroke-width="2" opacity="0.4"/>
        </g>

        <g class="a2a-particles">
            
            <circle r="5" fill="var(--sp-orange-400)" filter="url(#particle-glow)">
                <animateMotion dur="3s" repeatCount="indefinite">
                    <mpath href="#a2a-path-1"/>
                </animateMotion>
            </circle>
            <circle r="4" fill="var(--sp-orange-300)" filter="url(#particle-glow)" opacity="0.7">
                <animateMotion dur="3s" repeatCount="indefinite" keyPoints="1;0" keyTimes="0;1" calcMode="linear">
                    <mpath href="#a2a-path-1"/>
                </animateMotion>
            </circle>

            <circle r="5" fill="var(--sp-orange-400)" filter="url(#particle-glow)">
                <animateMotion dur="3.5s" repeatCount="indefinite" begin="0.5s">
                    <mpath href="#a2a-path-2"/>
                </animateMotion>
            </circle>

            <circle r="4" fill="var(--sp-orange-300)" filter="url(#particle-glow)">
                <animateMotion dur="2.5s" repeatCount="indefinite" begin="0.3s">
                    <mpath href="#a2a-path-3"/>
                </animateMotion>
            </circle>

            <circle r="4" fill="var(--sp-orange-300)" filter="url(#particle-glow)">
                <animateMotion dur="2.5s" repeatCount="indefinite" begin="0.8s">
                    <mpath href="#a2a-path-4"/>
                </animateMotion>
            </circle>
        </g>
    </svg>
