<style>
  body.gate-locked > *:not(#password-gate) { display: none !important; }
  #password-gate {
    position: fixed; inset: 0; z-index: 10000;
    display: flex; align-items: center; justify-content: center;
    background: #FFFDF5; font-family: "Roboto", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  #password-gate .gate-card {
    background: #FFFFFF; border: 1px solid #D6DCE8;
    border-radius: 16px; padding: 48px 40px; width: 100%; max-width: 420px;
    text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.08);
  }
  #password-gate .gate-lock {
    width: 48px; height: 48px; margin: 0 auto 24px;
    background: rgba(237,104,65,0.1); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
  }
  #password-gate h2 { color: #252526; font-size: 22px; font-weight: 600; margin: 0 0 8px; }
  #password-gate .gate-sub { color: #A2AAB9; font-size: 14px; margin: 0 0 32px; }
  #password-gate input {
    width: 100%; box-sizing: border-box; padding: 14px 16px;
    background: #F7F4EF; border: 1px solid #D6DCE8;
    border-radius: 8px; color: #252526; font-size: 15px;
    outline: none; transition: border-color 0.2s;
  }
  #password-gate input:focus { border-color: #ed6841; }
  #password-gate input.gate-error { border-color: #ef4444; }
  #password-gate button {
    width: 100%; padding: 14px; margin-top: 16px;
    background: #FF6B35; color: #fff; border: none; border-radius: 8px;
    font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.2s;
  }
  #password-gate button:hover { background: #FF8555; }
  #password-gate .gate-msg {
    color: #ef4444; font-size: 13px; margin-top: 12px; min-height: 18px;
  }
  @keyframes gate-shake {
    0%,100% { transform: translateX(0); }
    20%,60% { transform: translateX(-8px); }
    40%,80% { transform: translateX(8px); }
  }
  .gate-shake { animation: gate-shake 0.4s ease; }
</style>
<script>
(function() {
  var HASH = '88afe7f16a24c14b041bd33f3ee3dcee8df4c2be58f37958ff310765b40057de';
  if (sessionStorage.getItem('foodlesDemoUnlocked') === 'true') return;
  document.documentElement.className += ' gate-active';
  document.addEventListener('DOMContentLoaded', function() {
    document.body.classList.add('gate-locked');
    var gate = document.createElement('div');
    gate.id = 'password-gate';
    gate.innerHTML =
      '<div class="gate-card">' +
        '<div class="gate-lock">&#128274;</div>' +
        '<h2>Confidential Presentation</h2>' +
        '<p class="gate-sub">This presentation is password protected</p>' +
        '<form id="gate-form">' +
          '<input id="gate-input" type="password" placeholder="Enter password" autocomplete="off" autofocus>' +
          '<button type="submit">Unlock</button>' +
          '<div class="gate-msg" id="gate-msg"></div>' +
        '</form>' +
        '' +
      '</div>';
    document.body.prepend(gate);
    document.getElementById('gate-input').focus();
    document.getElementById('gate-form').addEventListener('submit', function(e) {
      e.preventDefault();
      var pw = document.getElementById('gate-input').value;
      var enc = new TextEncoder();
      crypto.subtle.digest('SHA-256', enc.encode(pw)).then(function(buf) {
        var hex = Array.from(new Uint8Array(buf)).map(function(b) {
          return b.toString(16).padStart(2, '0');
        }).join('');
        if (hex === HASH) {
          sessionStorage.setItem('foodlesDemoUnlocked', 'true');
          gate.remove();
          document.body.classList.remove('gate-locked');
        } else {
          var input = document.getElementById('gate-input');
          var msg = document.getElementById('gate-msg');
          input.classList.add('gate-error');
          input.value = '';
          msg.textContent = 'Incorrect password. Please try again.';
          var card = gate.querySelector('.gate-card');
          card.classList.remove('gate-shake');
          void card.offsetWidth;
          card.classList.add('gate-shake');
        }
      });
    });
  });
})();
</script>
