sections:
  - id: "governance-pipeline"
    title: "The Governance Pipeline"
    visual_desktop: "/files/images/features/governance-pipeline.svg"
    content: |
      <p>Every tool call passes through a synchronous governance pipeline before execution. There is no path to bypass it. The pipeline evaluates four rule layers in sequence and returns an allow or deny decision with a reason.</p>
      <pre style="background:#1a1a2e;color:#e0e0e0;padding:1.5rem;border-radius:8px;font-size:0.85rem;line-height:1.6;overflow-x:auto;margin:1.5rem 0">
      Agent ─→ Tool Call ─→ PreToolUse Hook ─→ Governance Engine
                                                │
                                 ┌──────────────┼──────────────┐
                                 │              │              │
                            Scope Check    Secret Scan    Blocklist    Rate Limit
                                 │              │              │           │
                                 └──────────────┼──────────────┘
                                                │
                                     ┌──────────┴──────────┐
                                     │                     │
                               ✓ ALLOW               ✗ DENY
                               Tool executes         Blocked + reason
                               PostToolUse hook      Decision logged
      </pre>
      <p>The governance engine is stateless and typed in Rust at the HTTP boundary. Audit recording fires asynchronously — it never blocks the allow/deny decision. The entire pipeline adds single-digit milliseconds to each tool call.</p>
    items:
      - title: "Synchronous Enforcement"
        description: "The PreToolUse hook runs in the request path. A denied tool call is stopped before it executes. No fire-and-forget."
      - title: "Four Evaluation Layers"
        description: "Scope check, secret detection, destructive operation blocklist, and rate limiting. All four are evaluated on every call."
      - title: "Typed Rust Boundary"
        description: "JSON deserialized into typed Rust structs at the HTTP boundary. No runtime type errors, no missing fields, no ambiguity."

  - id: "rbac"
    title: "RBAC & Agent Scoping"
    content: |
      <p>Every agent declares an OAuth scope: <code>admin</code>, <code>user</code>, <code>a2a</code>, <code>mcp</code>, <code>service</code>, or <code>anonymous</code>. The governance engine resolves the agent's scope at runtime and evaluates tool access against it. Admin-scope agents can call administrative tools. User-scope agents are restricted to their designated capabilities.</p>
      <p>Bulk assign lets you roll out permission changes across all agents in a single action. When you onboard a new department or change a security policy, one operation updates access for every agent simultaneously.</p>
      <pre style="background:#1a1a2e;color:#e0e0e0;padding:1.25rem;border-radius:8px;font-size:0.85rem;line-height:1.6;overflow-x:auto;margin:1.5rem 0">
      $ systemprompt admin agents list
      ┌──────────────────┬───────┬─────────────────────┐
      │ Agent            │ Scope │ MCP Servers          │
      ├──────────────────┼───────┼─────────────────────┤
      │ developer_agent  │ admin │ systemprompt         │
      │ associate_agent  │ user  │ skill-manager        │
      │ customer_agent   │ user  │ skill-manager        │
      └──────────────────┴───────┴─────────────────────┘
      </pre>
    items:
      - title: "Six Role Tiers"
        description: "Admin, user, a2a, mcp, service, and anonymous. Each tier has different tool access, rate limits, and capabilities."
      - title: "Per-Agent OAuth Scopes"
        description: "Each agent declares its scope in configuration. The governance engine resolves scope at runtime from the agent's JWT."
      - title: "Bulk Assign"
        description: "Roll out access changes across all agents in one action. No per-agent configuration drift."

  - id: "secret-detection"
    title: "Secret Detection & Prevention"
    content: |
      <p>The governance engine scans every tool input for plaintext secrets before execution. 35+ patterns cover AWS keys, GitHub tokens, Slack webhooks, Stripe keys, PEM certificates, database connection strings, and API keys from major providers. When a secret is detected, the tool call is denied immediately — even for admin-scope agents.</p>
      <pre style="background:#1a1a2e;color:#e0e0e0;padding:1.25rem;border-radius:8px;font-size:0.85rem;line-height:1.6;overflow-x:auto;margin:1.5rem 0">
      $ curl -s /api/public/hooks/govern -d '{"tool_input":"key:AKIA..."}'

      {
        "permissionDecision": "deny",
        "reason": "Secret detected: aws_access_key (AKIA...redacted)"
      }

      Patterns: AWS (AKIA*, aws_secret), GitHub (ghp_, github_pat_),
      Slack (xoxb-, xoxp-), Stripe (sk_live_), PEM keys, database URLs,
      Anthropic, OpenAI, Google, Twilio, GitLab, and 20+ more.
      </pre>
      <p>All secrets are stored encrypted with ChaCha20-Poly1305 AEAD — the same algorithm Signal uses. Key versioning enables zero-downtime rotation. Every secret access is logged in the audit trail.</p>
    items:
      - title: "35+ Secret Patterns"
        description: "AWS, GitHub, Slack, Stripe, PEM, database URLs, and keys from all major AI and cloud providers. Recursive JSON scanning."
      - title: "Defense-in-Depth"
        description: "Even admin-scope agents are blocked from passing plaintext secrets through tool calls. No role bypasses secret detection."
      - title: "ChaCha20-Poly1305 Encryption"
        description: "Secrets encrypted at rest with authenticated encryption. Key versioning for zero-downtime rotation."

  - id: "audit-trails"
    title: "Audit Trails & Compliance"
    content: |
      <p>Every governance decision is stored in PostgreSQL with full context: user, session, agent, tool name, scope, decision, policy, reason, and the complete set of evaluated rules as JSONB. 16 event hooks capture sessions, tool use, prompts, configuration changes, and subagent lifecycle.</p>
      <pre style="background:#1a1a2e;color:#e0e0e0;padding:1.25rem;border-radius:8px;font-size:0.85rem;line-height:1.6;overflow-x:auto;margin:1.5rem 0">
      $ systemprompt infra logs audit req_01JR5X --full

      Request: req_01JR5X
      Agent:   developer_agent (scope: admin)
      Model:   claude-sonnet-4-6 | Tokens: 1,247 in / 892 out
      Tools:   3 calls (2 allowed, 1 denied)
      ┌──────────────────────────┬──────────┬─────────────────────┐
      │ Tool                     │ Decision │ Policy              │
      ├──────────────────────────┼──────────┼─────────────────────┤
      │ WebSearch                │ allow    │ default_allow       │
      │ Read                     │ allow    │ default_allow       │
      │ Write (secret in input)  │ deny     │ secret_injection    │
      └──────────────────────────┴──────────┴─────────────────────┘
      </pre>
      <p>Use the CLI to query any dimension: by agent, by tool, by decision, by time range. Export to CSV for compliance reporting. The audit trail is not a summary — it is the complete record of every AI action taken on behalf of every user.</p>
    items:
      - title: "16 Event Hooks"
        description: "Sessions, tool use, prompts, config changes, permissions, and subagent lifecycle. All captured automatically."
      - title: "Full Conversation Context"
        description: "Session transcripts stored as JSONB. Reconstruct any agent interaction from start to finish."
      - title: "CLI Inspection"
        description: "systemprompt infra logs audit <id> --full returns the complete conversation chain. Filter by agent, model, status, or time."
      - title: "SIEM-Ready Log Output"
        description: "Every governance decision emitted as structured JSON — ready for direct ingestion by Splunk, ELK, Datadog, or any SIEM. No format conversion or custom parsers required."
      - title: "External Security Monitoring Export"
        description: "Export every allow/deny decision with full request context (user, agent, tool, scope, reason) to external security monitoring systems. Your SOC sees AI governance events alongside the rest of your security telemetry."

  - id: "rate-limiting"
    title: "Tiered Rate Limiting"
    content: |
      <p>Token bucket rate limiting with role-based tiers protects your infrastructure from runaway agents and ensures fair resource allocation. The in-pipeline rate limiter checks 300 calls per minute per session. The infrastructure rate limiter applies role-based multipliers across all endpoints.</p>
      <pre style="background:#1a1a2e;color:#e0e0e0;padding:1.25rem;border-radius:8px;font-size:0.85rem;line-height:1.6;overflow-x:auto;margin:1.5rem 0">
      Role Tier        Multiplier   Effective Rate
      ───────────────  ──────────   ──────────────
      Admin            10x          2,000 req/s
      A2A / MCP         5x          1,000 req/s
      User              1x            200 req/s
      Anonymous        0.5x            100 req/s

      Burst multiplier: 3x (handles traffic spikes)
      </pre>
    items:
      - title: "Role-Based Tiers"
        description: "Admin (10x), User (1x), A2A (5x), MCP (5x), Service (5x), Anonymous (0.5x). Calibrated to real usage patterns."
      - title: "Burst Multiplier"
        description: "3x burst allowance for traffic spikes. Legitimate surges pass through while sustained overuse is throttled."
      - title: "Dual Rate Limiting"
        description: "Per-session limits in the governance pipeline plus per-role limits at the infrastructure level. Two independent layers of protection."

  - id: "mcp-governance"
    title: "MCP Tool Governance"
    content: |
      <p>MCP is the native protocol, not an adapter layer. Each MCP server has its own OAuth2 configuration with independent scopes, token expiry, and credential rotation. Compromising one server does not grant access to others.</p>
      <p>All MCP servers are registered in a central directory with port isolation (range 5000–5999). The governance pipeline evaluates every MCP tool call through the same PreToolUse hook — authenticated, scoped, and logged.</p>
      <pre style="background:#1a1a2e;color:#e0e0e0;padding:1.25rem;border-radius:8px;font-size:0.85rem;line-height:1.6;overflow-x:auto;margin:1.5rem 0">
      $ systemprompt core plugins list

      Plugin: enterprise-demo (v2.0.0)
        MCP Servers:
          systemprompt    → port 5010 (scope: admin)
          skill-manager   → port 5050 (scope: user, admin)
        Skills: 2 | Hooks: 8 (PreToolUse, PostToolUse, ...)
      </pre>
    items:
      - title: "Per-Server OAuth2"
        description: "Each MCP server defines its own OAuth2 scopes. Independent token management and credential rotation."
      - title: "Central Registry"
        description: "Every MCP server registered, discoverable, and monitored from a single administrative view."
      - title: "Port Isolation"
        description: "Range 5000–5999, one port per server. No cross-server interference or shared process space."

