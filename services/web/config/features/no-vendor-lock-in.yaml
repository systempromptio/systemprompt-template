# Feature: No Vendor Lock-In
# Open formats, git portability, lossless export, version history

slug: "no-vendor-lock-in"
title: "No Vendor Lock-In | Open Standards & Portable Formats"
headline: "YOUR SKILLS, YOUR DATA,"
headline_highlight: "YOUR CHOICE."
subtitle: "Everything stored in standard Markdown, YAML, and Git. Export anytime, import anywhere, keep full control."
description: "systemprompt.io uses open, portable formats throughout. Skills are Markdown files, plugins are YAML configs, and distribution happens over Git. There is no proprietary encoding, no walled garden, and no data you cannot take with you."
