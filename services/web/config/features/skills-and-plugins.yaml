sections:
  - id: "plugin-governance"
    title: "Plugin Governance"
    content: |
      <p>A plugin is a governed bundle: agents, skills, and MCP servers packaged together with their own access control, versioning, and audit trail. When you approve a plugin, you approve the entire capability set it provides. Revoking a plugin removes all of its capabilities in one action.</p>
      <pre style="background:#1a1a2e;color:#e0e0e0;padding:1.25rem;border-radius:8px;font-size:0.85rem;line-height:1.6;overflow-x:auto;margin:1.5rem 0">
      $ systemprompt core plugins list
      ┌──────────────────────┬─────────┬────────┬───────────┬───────┐
      │ Plugin               │ Version │ Skills │ MCP Srvrs │ Hooks │
      ├──────────────────────┼─────────┼────────┼───────────┼───────┤
      │ enterprise-demo      │ 2.0.0   │ 2      │ 2         │ 8     │
      │ systemprompt-admin   │ 1.0.0   │ 8      │ 1         │ 4     │
      │ systemprompt-dev     │ 1.0.0   │ 10     │ 0         │ 0     │
      └──────────────────────┴─────────┴────────┴───────────┴───────┘
      </pre>
    items:
      - title: "Governed Bundles"
        description: "Agents, skills, and MCP servers packaged as a single governed unit with unified access control."
      - title: "Capability Sets"
        description: "Each plugin defines a complete capability boundary: tools, knowledge, and permissions."
      - title: "One-Action Revocation"
        description: "Revoking a plugin removes all its agents, skills, and MCP server access simultaneously."

  - id: "instant-skills"
    title: "30-Second Skills"
    content: |
      <p>Skills are Markdown documents that give agents specialised knowledge. Create a skill in 30 seconds: write the content, assign it to a plugin, and it is live. No YAML configuration, no deployment pipeline, no restart required.</p>
      <pre style="background:#1a1a2e;color:#e0e0e0;padding:1.25rem;border-radius:8px;font-size:0.85rem;line-height:1.6;overflow-x:auto;margin:1.5rem 0">
      $ systemprompt core skills list
      ┌──────────────────────────┬──────────┬──────────────┐
      │ Skill                    │ Plugin   │ Format       │
      ├──────────────────────────┼──────────┼──────────────┤
      │ example-web-search       │ ent-demo │ Markdown     │
      │ use-dangerous-secret     │ ent-demo │ Markdown     │
      │ admin-user-management    │ sp-admin │ Markdown     │
      │ admin-analytics          │ sp-admin │ Markdown     │
      └──────────────────────────┴──────────┴──────────────┘

      Skills deploy instantly. No restart. No pipeline.
      </pre>
    items:
      - title: "Markdown Format"
        description: "Plain Markdown with frontmatter. No YAML schemas, no config files, no build steps."
      - title: "Instant Deployment"
        description: "Create or update a skill and it is live immediately. No restart, no deployment pipeline."
      - title: "Versioned & Auditable"
        description: "Every skill change is tracked. Roll back to any previous version with full change history."

  - id: "forking"
    title: "Forking & Customisation"
    content: |
      <p>Users can fork any skill, plugin, agent, or MCP server to create their own customised version without affecting the organisation baseline. A forked entity inherits the original content but tracks changes independently. The base entity ID is preserved so you always know where a fork originated.</p>
      <p>Forking enables department-specific agent behaviour while maintaining a governed baseline. Each team can tailor agent behaviour for their domain without affecting other departments.</p>
    items:
      - title: "Non-Destructive Customisation"
        description: "Fork any skill, plugin, agent, or MCP server. The original baseline is preserved and independently maintained."
      - title: "Origin Tracking"
        description: "Every fork tracks its base entity ID. Administrators can see the full lineage of any customised resource."
      - title: "Department-Specific Behaviour"
        description: "Each team can tailor agent behaviour for their domain without affecting other departments."

  - id: "distribution"
    title: "Multi-Channel Distribution"
    content: |
      <p>Every user's plugin collection is exported as a complete marketplace bundle containing skills, agents, hooks, MCP server configs, and scripts. The platform serves them over three standard channels: git repositories, a JSON API, and Claude Code plugin format.</p>
      <pre style="background:#1a1a2e;color:#e0e0e0;padding:1.25rem;border-radius:8px;font-size:0.85rem;line-height:1.6;overflow-x:auto;margin:1.5rem 0">
      Distribution Channel     Protocol        Client Compatibility
      ─────────────────────    ──────────      ───────────────────────
      Git Repository           git upload-pack  Any git client, CI/CD
      JSON API                 HTTP GET         Custom integrations, scripts
      Claude Code Plugin       .claude-plugin   Claude Code, Claude Desktop
      </pre>
      <p>Because distribution uses standard protocols (git, HTTP, MCP), it works with any compatible client. The platform is not locked to a single AI vendor or client application.</p>
    items:
      - title: "Git Repository Access"
        description: "Each user's marketplace is available as a git repo via smart upload-pack. Clone, pull, and integrate with existing git workflows."
      - title: "JSON API Endpoint"
        description: "Complete plugin tree served as JSON. Integrate with any system that speaks HTTP."
      - title: "Claude Code Compatible"
        description: "Every plugin bundle includes .claude-plugin/plugin.json metadata. Install with a single --plugin flag."

