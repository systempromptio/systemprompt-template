sections:
  - id: "role-based-access"
    title: "Role-Based Access Control"
    content: |
      <p>Assign roles to users and define access rules per plugin, agent, or MCP server. The unified access_control_rules table supports allow and deny semantics — entities with no rules remain open to all, so you only lock down what matters. Bulk-assign rules across multiple entities in a single operation and keep everything in sync with bi-directional YAML export.</p>
      <p>When the Compliance Agent needs access to audit data but not training content, role-based rules enforce that boundary automatically.</p>
    items:
      - title: "Allow/Deny Semantics"
        description: "Define explicit allow or deny rules per role. Entities without rules default to open access, giving you a clean whitelist model."
      - title: "Bulk Rule Assignment"
        description: "Apply access rules across multiple plugins, agents, and MCP servers at once — no need to configure each entity individually."
      - title: "YAML Sync"
        description: "Bi-directional YAML sync keeps access rules version-controlled and reproducible across environments."

  - id: "department-filtering"
    title: "Department Filtering"
    content: |
      <p>Go beyond roles with department-based access boundaries. Each user carries a department field, and access evaluation considers both roles and department against marketplace rules. Security operations gets threat intelligence tools, training gets content authoring, and compliance gets audit agents — all enforced automatically.</p>
      <p>Combined evaluation means you get fine-grained control without complex rule hierarchies.</p>
    items:
      - title: "Team-Level Boundaries"
        description: "Restrict entire plugin collections to specific departments. Each team sees only the AI capabilities relevant to their work."
      - title: "Combined Evaluation"
        description: "Access decisions evaluate user roles and department together, giving you fine-grained control without complex rule hierarchies."

  - id: "organisation-marketplaces"
    title: "Organisation Marketplaces"
    content: |
      <p>Curate collections of plugins into organisation marketplaces, each with its own access control list. The three-tier model — platform plugins, org marketplaces, user marketplaces — lets you layer broad availability with targeted curation.</p>
      <p>Administrators control what enters each marketplace, and ACL rules determine which roles and departments can access it.</p>
    items:
      - title: "Three-Tier Model"
        description: "Platform plugins provide the global catalogue. Organisation marketplaces curate subsets for teams. User marketplaces let individuals tailor their own workspace."
      - title: "Per-Marketplace ACL"
        description: "Each organisation marketplace carries its own access rules, so you can grant different teams access to different curated collections."
      - title: "Curated Collections"
        description: "Bundle plugins, agents, and MCP servers into coherent toolkits that match team workflows and compliance requirements."

  - id: "user-customisation"
    title: "User-Level Customisation"
    content: |
      <p>Users can fork plugins, skills, agents, and hooks into their own workspace without affecting the organisation defaults. Personal marketplaces let individuals assemble their own toolkit from what the organisation makes available. Admins retain full visibility with admin bypass.</p>
      <p>A security analyst can fork the Threat Intelligence Agent to add custom threat feeds without impacting the organisation-wide configuration.</p>
    items:
      - title: "Plugin Forking"
        description: "Fork any authorised plugin into a personal copy. Customise configuration and behaviour without impacting other users."
      - title: "Personal Marketplaces"
        description: "Assemble a personal marketplace from organisation-approved plugins, creating a focused workspace tailored to individual needs."
      - title: "Admin Bypass"
        description: "Administrators always have full visibility across all plugins, agents, and marketplaces regardless of access rules."

