sections:
  - id: "mcp-native"
    title: "MCP-Native Architecture"
    content: |
      <p>This platform speaks MCP as its native protocol. There is no translation layer, no adapter pattern, no protocol bridge. When your Training Agent or Threat Intelligence Agent discovers tools via MCP, the governance platform is the authority that controls what it can access.</p>
      <p>Every MCP operation flows through the same permission, audit, and rate-limiting infrastructure. The protocol is the governance boundary.</p>
    items:
      - title: "Native Protocol"
        description: "MCP is the wire protocol, not a wrapper. Zero translation overhead, zero compatibility gaps."
      - title: "Agent Discovery"
        description: "Agents discover available tools at runtime via MCP. No hard-coded integrations or static tool lists."
      - title: "Governance Boundary"
        description: "The platform sits between agents and MCP servers. Every tool call passes through permission and audit checks."

  - id: "rbac"
    title: "Integrated RBAC Control Plane"
    content: |
      <p>Every MCP server has RBAC built in as an integrated control layer. Role-based access control is not bolted on — it runs inside each server, enforcing permissions on every tool call. Administrators define roles with granular scopes, and the platform enforces them at the point of execution.</p>
      <p>This is the trusted governance boundary. Authentication, authorisation, rate limiting, and audit logging all happen within the RBAC layer. Because it is integrated into the servers themselves, there is no gap between policy and enforcement.</p>
    items:
      - title: "Built-In Enforcement"
        description: "RBAC is integrated into every MCP server. Permissions are enforced at the point of execution, not at an external proxy."
      - title: "Role-Based Scoping"
        description: "Administrators define roles with granular tool-level permissions. Agents operate within their assigned role boundaries."
      - title: "Audit & Rate Limiting"
        description: "Every tool invocation is authenticated, authorised, rate-limited, and logged within the integrated control plane."

  - id: "oauth2"
    title: "Per-Server OAuth2 Scopes"
    content: |
      <p>Each MCP server has its own OAuth2 configuration with independent scopes. A server that accesses threat intelligence data gets different permissions than one that manages training content. Scopes are enforced at the protocol level. Agents cannot escalate beyond what their MCP server allows.</p>
      <p>Token expiry, scope validation, and credential rotation are handled per-server. Compromising one server's credentials does not grant access to others.</p>
    items:
      - title: "Independent Scopes"
        description: "Each MCP server defines its own OAuth2 scopes. Threat intelligence servers and training servers have separate permission boundaries."
      - title: "Token Management"
        description: "Per-server token expiry and rotation. Credential lifecycle management without cross-server dependencies."
      - title: "Scope Enforcement"
        description: "Protocol-level enforcement means agents cannot escalate beyond their assigned server scopes."

  - id: "tool-hooks"
    title: "Hooks for External Clients"
    content: |
      <p>External clients like Claude Code, Claude Desktop, and third-party integrations operate outside the trusted RBAC boundary. Hooks are the pre-authorisation layer for these non-trusted surfaces. Before a tool call from an external client reaches your MCP servers, hooks validate the request against your governance policies.</p>
      <p>Hooks run synchronously in the client's request path. A denied hook stops the tool call before it leaves the client. This is defence in depth — external clients are governed by hooks, while internal servers are governed by the integrated RBAC control plane.</p>
    items:
      - title: "External Client Pre-Authorisation"
        description: "Hooks intercept tool calls from Claude Code, Claude Desktop, and other non-trusted clients before they reach MCP servers."
      - title: "Defence in Depth"
        description: "Two governance layers: hooks pre-authorise at the client boundary, RBAC enforces at the server. No single point of failure."
      - title: "Client-Side Enforcement"
        description: "Hooks run in the external client's request path. A denied hook stops the tool call at the source, before it hits the network."

  - id: "central-registry"
    title: "Central Registry & Port Isolation"
    content: |
      <p>All MCP servers are registered in a central directory. Administrators see every server, its status, its scopes, and its usage metrics from a single view. Port isolation (range 5000-5999) ensures each server runs on its own port with no cross-server interference.</p>
      <p>The registry is the single source of truth for what MCP capabilities exist in your organisation. Agents query it to discover tools. Administrators use it to monitor and manage the entire MCP fleet.</p>
    items:
      - title: "Central Directory"
        description: "Every MCP server registered, discoverable, and monitored from a single administrative view."
      - title: "Port Isolation"
        description: "Range 5000-5999, one port per server. No cross-server interference or shared process space."
      - title: "Fleet Monitoring"
        description: "Server status, scope configuration, and usage metrics visible across your entire MCP infrastructure."

