# Theme Configuration
# Colors, typography, spacing, and design tokens

branding:
  # ===== CUSTOMIZE THESE FOR EACH DEMO CLIENT =====
  name: "systemprompt.io"
  domain: "systemprompt.io"
  display_name: "systemprompt.io"
  title: "systemprompt.io — AI Governance Platform"
  description: "Control how your organization uses Claude. One platform to deploy, secure, distribute, and observe AI usage across your entire organization."
  copyright: "2026 systemprompt.io"
  themeColor: "#f79938"
  platform_name: "systemprompt.io"
  support_email: "support@systemprompt.io"
  logo_light: "/files/images/logo.svg"
  logo_dark: "/files/images/logo-white.svg"
  favicon: "/files/images/favicon.ico"
  twitter_handle: "@systempromptio"
  password_hash: ""  # Set via: echo -n 'your-password' | sha256sum | cut -d' ' -f1
  session_storage_key: "enterpriseDemoUnlocked"
  # Legacy fields (used by public site pipeline)
  display_sitename: true
  image: "/files/images/logo.png"
  logo:
    primary:
      svg: "/files/images/logo.svg"
      webp: "/files/images/logo.webp"
      png: "/files/images/logo.png"
    dark:
      png: "/files/images/logo.png"
    small:
      png: "/files/images/logo.png"

fonts:
  body:
    family: "OpenSans"
    fallback: "-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif"
    files: []
  heading:
    family: "Inter"
    fallback: "-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif"
    files: []
  brand:
    family: "Inter"
    fallback: "-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif"
    files: []

# Color palette - Blue default (change hue for your brand)
# Hue guide: 0=red, 28=orange, 120=green, 220=blue, 280=purple
colors:
  light:
    primary:
      hsl: "hsl(28, 91%, 50%)"
      rgb: [247, 153, 56]
    secondary:
      hsl: "hsl(28, 91%, 50%)"
      rgb: [247, 153, 56]
    accent: "#f79938"
    success: "#10b981"
    warning: "#f59e0b"
    error: "#ef4444"
    surface:
      default: "#FFFFFF"
      dark: "#FAFAF9"
      variant: "#F5F5F4"
      secondaryContainer: "#FFF7ED"
      errorContainer: "#FEE2E2"
    text:
      primary: "#0F172A"
      secondary: "#475569"
      inverted: "#FFFFFF"
      disabled: "#A8A29E"
    background:
      default: "#FAFAF9"
      dark: "#F5F5F4"
    border:
      default: "#D6D3D1"
      dark: "#A8A29E"
      outline: "#A8A29E"

  dark:
    primary:
      hsl: "hsl(28, 91%, 50%)"
      rgb: [247, 153, 56]
    secondary:
      hsl: "hsl(28, 91%, 50%)"
      rgb: [247, 153, 56]
    accent: "#f79938"
    success: "#34d399"
    warning: "#fbbf24"
    error: "#f87171"
    surface:
      default: "#1C1917"
      dark: "#0C0A09"
      variant: "#292524"
      secondaryContainer: "rgba(247, 153, 56, 0.1)"
      errorContainer: "rgba(248, 113, 113, 0.1)"
    text:
      primary: "#FAFAF9"
      secondary: "#D6D3D1"
      inverted: "#000000"
      disabled: "#78716C"
    background:
      default: "#1C1917"
      dark: "#0C0A09"
    border:
      default: "rgba(255, 255, 255, 0.1)"
      dark: "#44403C"
      outline: "#78716C"

typography:
  sizes:
    xs: "12px"
    sm: "14px"
    md: "16px"
    lg: "18px"
    xl: "20px"
    xxl: "30px"
  weights:
    regular: 400
    medium: 500
    semibold: 600
    bold: 700

spacing:
  xs: "4px"
  sm: "8px"
  md: "16px"
  lg: "24px"
  xl: "32px"
  xxl: "48px"

radius:
  xs: "2px"
  sm: "4px"
  md: "8px"
  lg: "12px"
  xl: "16px"
  xxl: "24px"
  round: "9999px"

shadows:
  light:
    sm: "0 1px 2px rgba(0, 0, 0, 0.04)"
    md: "0 4px 6px rgba(0, 0, 0, 0.07)"
    lg: "0 10px 15px rgba(0, 0, 0, 0.1)"
    accent: "0 4px 14px rgba(247, 153, 56, 0.15)"
  dark:
    sm: "0 2px 4px rgba(0, 0, 0, 0.3)"
    md: "0 4px 8px rgba(0, 0, 0, 0.4)"
    lg: "0 10px 20px rgba(0, 0, 0, 0.5)"
    accent: "0 4px 14px rgba(247, 153, 56, 0.25)"

animation:
  fast: "150ms"
  normal: "250ms"
  slow: "400ms"

zIndex:
  base: 1
  content: 10
  navigation: 100
  modal: 1000
  tooltip: 2000

layout:
  headerHeight: "72px"
  sidebarLeft:
    width: "20%"
    minWidth: "240px"
    maxWidth: "320px"
  sidebarRight:
    width: "15%"
    minWidth: "200px"
    maxWidth: "280px"
  navHeight: "72px"
  contentMaxWidth: "1200px"

card:
  radius:
    default: "16px"
    cut: "4px"
  padding:
    sm: "12px"
    md: "16px"
    lg: "24px"
  gradient:
    start: "rgba(247, 153, 56, 0.08)"
    mid: "rgba(247, 153, 56, 0.04)"
    end: "rgba(247, 153, 56, 0.01)"

mobile:
  spacing:
    xs: "4px"
    sm: "8px"
    md: "12px"
    lg: "16px"
    xl: "24px"
    xxl: "32px"
  typography:
    sizes:
      xs: "11px"
      sm: "13px"
      md: "15px"
      lg: "17px"
      xl: "19px"
      xxl: "26px"
  layout:
    headerHeight: "64px"
    navHeight: "64px"
  card:
    padding:
      sm: "10px"
      md: "12px"
      lg: "16px"

touchTargets:
  default: "44px"
  sm: "40px"
  lg: "48px"
