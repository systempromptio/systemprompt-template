# Navigation Configuration
# Header, footer, and documentation sidebar

header:
  items:
    - id: features
      label: "Features"
      href: "#"
      dropdown: true
      sections:
        - links:
            - label: "DevOps & Deployment"
              href: "/features/devops-and-deployment"
            - label: "Governance & Security"
              href: "/features/governance-and-security"
            - label: "Marketplace & Skill Management"
              href: "/features/marketplace-and-skill-management"
            - label: "Analytics & Observability"
              href: "/features/analytics-and-observability"

    - id: docs
      label: "Docs"
      href: "/documentation"

    - id: presentation
      label: "Presentation"
      href: "/documentation/presentation"

    - id: login
      label: "Login"
      href: "/admin/login"

footer:
  legal:
    - path: "/legal/privacy-policy"
      label: "Privacy Policy"
    - path: "/legal/cookie-policy"
      label: "Cookie Policy"
  resources:
    - path: "/documentation"
      label: "Documentation"

