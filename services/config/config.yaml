# SystemPrompt Services Configuration
# Thin aggregator — every top-level resource file is listed here explicitly.
# Skills and plugins are auto-discovered from nested directories
# (services/skills/<id>/config.yaml, services/plugins/<id>/config.yaml).
# Agents are included as flat files because the runtime loader reads the
# wrapped `agents: {<name>: AgentConfig}` shape, not the DiskAgentConfig
# directory form used by `admin agents create`.

includes:
  # MCP servers
  - ../mcp/systemprompt.yaml
  - ../mcp/skill-manager.yaml

  # AI, scheduler, content
  # Note: ../web/config.yaml is NOT included here — the web domain validator
  # reads it directly as WebConfigRaw (branding at top level). Including it
  # via the aggregator would require a `web:` wrapper, which is incompatible.
  - ../ai/config.yaml
  - ../scheduler/config.yaml
  - ../content/config.yaml

  # Agents (flat, wrapped in `agents:` map)
  - ../agents/developer_agent.yaml
  - ../agents/associate_agent.yaml

settings:
  agentPortRange: [9000, 9999]
  mcpPortRange: [5000, 5999]
  autoStartEnabled: true
  schemaValidationMode: "warn"
