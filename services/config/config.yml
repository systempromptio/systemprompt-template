# SystemPrompt Services Configuration
# This file aggregates all service configurations

includes:
  - ../agents/assistant.yml
  - ../agents/admin.yml
  - ../mcp/systemprompt-admin.yml
  - ../ai/config.yml
  - ../web/config.yml
  - ../scheduler/config.yml

agents: {}
mcp_servers: {}

settings:
  agentPortRange: [9000, 9999]
  mcpPortRange: [5000, 5999]
  autoStartEnabled: true
  validationStrict: true
  schemaValidationMode: "skip"
