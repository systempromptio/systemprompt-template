# Gateway policy baseline. Ingested into `ai_gateway_policies` at boot by
# run_gateway_policy_load. Carries per-call ceilings, quota_windows, and
# safety config. Model exposure lives in the profile's gateway catalog
# (.systemprompt/profiles/<name>/catalog.yaml), not here.
#
# Spec fields (systemprompt_ai::GatewayPolicySpec):
#   max_input_tokens_per_call, max_tool_depth, quota_windows, safety

policies:
  - name: default-quotas
    enabled: true
    spec: {}
