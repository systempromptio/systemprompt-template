ai:
  default_provider: "anthropic"
  default_max_output_tokens: 4096
  sampling:
    enable_smart_routing: false
    fallback_enabled: true
  # `endpoint: ${VAR}` is resolved from the secrets store at startup (same
  # mechanism as api_key). Air-gapped deployments set the *_ENDPOINT secret to
  # an internal mock URL; when the var is absent (normal local/cloud dev) the
  # provider falls back to its built-in external URL — so this is a no-op for
  # non-air-gapped profiles.
  providers:
    anthropic:
      enabled: true
      google_search_enabled: false
      api_key: ${ANTHROPIC_API_KEY}
      endpoint: ${ANTHROPIC_ENDPOINT}
      default_model: claude-sonnet-4-20250514
    openai:
      enabled: true
      api_key: ${OPENAI_API_KEY}
      endpoint: ${OPENAI_ENDPOINT}
      default_model: gpt-4-turbo
      google_search_enabled: false
    gemini:
      enabled: true
      api_key: ${GEMINI_API_KEY}
      endpoint: ${GEMINI_ENDPOINT}
      default_model: gemini-2.5-flash
      google_search_enabled: false
  mcp:
    auto_discover: true
    connect_timeout_ms: 5000
    execution_timeout_ms: 30000
    retry_attempts: 3
  history:
    retention_days: 30
    log_tool_executions: true
