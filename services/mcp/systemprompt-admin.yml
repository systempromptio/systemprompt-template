# SystemPrompt Admin MCP Server Configuration

mcp_servers:
  systemprompt-admin:
    binary: "systemprompt-admin"
    package: "systemprompt-admin"
    path: "services/mcp/systemprompt-admin"
    port: 5002
    endpoint: "http://localhost:8080/api/v1/mcp/systemprompt-admin/mcp"
    enabled: true
    display_in_web: true
    schemas: []
    oauth:
      required: true
      scopes: ["admin"]
      audience: "mcp"
      client_id: null
    description: "SystemPrompt Admin MCP Server - Provides dashboard analytics, user management, and system health monitoring tools for administrators."
