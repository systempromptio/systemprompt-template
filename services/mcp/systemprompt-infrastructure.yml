# SystemPrompt Infrastructure MCP Server Configuration

mcp_servers:
  systemprompt-infrastructure:
    binary: "systemprompt-infrastructure"
    package: "systemprompt-infrastructure"
    path: "services/mcp/systemprompt-infrastructure"
    port: 5010
    endpoint: "http://localhost:8080/api/v1/mcp/systemprompt-infrastructure/mcp"
    enabled: true
    display_in_web: true
    schemas: []
    oauth:
      required: true
      scopes: ["admin"]
      audience: "mcp"
      client_id: null
    description: "SystemPrompt Infrastructure MCP Server - Provides cloud deployment, file sync, database sync, and status monitoring tools for administrators."
