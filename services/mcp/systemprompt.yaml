mcp_servers:
  systemprompt:
    type: internal
    binary: systemprompt-mcp-agent
    package: systemprompt
    port: 5010
    enabled: true
    display_in_web: true
    removable: false
    description: systemprompt.io MCP Server - Execute CLI commands (admin only)
    oauth:
      required: true
      scopes:
      - admin
      audience: mcp
      client_id: null
