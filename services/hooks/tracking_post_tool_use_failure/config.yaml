version: "1.0.0"
enabled: true
event: PostToolUseFailure
matcher: "*"
command: "${CLAUDE_PLUGIN_ROOT}/scripts/track-{plugin_id}-usage.sh"
async: true
category: system
plugins:
  - common-skills
tags:
  - tracking
  - analytics
  - errors
visible_to:
  - admin
