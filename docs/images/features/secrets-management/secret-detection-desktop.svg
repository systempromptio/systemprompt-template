<svg viewBox="0 0 560 400" xmlns="http://www.w3.org/2000/svg">
  <title>Real-Time Secret Detection - Scanning Pipeline</title>

  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <style>
    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; transition: none !important; }
    }
  </style>

  <!-- Input: Tool Call -->
  <rect x="40" y="170" width="80" height="50" rx="4" fill="hsl(28, 91%, 55%)" fill-opacity="0.06" stroke="hsl(28, 91%, 50%)" stroke-width="1"/>
  <text x="80" y="198" text-anchor="middle" fill="hsl(28, 91%, 60%)" font-family="monospace" font-size="11">tool call</text>

  <!-- Arrow: Input to Scanner -->
  <line x1="124" y1="195" x2="178" y2="195" stroke="hsl(28, 91%, 40%)" stroke-width="1" stroke-linecap="round"/>
  <polygon points="174,189 184,195 174,201" fill="hsl(28, 91%, 50%)" opacity="0.8"/>

  <!-- Scanner Gate -->
  <rect x="185" y="130" width="190" height="130" rx="4" fill="hsl(28, 91%, 55%)" fill-opacity="0.05" stroke="hsl(28, 91%, 50%)" stroke-width="1" filter="url(#glow)"/>

  <!-- Magnifying glass icon -->
  <circle cx="220" cy="160" r="8" fill="none" stroke="hsl(28, 91%, 60%)" stroke-width="0.5"/>
  <line x1="226" y1="166" x2="232" y2="172" stroke="hsl(28, 91%, 60%)" stroke-width="0.5"/>
  <text x="245" y="164" text-anchor="start" fill="hsl(28, 91%, 60%)" font-family="monospace" font-size="10">SCANNER</text>

  <!-- Pattern badges along scanner -->
  <g>
    <rect x="200" y="182" width="48" height="16" rx="8" fill="hsl(28, 91%, 55%)" fill-opacity="0.08" stroke="hsl(28, 91%, 50%)" stroke-width="0.5"/>
    <text x="224" y="193" text-anchor="middle" fill="hsl(28, 91%, 60%)" font-family="monospace" font-size="8">AWS</text>

    <rect x="256" y="182" width="48" height="16" rx="8" fill="hsl(28, 91%, 55%)" fill-opacity="0.08" stroke="hsl(28, 91%, 50%)" stroke-width="0.5"/>
    <text x="280" y="193" text-anchor="middle" fill="hsl(28, 91%, 60%)" font-family="monospace" font-size="8">GitHub</text>

    <rect x="312" y="182" width="48" height="16" rx="8" fill="hsl(28, 91%, 55%)" fill-opacity="0.08" stroke="hsl(28, 91%, 50%)" stroke-width="0.5"/>
    <text x="336" y="193" text-anchor="middle" fill="hsl(28, 91%, 60%)" font-family="monospace" font-size="8">JWT</text>

    <rect x="200" y="206" width="48" height="16" rx="8" fill="hsl(28, 91%, 55%)" fill-opacity="0.08" stroke="hsl(28, 91%, 50%)" stroke-width="0.5"/>
    <text x="224" y="217" text-anchor="middle" fill="hsl(28, 91%, 60%)" font-family="monospace" font-size="8">Stripe</text>

    <rect x="256" y="206" width="48" height="16" rx="8" fill="hsl(28, 91%, 55%)" fill-opacity="0.08" stroke="hsl(28, 91%, 50%)" stroke-width="0.5"/>
    <text x="280" y="217" text-anchor="middle" fill="hsl(28, 91%, 60%)" font-family="monospace" font-size="8">DB URI</text>

    <rect x="312" y="206" width="48" height="16" rx="8" fill="hsl(28, 91%, 55%)" fill-opacity="0.08" stroke="hsl(28, 91%, 50%)" stroke-width="0.5"/>
    <text x="336" y="217" text-anchor="middle" fill="hsl(28, 91%, 60%)" font-family="monospace" font-size="8">API</text>

    <rect x="228" y="230" width="48" height="16" rx="8" fill="hsl(28, 91%, 55%)" fill-opacity="0.08" stroke="hsl(28, 91%, 50%)" stroke-width="0.5"/>
    <text x="252" y="241" text-anchor="middle" fill="hsl(28, 91%, 60%)" font-family="monospace" font-size="8">Slack</text>

    <rect x="284" y="230" width="48" height="16" rx="8" fill="hsl(28, 91%, 55%)" fill-opacity="0.08" stroke="hsl(28, 91%, 50%)" stroke-width="0.5"/>
    <text x="308" y="241" text-anchor="middle" fill="hsl(28, 91%, 60%)" font-family="monospace" font-size="8">35+</text>
  </g>

  <!-- Clean output path (right) -->
  <line x1="379" y1="195" x2="430" y2="195" stroke="hsl(28, 91%, 40%)" stroke-width="1" stroke-linecap="round"/>
  <polygon points="426,189 436,195 426,201" fill="hsl(28, 91%, 50%)" opacity="0.8"/>

  <!-- Clean output box -->
  <rect x="440" y="170" width="80" height="50" rx="4" fill="hsl(28, 91%, 55%)" fill-opacity="0.06" stroke="hsl(28, 91%, 50%)" stroke-width="1"/>
  <!-- Checkmark -->
  <polyline points="468,193 476,201 492,185" fill="none" stroke="hsl(28, 91%, 60%)" stroke-width="0.5"/>
  <text x="480" y="215" text-anchor="middle" fill="hsl(28, 91%, 60%)" font-family="monospace" font-size="9" opacity="0.6">clean</text>

  <!-- Blocked path (downward) -->
  <line x1="280" y1="264" x2="280" y2="310" stroke="hsl(28, 91%, 40%)" stroke-width="0.5" stroke-linecap="round"/>
  <polygon points="275,306 280,316 285,306" fill="hsl(28, 91%, 50%)" opacity="0.6"/>

  <!-- Block indicator -->
  <rect x="248" y="320" width="64" height="36" rx="4" fill="hsl(28, 91%, 55%)" fill-opacity="0.05" stroke="hsl(28, 91%, 50%)" stroke-width="0.5"/>
  <!-- X icon -->
  <line x1="272" y1="330" x2="288" y2="346" stroke="hsl(28, 91%, 60%)" stroke-width="0.5"/>
  <line x1="288" y1="330" x2="272" y2="346" stroke="hsl(28, 91%, 60%)" stroke-width="0.5"/>
  <text x="280" y="372" text-anchor="middle" fill="hsl(28, 91%, 60%)" font-family="monospace" font-size="9" opacity="0.5">blocked</text>
</svg>
