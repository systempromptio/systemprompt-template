<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <marker id="arrow" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,3 L0,6 Z" fill="#464E5D"/>
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,3 L0,6 Z" fill="#A2AAB9"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="22" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#252526" letter-spacing="1.5">SINGLE BINARY ARCHITECTURE</text>
  <rect x="310" y="27" width="180" height="3" rx="1.5" fill="#EF4623"/>

  <!-- Single Rust Binary box -->
  <rect x="270" y="44" width="260" height="52" rx="6" fill="none" stroke="#D6DCE8" stroke-width="1"/>
  <rect x="270" y="44" width="260" height="4" rx="2" fill="#EF4623"/>
  <text x="400" y="66" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#252526">Single Rust Binary</text>
  <text x="400" y="84" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#A2AAB9">~50MB / Zero runtime dependencies</text>

  <!-- Arrow from binary to embedded components -->
  <line x1="400" y1="96" x2="400" y2="112" stroke="#464E5D" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Embedded Components dashed container -->
  <rect x="40" y="115" width="560" height="80" rx="6" fill="none" stroke="#D6DCE8" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="320" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#A2AAB9" letter-spacing="1">EMBEDDED COMPONENTS</text>

  <!-- 5 component boxes -->
  <!-- 1. Web Server -->
  <rect x="52" y="138" width="100" height="48" rx="6" fill="none" stroke="#D6DCE8" stroke-width="1"/>
  <rect x="52" y="138" width="100" height="4" rx="2" fill="#0071CE"/>
  <text x="102" y="162" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#252526">Web Server</text>
  <text x="102" y="176" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#A2AAB9">HTTP/TLS</text>

  <!-- 2. API -->
  <rect x="162" y="138" width="100" height="48" rx="6" fill="none" stroke="#D6DCE8" stroke-width="1"/>
  <rect x="162" y="138" width="100" height="4" rx="2" fill="#22c55e"/>
  <text x="212" y="162" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#252526">API</text>
  <text x="212" y="176" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#A2AAB9">REST/JSON</text>

  <!-- 3. Job Runner -->
  <rect x="272" y="138" width="100" height="48" rx="6" fill="none" stroke="#D6DCE8" stroke-width="1"/>
  <rect x="272" y="138" width="100" height="4" rx="2" fill="#f97316"/>
  <text x="322" y="162" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#252526">Job Runner</text>
  <text x="322" y="176" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#A2AAB9">Async Tasks</text>

  <!-- 4. Template Engine -->
  <rect x="382" y="138" width="100" height="48" rx="6" fill="none" stroke="#D6DCE8" stroke-width="1"/>
  <rect x="382" y="138" width="100" height="4" rx="2" fill="#6366f1"/>
  <text x="432" y="162" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#252526">Template Engine</text>
  <text x="432" y="176" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#A2AAB9">SSG/SSR</text>

  <!-- 5. Governance -->
  <rect x="492" y="138" width="100" height="48" rx="6" fill="none" stroke="#D6DCE8" stroke-width="1"/>
  <rect x="492" y="138" width="100" height="4" rx="2" fill="#EF4623"/>
  <text x="542" y="162" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#252526">Governance</text>
  <text x="542" y="176" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#A2AAB9">Policy Engine</text>

  <!-- Right side: Integration points -->
  <rect x="640" y="115" width="140" height="148" rx="6" fill="none" stroke="#D6DCE8" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="710" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#A2AAB9" letter-spacing="1">INTEGRATIONS</text>

  <!-- IdP -->
  <rect x="652" y="137" width="116" height="36" rx="6" fill="none" stroke="#D6DCE8" stroke-width="1"/>
  <rect x="652" y="137" width="116" height="3" rx="1.5" fill="#0071CE"/>
  <text x="710" y="155" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#252526">IdP</text>
  <text x="710" y="167" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#A2AAB9">OAuth2 / JWT</text>

  <!-- SIEM -->
  <rect x="652" y="179" width="116" height="36" rx="6" fill="none" stroke="#D6DCE8" stroke-width="1"/>
  <rect x="652" y="179" width="116" height="3" rx="1.5" fill="#22c55e"/>
  <text x="710" y="197" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#252526">SIEM</text>
  <text x="710" y="209" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#A2AAB9">JSON Logs</text>

  <!-- CI/CD -->
  <rect x="652" y="221" width="116" height="36" rx="6" fill="none" stroke="#D6DCE8" stroke-width="1"/>
  <rect x="652" y="221" width="116" height="3" rx="1.5" fill="#6366f1"/>
  <text x="710" y="239" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#252526">CI/CD</text>
  <text x="710" y="251" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#A2AAB9">Docker</text>

  <!-- Dashed lines from binary to integrations -->
  <line x1="600" y1="155" x2="650" y2="155" stroke="#A2AAB9" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arrow-gray)"/>
  <line x1="600" y1="165" x2="620" y2="197" stroke="#A2AAB9" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="620" y1="197" x2="650" y2="197" stroke="#A2AAB9" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arrow-gray)"/>
  <line x1="600" y1="175" x2="620" y2="239" stroke="#A2AAB9" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="620" y1="239" x2="650" y2="239" stroke="#A2AAB9" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arrow-gray)"/>

  <!-- Bottom left: PostgreSQL -->
  <rect x="60" y="270" width="140" height="52" rx="6" fill="none" stroke="#D6DCE8" stroke-width="1"/>
  <rect x="60" y="270" width="140" height="4" rx="2" fill="#22c55e"/>
  <text x="130" y="294" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#252526">PostgreSQL</text>
  <text x="130" y="310" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#A2AAB9">One dependency</text>

  <!-- Arrow from binary area to PostgreSQL -->
  <line x1="130" y1="195" x2="130" y2="268" stroke="#464E5D" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Bottom right: Profile switching -->
  <text x="460" y="275" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#A2AAB9" letter-spacing="1">PROFILE SWITCHING</text>

  <!-- Local -->
  <rect x="310" y="286" width="80" height="36" rx="6" fill="none" stroke="#D6DCE8" stroke-width="1"/>
  <rect x="310" y="286" width="80" height="3" rx="1.5" fill="#0071CE"/>
  <text x="350" y="308" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#252526">Local</text>

  <!-- Arrow -->
  <line x1="392" y1="304" x2="418" y2="304" stroke="#464E5D" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Staging -->
  <rect x="420" y="286" width="80" height="36" rx="6" fill="none" stroke="#D6DCE8" stroke-width="1"/>
  <rect x="420" y="286" width="80" height="3" rx="1.5" fill="#f97316"/>
  <text x="460" y="308" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#252526">Staging</text>

  <!-- Arrow -->
  <line x1="502" y1="304" x2="528" y2="304" stroke="#464E5D" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Production -->
  <rect x="530" y="286" width="80" height="36" rx="6" fill="none" stroke="#D6DCE8" stroke-width="1"/>
  <rect x="530" y="286" width="80" height="3" rx="1.5" fill="#22c55e"/>
  <text x="570" y="308" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#252526">Production</text>

  <!-- Legend bar -->
  <rect x="40" y="348" width="720" height="32" rx="6" fill="#F7F4EF" stroke="#D6DCE8" stroke-width="1"/>
  <circle cx="70" cy="364" r="5" fill="#EF4623"/>
  <text x="82" y="368" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#464E5D">Binary</text>
  <circle cx="140" cy="364" r="5" fill="#0071CE"/>
  <text x="152" y="368" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#464E5D">Web</text>
  <circle cx="200" cy="364" r="5" fill="#22c55e"/>
  <text x="212" y="368" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#464E5D">Database</text>
  <circle cx="278" cy="364" r="5" fill="#6366f1"/>
  <text x="290" y="368" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#464E5D">Engine</text>

  <text x="740" y="368" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#A2AAB9">systemprompt.io deployment</text>
</svg>