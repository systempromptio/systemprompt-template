<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#A2AAB9"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#22c55e"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#ef4444"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" fill="#252526" font-size="14" font-weight="700" letter-spacing="0.5">GOVERNANCE PIPELINE</text>
  <line x1="310" y1="36" x2="490" y2="36" stroke="#EF4623" stroke-width="2" opacity="0.6"/>

  <!-- ===== TOP ROW: Main Pipeline Flow ===== -->

  <!-- 1. Agent Tool Call -->
  <rect x="16" y="56" width="108" height="44" rx="6" fill="none" stroke="#D6DCE8" stroke-width="1"/>
  <text x="70" y="74" text-anchor="middle" fill="#252526" font-size="9" font-weight="600">Agent</text>
  <text x="70" y="88" text-anchor="middle" fill="#464E5D" font-size="8">Tool Call</text>

  <!-- Arrow 1→2 -->
  <line x1="124" y1="78" x2="148" y2="78" stroke="#A2AAB9" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 2. PreToolUse Hook -->
  <rect x="150" y="56" width="108" height="44" rx="6" fill="none" stroke="#0071CE" stroke-width="1.5"/>
  <text x="204" y="74" text-anchor="middle" fill="#252526" font-size="9" font-weight="600">PreToolUse</text>
  <text x="204" y="88" text-anchor="middle" fill="#7dd3fc" font-size="8">Hook Intercept</text>

  <!-- Arrow 2→3 -->
  <line x1="258" y1="78" x2="282" y2="78" stroke="#A2AAB9" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 3. Governance Engine (large box) -->
  <rect x="284" y="48" width="200" height="60" rx="6" fill="none" stroke="#0071CE" stroke-width="2"/>
  <text x="384" y="68" text-anchor="middle" fill="#252526" font-size="11" font-weight="700">Governance Engine</text>
  <text x="384" y="82" text-anchor="middle" fill="#464E5D" font-size="7">4 evaluation layers</text>
  <text x="384" y="94" text-anchor="middle" fill="#464E5D" font-size="7">sequential pass-through</text>

  <!-- Arrow 3→4 -->
  <line x1="484" y1="78" x2="508" y2="78" stroke="#A2AAB9" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 4. Decision diamond (as rounded rect) -->
  <rect x="510" y="56" width="80" height="44" rx="22" fill="none" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="550" y="74" text-anchor="middle" fill="#f97316" font-size="10" font-weight="700">Decision</text>
  <text x="550" y="86" text-anchor="middle" fill="#464E5D" font-size="7">allow | deny</text>

  <!-- Arrow Decision → Audit Log -->
  <line x1="590" y1="78" x2="614" y2="78" stroke="#A2AAB9" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 5. Audit Log -->
  <rect x="616" y="56" width="108" height="44" rx="6" fill="none" stroke="#6366f1" stroke-width="1.5"/>
  <text x="670" y="74" text-anchor="middle" fill="#252526" font-size="9" font-weight="600">Audit Log</text>
  <text x="670" y="88" text-anchor="middle" fill="#464E5D" font-size="8">Every request</text>

  <!-- ===== MIDDLE ROW: 4 Governance Layers ===== -->

  <!-- Connector: Engine box down to layers -->
  <line x1="384" y1="108" x2="384" y2="128" stroke="#D6DCE8" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Horizontal bar connecting all 4 layers -->
  <line x1="106" y1="136" x2="694" y2="136" stroke="#D6DCE8" stroke-width="1"/>

  <!-- Drop lines to each layer -->
  <line x1="106" y1="136" x2="106" y2="146" stroke="#D6DCE8" stroke-width="1"/>
  <line x1="302" y1="136" x2="302" y2="146" stroke="#D6DCE8" stroke-width="1"/>
  <line x1="498" y1="136" x2="498" y2="146" stroke="#D6DCE8" stroke-width="1"/>
  <line x1="694" y1="136" x2="694" y2="146" stroke="#D6DCE8" stroke-width="1"/>

  <!-- Layer 1: Scope Check (green) -->
  <rect x="22" y="148" width="168" height="64" rx="6" fill="none" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="22" y="148" width="168" height="4" rx="2" fill="#22c55e" opacity="0.8"/>
  <text x="38" y="168" fill="#4ade80" font-size="8" font-weight="700">1</text>
  <text x="50" y="168" fill="#252526" font-size="9" font-weight="600">Scope Check</text>
  <text x="106" y="184" text-anchor="middle" fill="#86efac" font-size="8">admin / user / a2a</text>
  <text x="106" y="198" text-anchor="middle" fill="#4ade80" font-size="7" opacity="0.7">Role-based access control</text>

  <!-- Layer 2: Secret Detection (red) -->
  <rect x="218" y="148" width="168" height="64" rx="6" fill="none" stroke="#ef4444" stroke-width="1.5"/>
  <rect x="218" y="148" width="168" height="4" rx="2" fill="#ef4444" opacity="0.8"/>
  <text x="234" y="168" fill="#f87171" font-size="8" font-weight="700">2</text>
  <text x="246" y="168" fill="#252526" font-size="9" font-weight="600">Secret Detection</text>
  <text x="302" y="184" text-anchor="middle" fill="#fca5a5" font-size="8">35+ regex patterns</text>
  <text x="302" y="198" text-anchor="middle" fill="#f87171" font-size="7" opacity="0.7">Keys, tokens, credentials</text>

  <!-- Layer 3: Blocklist (orange) -->
  <rect x="414" y="148" width="168" height="64" rx="6" fill="none" stroke="#f97316" stroke-width="1.5"/>
  <rect x="414" y="148" width="168" height="4" rx="2" fill="#f97316" opacity="0.8"/>
  <text x="430" y="168" fill="#fb923c" font-size="8" font-weight="700">3</text>
  <text x="442" y="168" fill="#252526" font-size="9" font-weight="600">Blocklist</text>
  <text x="498" y="184" text-anchor="middle" fill="#fdba74" font-size="8">destructive ops blocked</text>
  <text x="498" y="198" text-anchor="middle" fill="#fb923c" font-size="7" opacity="0.7">rm -rf, DROP TABLE, etc.</text>

  <!-- Layer 4: Rate Limiting (blue) -->
  <rect x="610" y="148" width="168" height="64" rx="6" fill="none" stroke="#0071CE" stroke-width="1.5"/>
  <rect x="610" y="148" width="168" height="4" rx="2" fill="#0071CE" opacity="0.8"/>
  <text x="626" y="168" fill="#60a5fa" font-size="8" font-weight="700">4</text>
  <text x="638" y="168" fill="#252526" font-size="9" font-weight="600">Rate Limiting</text>
  <text x="694" y="184" text-anchor="middle" fill="#93c5fd" font-size="8">300 / min / session</text>
  <text x="694" y="198" text-anchor="middle" fill="#60a5fa" font-size="7" opacity="0.7">Sliding window counter</text>

  <!-- Sequence arrows between layers -->
  <line x1="190" y1="180" x2="218" y2="180" stroke="#D6DCE8" stroke-width="1" marker-end="url(#arrow)" stroke-dasharray="4,2"/>
  <line x1="386" y1="180" x2="414" y2="180" stroke="#D6DCE8" stroke-width="1" marker-end="url(#arrow)" stroke-dasharray="4,2"/>
  <line x1="582" y1="180" x2="610" y2="180" stroke="#D6DCE8" stroke-width="1" marker-end="url(#arrow)" stroke-dasharray="4,2"/>

  <!-- ===== BOTTOM ROW: Decision Outcomes ===== -->

  <!-- Fork from Decision box -->
  <!-- ALLOW path (left-ish) -->
  <line x1="530" y1="100" x2="530" y2="280" stroke="#22c55e" stroke-width="1.5" opacity="0.6"/>
  <line x1="530" y1="280" x2="380" y2="280" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow-green)" opacity="0.6"/>

  <!-- ALLOW label -->
  <rect x="498" y="238" width="64" height="20" rx="10" fill="#dcfce7" opacity="0.9"/>
  <text x="530" y="252" text-anchor="middle" fill="#4ade80" font-size="8" font-weight="700">ALLOW</text>

  <!-- Tool Executes box -->
  <rect x="244" y="264" width="134" height="40" rx="6" fill="none" stroke="#22c55e" stroke-width="1.2"/>
  <text x="311" y="281" text-anchor="middle" fill="#252526" font-size="9" font-weight="600">Tool Executes</text>
  <text x="311" y="295" text-anchor="middle" fill="#86efac" font-size="7">Normal operation</text>

  <!-- Arrow to PostToolUse -->
  <line x1="244" y1="284" x2="186" y2="284" stroke="#22c55e" stroke-width="1.2" marker-end="url(#arrow-green)"/>

  <!-- PostToolUse box -->
  <rect x="52" y="264" width="134" height="40" rx="6" fill="none" stroke="#22c55e" stroke-width="1" opacity="0.8"/>
  <text x="119" y="281" text-anchor="middle" fill="#252526" font-size="9" font-weight="600">PostToolUse</text>
  <text x="119" y="295" text-anchor="middle" fill="#86efac" font-size="7">Usage tracking</text>

  <!-- DENY path (right-ish) -->
  <line x1="570" y1="100" x2="570" y2="280" stroke="#ef4444" stroke-width="1.5" opacity="0.6"/>
  <line x1="570" y1="280" x2="618" y2="280" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrow-red)" opacity="0.6"/>

  <!-- DENY label -->
  <rect x="538" y="300" width="64" height="20" rx="10" fill="#fee2e2" opacity="0.9"/>
  <text x="570" y="314" text-anchor="middle" fill="#fca5a5" font-size="8" font-weight="700">DENY</text>

  <!-- Blocked box -->
  <rect x="620" y="264" width="134" height="40" rx="6" fill="none" stroke="#ef4444" stroke-width="1.2"/>
  <text x="687" y="281" text-anchor="middle" fill="#252526" font-size="9" font-weight="600">Blocked</text>
  <text x="687" y="295" text-anchor="middle" fill="#fca5a5" font-size="7">Reason logged</text>

  <!-- ===== BOTTOM: Legend / Footer ===== -->
  <line x1="40" y1="340" x2="760" y2="340" stroke="#D6DCE8" stroke-width="1"/>

  <!-- Legend items -->
  <circle cx="60" cy="360" r="4" fill="#22c55e" opacity="0.8"/>
  <text x="70" y="363" fill="#464E5D" font-size="7">Scope</text>
  <circle cx="120" cy="360" r="4" fill="#ef4444" opacity="0.8"/>
  <text x="130" y="363" fill="#464E5D" font-size="7">Secrets</text>
  <circle cx="185" cy="360" r="4" fill="#f97316" opacity="0.8"/>
  <text x="195" y="363" fill="#464E5D" font-size="7">Blocklist</text>
  <circle cx="260" cy="360" r="4" fill="#0071CE" opacity="0.8"/>
  <text x="270" y="363" fill="#464E5D" font-size="7">Rate Limit</text>

  <text x="760" y="363" text-anchor="end" fill="#A2AAB9" font-size="7">systemprompt.io governance</text>

  <!-- Bottom accent line -->
  <rect x="0" y="394" width="800" height="6" rx="0" fill="#0071CE" opacity="0.15"/>
</svg>