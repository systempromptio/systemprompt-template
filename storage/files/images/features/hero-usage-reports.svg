<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#A2AAB9"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#252526" letter-spacing="1.5">REPORTING PIPELINE</text>
  <rect x="335" y="33" width="130" height="3" rx="1.5" fill="#EF4623"/>

  <!-- ===== LEFT: Webhook Ingestion ===== -->
  <rect x="20" y="65" width="120" height="70" rx="6" fill="none" stroke="#D6DCE8" stroke-width="1"/>
  <rect x="20" y="65" width="120" height="4" rx="2" fill="#EF4623"/>
  <text x="80" y="90" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#252526">Webhook</text>
  <text x="80" y="104" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#252526">Ingestion</text>
  <text x="80" y="120" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#464E5D">Real-time events</text>
  <rect x="45" y="140" width="70" height="16" rx="3" fill="#F7F4EF" stroke="#D6DCE8" stroke-width="0.5"/>
  <text x="80" y="151" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" font-weight="600" fill="#EF4623">HTTP POST</text>

  <!-- Arrow: Webhook → Step 1 -->
  <line x1="140" y1="100" x2="163" y2="100" stroke="#A2AAB9" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ===== PIPELINE STEPS (evenly spaced, room for numbers) ===== -->

  <!-- Step 1: Event Processing -->
  <rect x="165" y="72" width="120" height="56" rx="6" fill="none" stroke="#D6DCE8" stroke-width="1"/>
  <rect x="165" y="72" width="120" height="4" rx="2" fill="#EF4623"/>
  <rect x="173" y="80" width="16" height="16" rx="8" fill="#EF4623"/>
  <text x="181" y="92" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="700" fill="none">1</text>
  <text x="225" y="97" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#252526">Event</text>
  <text x="225" y="112" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#252526">Processing</text>

  <!-- Arrow 1→2 -->
  <line x1="285" y1="100" x2="308" y2="100" stroke="#A2AAB9" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Step 2: Deduplication -->
  <rect x="310" y="72" width="120" height="56" rx="6" fill="none" stroke="#D6DCE8" stroke-width="1"/>
  <rect x="310" y="72" width="120" height="4" rx="2" fill="#0071CE"/>
  <rect x="318" y="80" width="16" height="16" rx="8" fill="#0071CE"/>
  <text x="326" y="92" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="700" fill="none">2</text>
  <text x="370" y="105" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#252526">Deduplication</text>

  <!-- Arrow 2→3 -->
  <line x1="430" y1="100" x2="453" y2="100" stroke="#A2AAB9" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Step 3: Session Summaries -->
  <rect x="455" y="72" width="120" height="56" rx="6" fill="none" stroke="#D6DCE8" stroke-width="1"/>
  <rect x="455" y="72" width="120" height="4" rx="2" fill="#22c55e"/>
  <rect x="463" y="80" width="16" height="16" rx="8" fill="#22c55e"/>
  <text x="471" y="92" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="700" fill="none">3</text>
  <text x="515" y="97" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#252526">Session</text>
  <text x="515" y="112" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#252526">Summaries</text>

  <!-- Arrow 3→4 -->
  <line x1="575" y1="100" x2="598" y2="100" stroke="#A2AAB9" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Step 4: Daily Aggregation -->
  <rect x="600" y="72" width="120" height="56" rx="6" fill="none" stroke="#D6DCE8" stroke-width="1"/>
  <rect x="600" y="72" width="120" height="4" rx="2" fill="#6366f1"/>
  <rect x="608" y="80" width="16" height="16" rx="8" fill="#6366f1"/>
  <text x="616" y="92" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="700" fill="none">4</text>
  <text x="660" y="97" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#252526">Daily</text>
  <text x="660" y="112" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#252526">Aggregation</text>

  <!-- ===== OUTPUT: Vertical drop from step 4 to 3 output boxes ===== -->
  <line x1="660" y1="128" x2="660" y2="148" stroke="#A2AAB9" stroke-width="1.2"/>
  <line x1="660" y1="148" x2="760" y2="148" stroke="#A2AAB9" stroke-width="1"/>
  <line x1="660" y1="148" x2="660" y2="160" stroke="#A2AAB9" stroke-width="1"/>

  <!-- Dashboard -->
  <line x1="760" y1="148" x2="760" y2="158" stroke="#A2AAB9" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="710" y="162" width="80" height="40" rx="6" fill="none" stroke="#D6DCE8" stroke-width="1"/>
  <rect x="710" y="162" width="80" height="4" rx="2" fill="#0071CE"/>
  <text x="750" y="181" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#252526">Dashboard</text>
  <text x="750" y="194" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="7" fill="#464E5D">Real-time view</text>

  <!-- CLI Analytics -->
  <line x1="660" y1="160" x2="660" y2="168" stroke="#A2AAB9" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="610" y="172" width="100" height="40" rx="6" fill="none" stroke="#D6DCE8" stroke-width="1"/>
  <rect x="610" y="172" width="100" height="4" rx="2" fill="#22c55e"/>
  <text x="660" y="191" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#252526">CLI Analytics</text>
  <text x="660" y="204" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="7" fill="#464E5D">systemprompt analytics</text>

  <!-- ===== SEPARATOR ===== -->
  <line x1="40" y1="240" x2="760" y2="240" stroke="#D6DCE8" stroke-width="0.5" stroke-dasharray="4,3"/>
  <text x="400" y="260" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#A2AAB9" letter-spacing="1">BREAKDOWN DIMENSIONS</text>

  <!-- ===== BOTTOM ROW: 4 dimension boxes + cost badge ===== -->
  <!-- By Model -->
  <rect x="30" y="278" width="150" height="52" rx="6" fill="none" stroke="#D6DCE8" stroke-width="1"/>
  <rect x="30" y="278" width="150" height="4" rx="2" fill="#EF4623"/>
  <text x="105" y="300" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#252526">By Model</text>
  <text x="105" y="316" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#464E5D">GPT-4, Claude, etc.</text>

  <!-- By Agent -->
  <rect x="195" y="278" width="150" height="52" rx="6" fill="none" stroke="#D6DCE8" stroke-width="1"/>
  <rect x="195" y="278" width="150" height="4" rx="2" fill="#0071CE"/>
  <text x="270" y="300" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#252526">By Agent</text>
  <text x="270" y="316" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#464E5D">Per-agent metrics</text>

  <!-- By Department -->
  <rect x="360" y="278" width="150" height="52" rx="6" fill="none" stroke="#D6DCE8" stroke-width="1"/>
  <rect x="360" y="278" width="150" height="4" rx="2" fill="#22c55e"/>
  <text x="435" y="300" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#252526">By Department</text>
  <text x="435" y="316" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#464E5D">Team breakdown</text>

  <!-- By User -->
  <rect x="525" y="278" width="150" height="52" rx="6" fill="none" stroke="#D6DCE8" stroke-width="1"/>
  <rect x="525" y="278" width="150" height="4" rx="2" fill="#6366f1"/>
  <text x="600" y="300" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#252526">By User</text>
  <text x="600" y="316" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#464E5D">Individual tracking</text>

  <!-- Cost tracking badge -->
  <rect x="695" y="278" width="85" height="52" rx="6" fill="none" stroke="#EF4623" stroke-width="1.5"/>
  <text x="737" y="300" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#EF4623">$</text>
  <text x="737" y="318" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" font-weight="600" fill="#252526">Cost Tracking</text>

  <!-- Legend -->
  <circle cx="100" cy="375" r="4" fill="#EF4623"/>
  <text x="110" y="378" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#464E5D">Ingestion</text>
  <circle cx="185" cy="375" r="4" fill="#0071CE"/>
  <text x="195" y="378" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#464E5D">Processing</text>
  <circle cx="275" cy="375" r="4" fill="#22c55e"/>
  <text x="285" y="378" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#464E5D">Summaries</text>
  <circle cx="365" cy="375" r="4" fill="#6366f1"/>
  <text x="375" y="378" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#464E5D">Aggregation</text>

  <!-- Bottom right branding -->
  <text x="760" y="378" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#A2AAB9">systemprompt.io reports</text>
</svg>
