<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#464E5D"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="24" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#252526" letter-spacing="1.5">ANALYTICS DATA FLOW</text>
  <rect x="325" y="30" width="150" height="3" rx="1.5" fill="#EF4623"/>

  <!-- Left column: Event categories -->
  <text x="30" y="62" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#252526">Event Categories</text>

  <!-- Event rows -->
  <rect x="30" y="70" width="150" height="24" rx="4" fill="none" stroke="#D6DCE8" stroke-width="0.5"/>
  <circle cx="46" cy="82" r="4" fill="#EF4623"/>
  <text x="58" y="86" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#252526">Login</text>

  <rect x="30" y="96" width="150" height="24" rx="4" fill="#F7F4EF" stroke="#D6DCE8" stroke-width="0.5"/>
  <circle cx="46" cy="108" r="4" fill="#f97316"/>
  <text x="58" y="112" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#252526">Session</text>

  <rect x="30" y="122" width="150" height="24" rx="4" fill="none" stroke="#D6DCE8" stroke-width="0.5"/>
  <circle cx="46" cy="134" r="4" fill="#0071CE"/>
  <text x="58" y="138" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#252526">Prompt</text>

  <rect x="30" y="148" width="150" height="24" rx="4" fill="#F7F4EF" stroke="#D6DCE8" stroke-width="0.5"/>
  <circle cx="46" cy="160" r="4" fill="#22c55e"/>
  <text x="58" y="164" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#252526">ToolUsage</text>

  <rect x="30" y="174" width="150" height="24" rx="4" fill="none" stroke="#D6DCE8" stroke-width="0.5"/>
  <circle cx="46" cy="186" r="4" fill="#6366f1"/>
  <text x="58" y="190" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#252526">AgentStart</text>

  <rect x="30" y="200" width="150" height="24" rx="4" fill="#F7F4EF" stroke="#D6DCE8" stroke-width="0.5"/>
  <circle cx="46" cy="212" r="4" fill="#A2AAB9"/>
  <text x="58" y="216" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#464E5D" font-style="italic">+ 8 more...</text>

  <text x="105" y="240" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#A2AAB9">13 categories</text>

  <!-- Arrow from events to processing -->
  <line x1="180" y1="145" x2="230" y2="145" stroke="#464E5D" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Center: Processing pipeline -->
  <!-- Box 1: Event Processing -->
  <rect x="235" y="90" width="145" height="55" rx="6" fill="none" stroke="#D6DCE8" stroke-width="1"/>
  <rect x="235" y="90" width="145" height="4" rx="2" fill="#EF4623"/>
  <text x="240" y="110" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="700" fill="#A2AAB9">1</text>
  <text x="307" y="118" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#252526">Event Processing</text>
  <text x="307" y="135" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#464E5D">Validate &amp; enrich</text>

  <!-- Arrow 1->2 -->
  <line x1="307" y1="145" x2="307" y2="160" stroke="#464E5D" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Box 2: Aggregation -->
  <rect x="235" y="165" width="145" height="55" rx="6" fill="none" stroke="#D6DCE8" stroke-width="1"/>
  <rect x="235" y="165" width="145" height="4" rx="2" fill="#0071CE"/>
  <text x="240" y="185" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="700" fill="#A2AAB9">2</text>
  <text x="307" y="193" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#252526">Aggregation</text>
  <text x="307" y="210" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#464E5D">Time buckets &amp; rollups</text>

  <!-- Arrow 2->3 -->
  <line x1="307" y1="220" x2="307" y2="235" stroke="#464E5D" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Box 3: Storage -->
  <rect x="235" y="240" width="145" height="55" rx="6" fill="none" stroke="#D6DCE8" stroke-width="1"/>
  <rect x="235" y="240" width="145" height="4" rx="2" fill="#22c55e"/>
  <text x="240" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="700" fill="#A2AAB9">3</text>
  <text x="307" y="268" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#252526">Storage</text>
  <text x="307" y="285" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#464E5D">PostgreSQL JSONB</text>

  <!-- Arrow from pipeline to outputs -->
  <line x1="380" y1="145" x2="440" y2="105" stroke="#464E5D" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="380" y1="192" x2="440" y2="185" stroke="#464E5D" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="380" y1="268" x2="440" y2="262" stroke="#464E5D" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Right column: Output boxes -->
  <!-- Dashboard -->
  <rect x="445" y="78" width="160" height="55" rx="6" fill="none" stroke="#D6DCE8" stroke-width="1"/>
  <rect x="445" y="78" width="160" height="4" rx="2" fill="#0071CE"/>
  <text x="525" y="103" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#252526">Dashboard</text>
  <text x="525" y="121" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#464E5D">20+ metrics</text>

  <!-- CLI Export -->
  <rect x="445" y="158" width="160" height="55" rx="6" fill="none" stroke="#D6DCE8" stroke-width="1"/>
  <rect x="445" y="158" width="160" height="4" rx="2" fill="#22c55e"/>
  <text x="525" y="183" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#252526">CLI Export</text>
  <text x="525" y="201" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#464E5D">CSV / JSON</text>

  <!-- Cost Tracking -->
  <rect x="445" y="238" width="160" height="55" rx="6" fill="none" stroke="#D6DCE8" stroke-width="1"/>
  <rect x="445" y="238" width="160" height="4" rx="2" fill="#EF4623"/>
  <text x="525" y="263" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#252526">Cost Tracking</text>
  <text x="525" y="281" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#464E5D">By model &amp; agent</text>

  <!-- Mini dashboard icon in Dashboard box -->
  <rect x="580" y="92" width="12" height="8" rx="1" fill="none" stroke="#0071CE" stroke-width="0.8"/>
  <line x1="583" y1="99" x2="583" y2="95" stroke="#0071CE" stroke-width="1.5"/>
  <line x1="586" y1="99" x2="586" y2="93" stroke="#0071CE" stroke-width="1.5"/>
  <line x1="589" y1="99" x2="589" y2="96" stroke="#0071CE" stroke-width="1.5"/>

  <!-- Bottom row: Time bucket visualization -->
  <text x="200" y="340" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#252526">Time Buckets</text>

  <!-- 24h bucket -->
  <rect x="270" y="328" width="80" height="36" rx="6" fill="none" stroke="#D6DCE8" stroke-width="1"/>
  <text x="310" y="343" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#252526">24h</text>
  <!-- Mini bars -->
  <rect x="285" y="352" width="6" height="8" rx="1" fill="#0071CE" opacity="0.6"/>
  <rect x="293" y="349" width="6" height="11" rx="1" fill="#0071CE" opacity="0.8"/>
  <rect x="301" y="351" width="6" height="9" rx="1" fill="#0071CE" opacity="0.7"/>
  <rect x="309" y="347" width="6" height="13" rx="1" fill="#0071CE"/>
  <rect x="317" y="350" width="6" height="10" rx="1" fill="#0071CE" opacity="0.7"/>
  <rect x="325" y="353" width="6" height="7" rx="1" fill="#0071CE" opacity="0.5"/>

  <!-- 7d bucket -->
  <rect x="360" y="328" width="80" height="36" rx="6" fill="none" stroke="#D6DCE8" stroke-width="1"/>
  <text x="400" y="343" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#252526">7d</text>
  <rect x="375" y="354" width="6" height="6" rx="1" fill="#22c55e" opacity="0.5"/>
  <rect x="383" y="351" width="6" height="9" rx="1" fill="#22c55e" opacity="0.7"/>
  <rect x="391" y="348" width="6" height="12" rx="1" fill="#22c55e"/>
  <rect x="399" y="350" width="6" height="10" rx="1" fill="#22c55e" opacity="0.8"/>
  <rect x="407" y="353" width="6" height="7" rx="1" fill="#22c55e" opacity="0.6"/>
  <rect x="415" y="355" width="6" height="5" rx="1" fill="#22c55e" opacity="0.4"/>

  <!-- 14d bucket -->
  <rect x="450" y="328" width="80" height="36" rx="6" fill="none" stroke="#D6DCE8" stroke-width="1"/>
  <text x="490" y="343" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#252526">14d</text>
  <rect x="465" y="355" width="6" height="5" rx="1" fill="#EF4623" opacity="0.4"/>
  <rect x="473" y="352" width="6" height="8" rx="1" fill="#EF4623" opacity="0.6"/>
  <rect x="481" y="349" width="6" height="11" rx="1" fill="#EF4623" opacity="0.8"/>
  <rect x="489" y="347" width="6" height="13" rx="1" fill="#EF4623"/>
  <rect x="497" y="350" width="6" height="10" rx="1" fill="#EF4623" opacity="0.7"/>
  <rect x="505" y="354" width="6" height="6" rx="1" fill="#EF4623" opacity="0.5"/>

  <!-- Legend -->
  <circle cx="120" cy="385" r="5" fill="#EF4623"/>
  <text x="130" y="389" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#464E5D">Events</text>
  <circle cx="195" cy="385" r="5" fill="#0071CE"/>
  <text x="205" y="389" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#464E5D">Processing</text>
  <circle cx="290" cy="385" r="5" fill="#22c55e"/>
  <text x="300" y="389" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#464E5D">Storage</text>
  <circle cx="370" cy="385" r="5" fill="#6366f1"/>
  <text x="380" y="389" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#464E5D">Output</text>

  <!-- Bottom right label -->
  <text x="770" y="390" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#A2AAB9">systemprompt.io analytics</text>
</svg>