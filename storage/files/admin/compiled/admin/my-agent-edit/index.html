<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Foodles Admin - </title>
    <link rel="stylesheet" href="https://use.typekit.net/sis4nqz.css">
    <link rel="icon" type="image/x-icon" href="/files/images/favicon.ico">
    <link rel="stylesheet" href="/css/admin-bundle.css">
    <script>window.ADMIN_API_BASE = '/api/public/admin'; window.ADMIN_BASE = '/admin';</script>
</head>
<body>
    <div class="admin-layout" data-section="my-agent-edit">
        <aside class="admin-sidebar" id="admin-sidebar">
            <button class="sidebar-close-btn" type="button" aria-label="Close menu">&times;</button>
            <a href="/admin" class="admin-sidebar-brand" aria-label="Foodles - Go to dashboard">
                <img src="/files/images/logo-white.svg" alt="Foodles" class="admin-logo" />
            </a>
            <nav>
                <h2 class="nav-label">General</h2>
                <a href="/admin">
                    <svg class="icon" aria-hidden="true" viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/></svg>
                    Dashboard
                </a>
                <a href="/admin/user?id=">
                    <svg class="icon" aria-hidden="true" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="5" r="3"/><path d="M2 14c0-3.3 2.7-6 6-6s6 2.7 6 6"/></svg>
                    Profile
                </a>
                <h2 class="nav-label">My Workspace</h2>
                <a href="/admin/my/marketplace/">
                    <svg class="icon" aria-hidden="true" viewBox="0 0 16 16" fill="currentColor"><path d="M1 3a1 1 0 011-1h12a1 1 0 011 1v2a1 1 0 01-1 1H2a1 1 0 01-1-1V3zm0 5a1 1 0 011-1h12a1 1 0 011 1v2a1 1 0 01-1 1H2a1 1 0 01-1-1V8zm0 5a1 1 0 011-1h12a1 1 0 011 1v.5a.5.5 0 01-.5.5h-11a.5.5 0 01-.5-.5V13z"/></svg>
                    My Marketplace
                </a>
                <a href="/admin/my/plugins/">
                    <svg class="icon" aria-hidden="true" viewBox="0 0 16 16" fill="currentColor"><path d="M8 1L2 4v4c0 3.3 2.6 6.4 6 7 3.4-.6 6-3.7 6-7V4L8 1zm0 2.2L12 5.5v2.8c0 2.4-1.7 4.6-4 5.2-2.3-.6-4-2.8-4-5.2V5.5L8 3.2z"/></svg>
                    My Plugins
                </a>
                <a href="/admin/my/skills/">
                    <svg class="icon" aria-hidden="true" viewBox="0 0 16 16" fill="currentColor"><path d="M2 3h12v1H2V3zm0 3h8v1H2V6zm0 3h10v1H2V9zm0 3h6v1H2v-1z"/></svg>
                    My Skills
                </a>
                <a href="/admin/my/agents/" class="active" aria-current="page">
                    <svg class="icon" aria-hidden="true" viewBox="0 0 16 16" fill="currentColor"><path d="M8 1a4 4 0 014 4v1h1a1 1 0 011 1v6a1 1 0 01-1 1H3a1 1 0 01-1-1V7a1 1 0 011-1h1V5a4 4 0 014-4zm0 2a2 2 0 00-2 2v1h4V5a2 2 0 00-2-2z"/></svg>
                    My Agents
                </a>
                <a href="/admin/my/mcp-servers/">
                    <svg class="icon" aria-hidden="true" viewBox="0 0 16 16" fill="currentColor"><rect x="2" y="2" width="12" height="4" rx="1"/><rect x="2" y="10" width="12" height="4" rx="1"/><circle cx="5" cy="4" r="1"/><circle cx="5" cy="12" r="1"/></svg>
                    My MCP Servers
                </a>
                <a href="/admin/my/hooks/">
                    <svg class="icon" aria-hidden="true" viewBox="0 0 16 16" fill="currentColor"><path d="M10 2a3 3 0 013 3v2a1 1 0 01-1 1H8v3a3 3 0 01-6 0v-1h2v1a1 1 0 002 0V8H4a1 1 0 01-1-1V5a3 3 0 013-3h4zm0 2H6a1 1 0 00-1 1v1h6V5a1 1 0 00-1-1z"/></svg>
                    My Hooks
                </a>
                <a href="/admin/my/versions/">
                    <svg class="icon" aria-hidden="true" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 1v6l4 2M14 8A6 6 0 112 8a6 6 0 0112 0z"/><path d="M1 12l2 2 2-2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    Versions
                </a>
                <h2 class="nav-label">Achievements</h2>
                <a href="/admin/leaderboard/">
                    <svg class="icon" aria-hidden="true" viewBox="0 0 16 16" fill="currentColor"><path d="M3 14V8h2v6H3zm4 0V4h2v10H7zm4 0V1h2v13h-2z"/></svg>
                    Leaderboard
                </a>
                <a href="/admin/achievements/">
                    <svg class="icon" aria-hidden="true" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0l2 5h5l-4 3.5 1.5 5L8 10.5 3.5 13.5 5 8.5 1 5h5z"/></svg>
                    Achievements
                </a>
                <h2 class="nav-label">Support</h2>
                <a href="/documentation">
                    <svg class="icon" aria-hidden="true" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6.5"/><path d="M6 6a2 2 0 113.5 1.8c-.5.3-.5.5-.5 1.2M8 12v.5" stroke-linecap="round"/></svg>
                    Help & Docs
                </a>
            </nav>
        </aside>
        <div class="sidebar-overlay" id="sidebar-overlay"></div>
        <main class="admin-main">
            <div class="admin-header">
                <button class="sidebar-toggle" type="button" aria-label="Open menu" aria-expanded="false" aria-controls="admin-sidebar">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                        <rect x="2" y="4" width="16" height="2" rx="1"/>
                        <rect x="2" y="9" width="16" height="2" rx="1"/>
                        <rect x="2" y="14" width="16" height="2" rx="1"/>
                    </svg>
                </button>
                <h1></h1>
                <div class="user-profile" id="user-profile">
                    <div class="user-avatar" id="user-avatar"></div>
                    <div class="user-info">
                        <span class="user-name" id="user-name"></span>
                        <span class="user-meta" id="user-meta"></span>
                    </div>
                    <button id="btn-logout" class="btn-logout" title="Sign out">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                    </button>
                </div>
            </div>
                <div class="detail-header">
                    <a href="/admin/my/agents/" class="btn btn-secondary btn-sm">&larr; Back to My Agents</a>
                </div>
                <h2></h2>
                <div class="card" style="max-width:800px">
                    <form id="my-agent-form" data-api-path="/user/agents/" data-entity="Agent" data-id-field="agent_id" data-list-path="/my/agents/">
                        <div class="form-group">
                            <label class="field-label">Agent ID <span class="form-hint">(kebab-case)</span></label>
                            <input class="field-input" type="text" name="agent_id" placeholder="my-agent-id" value="" required>
                        </div>
                        <div class="form-group">
                            <label class="field-label">Name</label>
                            <input class="field-input" type="text" name="name" placeholder="Agent name" value="" required>
                        </div>
                        <div class="form-group">
                            <label class="field-label">Description</label>
                            <input class="field-input" type="text" name="description" placeholder="Brief description" value="">
                        </div>
                        <div class="form-group">
                            <label class="field-label">System Prompt</label>
                            <textarea class="field-input" name="system_prompt" rows="15" placeholder="Custom instructions for this agent..."></textarea>
                        </div>
                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary">Save</button>
                            <a href="/admin/my/agents/" class="btn btn-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
        </main>
    </div>
    <footer class="admin-footer">
        Powered by <a href="https://foodles.com" target="_blank" rel="noopener"><img src="/files/images/logo-white.svg" alt="Foodles" class="admin-footer-logo" /></a>
    </footer>
    <script src="/js/admin-core.js"></script>
    <script src="/js/admin/sidebar-toggle.js"></script>
    <script>
        (function() {
            var u = window.AdminApp && window.AdminApp.user;
            if (u) {
                var av = document.getElementById('user-avatar');
                var nm = document.getElementById('user-name');
                if (av) av.textContent = window.AdminApp.getUserInitials(u.username);
                if (nm) nm.textContent = u.username;
            }
        })();
    </script>
        <script>
            document.addEventListener('DOMContentLoaded', function() {
                AdminApp.Toast.init();
                AdminApp.interactions.initEditForm('my-agent-form', {
                    buildBody: function(form, formData) {
                        return {
                            agent_id: formData.get('agent_id'),
                            name: formData.get('name'),
                            description: formData.get('description') || '',
                            system_prompt: formData.get('system_prompt') || ''
                        };
                    }
                });
            });
        </script>
</body>
</html>
