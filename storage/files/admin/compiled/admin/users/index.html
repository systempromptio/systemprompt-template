        <main class="admin-main">

                <button class="sidebar-toggle" type="button" aria-label="Open menu" aria-expanded="false" aria-controls="admin-sidebar">

                        <rect x="2" y="9" width="16" height="2" rx="1"/>
                        <rect x="2" y="14" width="16" height="2" rx="1"/>
                    </svg>
                </button>
                <h1></h1>
                <div class="user-profile" id="user-profile">
                    <div class="user-avatar" id="user-avatar"></div>
                    <div class="user-info">
                        <span class="user-name" id="user-name"></span>
                        <span class="user-meta" id="user-meta"></span>
                    </div>
                    <button id="btn-logout" class="btn-logout" title="Sign out">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>

            </div>

                <div class="metric-ribbon">
                    <div class="metric-ribbon-item">
                        <span class="metric-ribbon-value"></span>

                    <div class="metric-ribbon-item">
                        <span class="metric-ribbon-value"></span>

                    </div>
                </div>
            

                <div class="toolbar">
                    <div class="search-group">
                        <input type="text" class="search-input" placeholder="Search users..." id="user-search">
                    </div>
                    <select class="filter-select" id="department-filter" style="min-width:160px">
                        <option value="">All Departments</option>
                    </select>
                    <button class="btn btn-primary" id="btn-add-user">+ Add User</button>
                </div>
                <div class="panel-overlay" id="create-user-overlay"></div>
                <div class="side-panel" id="create-user-panel">
                    <div class="panel-header">
                        <h2>Add User</h2>
                        <button class="panel-close">&times;</button>
                    </div>
                    <div class="panel-body">
                        <div class="form-group">
                            <label>User ID</label>
                            <input class="field-input" type="text" id="new-user-id" placeholder="username or email">
                        </div>
                        <div class="form-group">
                            <label>Display Name</label>
                            <input class="field-input" type="text" id="new-user-name" placeholder="Full Name">
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input class="field-input" type="email" id="new-user-email" placeholder="user@company.com">
                        </div>
                        <div class="form-group">
                            <label>Department</label>
                            <select class="field-input" id="new-user-dept">
                                <option value="">-- Select --</option>
                                <option value="ceo">ceo</option>
                                <option value="finance">finance</option>
                                <option value="sales">sales</option>
                                <option value="marketing">marketing</option>
                                <option value="operations">operations</option>
                                <option value="hr">hr</option>
                                <option value="it">it</option>
                                <option value="support">support</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Roles</label>
                            <div class="checkbox-group">
                                <label class="checkbox-label"><input type="checkbox" name="roles" value="admin"> admin</label>
                                <label class="checkbox-label"><input type="checkbox" name="roles" value="ceo"> ceo</label>
                                <label class="checkbox-label"><input type="checkbox" name="roles" value="manager"> manager</label>
                                <label class="checkbox-label"><input type="checkbox" name="roles" value="finance"> finance</label>
                                <label class="checkbox-label"><input type="checkbox" name="roles" value="sales"> sales</label>
                                <label class="checkbox-label"><input type="checkbox" name="roles" value="marketing"> marketing</label>
                                <label class="checkbox-label"><input type="checkbox" name="roles" value="operations"> operations</label>
                                <label class="checkbox-label"><input type="checkbox" name="roles" value="hr"> hr</label>
                                <label class="checkbox-label"><input type="checkbox" name="roles" value="it"> it</label>
                                <label class="checkbox-label"><input type="checkbox" name="roles" value="support"> support</label>
                            </div>
                        </div>
                    </div>
                    <div class="panel-footer">
                        <button class="btn btn-secondary" data-action="cancel">Cancel</button>
                        <button class="btn btn-primary" data-action="save">Create User</button>
                    </div>
                </div>

                <div class="empty-state"><p>No users found.</p></div>

    </footer>
    <script src="/js/admin-core.js"></script>
    <script src="/js/admin/sidebar-toggle.js"></script>
    <script>
        (function() {
            var u = window.AdminApp && window.AdminApp.user;
            if (u) {
                var av = document.getElementById('user-avatar');
                var nm = document.getElementById('user-name');
                if (av) av.textContent = window.AdminApp.getUserInitials(u.username);
                if (nm) nm.textContent = u.username;
            }
        })();
    </script>
        <script src="/js/admin-users.js"></script>
        <script>
            document.addEventListener('DOMContentLoaded', function() {
                AdminApp.Toast.init();
                // Search filtering
                var searchInput = document.getElementById('user-search');
                if (searchInput) {
                    var debounceTimer = null;
                    searchInput.addEventListener('input', function() {
                        clearTimeout(debounceTimer);
                        debounceTimer = setTimeout(function() {
                            var q = searchInput.value.toLowerCase().trim();
                            var rows = document.querySelectorAll('.data-table tbody tr');
                            for (var i = 0; i < rows.length; i++) {
                                var name = rows[i].getAttribute('data-user-name') || '';
                                var email = rows[i].getAttribute('data-user-email') || '';
                                rows[i].style.display = (!q || name.indexOf(q) !== -1 || email.indexOf(q) !== -1) ? '' : 'none';
                            }
                        }, 200);
                    });
                }
                // Department filter
                var deptFilter = document.getElementById('department-filter');
                if (deptFilter) {
                    deptFilter.addEventListener('change', function() {
                        var val = deptFilter.value;
                        if (val) {
                            window.location.href = '/admin/users/?department=' + encodeURIComponent(val);
                        } else {
                            window.location.href = '/admin/users/';
                        }
                    });
                }
                // Add User panel (SSR panel is in DOM)
                var addBtn = document.getElementById('btn-add-user');
                if (addBtn && AdminApp.usersPanel) {
                    addBtn.addEventListener('click', function() { AdminApp.usersPanel.open(); });
                    AdminApp.usersPanel.bindEvents(function() { window.location.reload(); });
                }
                // Popup menus and toggle actions
                if (AdminApp.usersInteractions) {
                    AdminApp.usersInteractions();
                }
            });
        </script>
</body>
