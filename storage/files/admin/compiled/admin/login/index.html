<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Foodles Admin - Sign In</title>
    <link rel="stylesheet" href="/css/admin-bundle.css">
</head>
<body>
    <div class="login-container">
        <h1 class="login-title">Foodles Admin</h1>
        <p class="login-subtitle">Redirecting to sign in...</p>

        <div id="error" class="login-error"></div>

        <div id="loading" class="login-loading">
            <div class="login-spinner"></div>
            <p>Processing...</p>
        </div>

        <div id="retry" class="login-retry">
            <a href="/admin/login">Try again</a>
        </div>
    </div>

    <script src="/js/admin/login.js"></script>
</body>
</html>
