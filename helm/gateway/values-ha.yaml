# HA values: 3 replicas, external Postgres, Ingress on TLS.
replicaCount: 3

postgresql:
  enabled: false

externalDatabase:
  url: postgres://systemprompt:CHANGE_ME@postgres.example.com:5432/systemprompt

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: 4
    memory: 4Gi

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: gateway.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts: [gateway.example.com]
      secretName: gateway-tls

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: gateway
          topologyKey: kubernetes.io/hostname
