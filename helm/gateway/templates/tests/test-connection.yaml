apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "gateway.fullname" . }}-test-connection"
  labels: {{- include "gateway.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  restartPolicy: Never
  containers:
    - name: curl
      image: curlimages/curl:8.6.0
      command: ["curl", "-fsS", "http://{{ include "gateway.fullname" . }}:{{ .Values.service.port }}{{ .Values.healthcheck.path }}"]
