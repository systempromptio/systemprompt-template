services:
  - type: web
    name: systemprompt-gateway
    runtime: image
    plan: free
    image:
      url: ghcr.io/systempromptio/systemprompt-template:latest
    healthCheckPath: /api/v1/health
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 8080
      - key: DATABASE_URL
        fromDatabase:
          name: systemprompt-postgres
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false

databases:
  - name: systemprompt-postgres
    plan: free               # Render's free Postgres tier — 90-day lifespan, auto-deletes after
    postgresMajorVersion: "17"
