# Secret holding AI provider keys and the JWT signing secret.
#
# !! PLACEHOLDER VALUES ONLY — never commit real secrets. !!
# Replace these before applying, or (preferred) create the Secret out-of-band:
#   kubectl create secret generic systemprompt-secrets \
#     --from-literal=ANTHROPIC_API_KEY=sk-ant-... \
#     --from-literal=JWT_SECRET="$(openssl rand -hex 32)"
#
# At least one of the AI provider keys must be set or the container entrypoint
# exits with an error.
apiVersion: v1
kind: Secret
metadata:
  name: systemprompt-secrets
  labels:
    app.kubernetes.io/name: systemprompt
    app.kubernetes.io/part-of: scaled-stack
type: Opaque
stringData:
  # --- AI provider keys (at least one required) ---
  ANTHROPIC_API_KEY: "REPLACE_ME_anthropic_api_key"
  OPENAI_API_KEY: "REPLACE_ME_openai_api_key"
  GEMINI_API_KEY: "REPLACE_ME_gemini_api_key"
  # --- JWT signing secret ---
  JWT_SECRET: "REPLACE_ME_generate_with_openssl_rand_hex_32"
  # --- Postgres credentials ---
  POSTGRES_PASSWORD: "REPLACE_ME_postgres_password"
