# nginx load balancer for the scaled systemprompt-template stack.
# Round-robins HTTP traffic across every `app` replica and is tuned for
# long-lived SSE / streaming responses (the gateway streams model output).

worker_processes auto;

events {
    worker_connections 2048;
}

http {
    # Docker's embedded DNS. `app` resolves to the set of running replica IPs;
    # re-resolving keeps the upstream current as replicas scale up/down.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Round-robin (nginx default) across all `app` replicas reachable via the
    # docker DNS name `app`. Compose's `--scale app=N` registers every replica
    # under this name. proxy_pass targets this upstream by name.
    upstream app_replicas {
        zone app_replicas 64k;
        server app:8080 resolve max_fails=3 fail_timeout=10s;
    }

    # `proxy_buffering off` + a long read timeout are required for SSE: buffered
    # responses would defeat streaming, and the default 60s read timeout would
    # cut idle streams.
    proxy_buffering          off;
    proxy_request_buffering  off;
    proxy_read_timeout       3600s;
    proxy_send_timeout       3600s;
    proxy_http_version       1.1;

    # SSE needs a kept-alive upstream connection with no `Connection: close`
    # and no `Connection: keep-alive` injected — clear it entirely.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      '';
    }

    # Access log to stdout for `docker compose logs lb`.
    log_format scaled '$remote_addr [$time_local] "$request" '
                      '$status upstream=$upstream_addr rt=$request_time';
    access_log /dev/stdout scaled;
    error_log  /dev/stderr warn;

    server {
        listen 80;
        listen [::]:80;   # also serve IPv6 so `localhost` (→ ::1) clients work
        server_name _;

        # LB-level health check — confirms nginx itself is up. Does not touch
        # the upstream so it can be used as the lb container healthcheck.
        location = /lb-health {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "lb ok\n";
        }

        # Upstream (app-tier) health — proxied so it reflects a real replica.
        location = /api/v1/health {
            proxy_pass http://app_replicas;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # All other traffic → round-robined API replicas.
        location / {
            proxy_pass http://app_replicas;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Clear the Connection header so SSE / streaming responses are not
            # closed prematurely by an injected `Connection: close`.
            proxy_set_header Connection        $connection_upgrade;
            proxy_set_header Upgrade           $http_upgrade;

            # Inherit the streaming-friendly settings declared at http scope.
        }
    }
}
