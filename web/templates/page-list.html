<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pages | {{ORG_NAME}}</title>
  <meta name="description" content="Browse all pages on {{ORG_NAME}}" />
  <link rel="canonical" href="{{ORG_URL}}/pages" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="stylesheet" href="/blog.css" />
</head>
<body>
  <div class="blog-background"></div>
  <div class="blog-shape-left"></div>

  <header class="site-header">
    <nav class="site-nav">
      <a href="/" class="logo-link">
        <img src="/favicon.ico" alt="{{ORG_NAME}} logo" class="logo" />
        {{#if DISPLAY_SITENAME}}<span class="site-name">{{ORG_NAME}}</span>{{/if}}
      </a>
      <a href="/" class="chat-cta">
        <svg class="chat-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
        </svg>
        Chat with us
      </a>
    </nav>
  </header>

  <main class="blog-list">
    <header class="page-header">
      <h1>Pages</h1>
    </header>

    <div class="posts">
      {{{ITEMS}}}
    </div>
  </main>

  <footer>
    <div class="footer-content">
      {{{FOOTER_NAV}}}
    </div>
  </footer>
</body>
</html>
