[graph]
targets = []

[advisories]
ignore = [
    # rsa crate Marvin Attack - no patch available yet, used transitively by oauth2/webauthn-rs
    # Tracked at: https://rustsec.org/advisories/RUSTSEC-2023-0071
    "RUSTSEC-2023-0071",
    # proc-macro-error2 unmaintained - transitive via upstream macro crates, no
    # runtime surface. Tracked at: https://rustsec.org/advisories/RUSTSEC-2026-0173
    "RUSTSEC-2026-0173",
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "MPL-2.0",
    "BUSL-1.1",
    "BSL-1.0",
    "CDLA-Permissive-2.0",
    # Data-only license on Unicode character tables (finl_unicode, transitive)
    "Unicode-DFS-2016",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
