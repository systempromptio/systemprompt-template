# SystemPrompt Local Development - PostgreSQL
#
# Usage:
#   docker compose up -d        # Start PostgreSQL
#   docker compose down         # Stop PostgreSQL
#   docker compose down -v      # Stop and remove data volume
#
# Connection string: postgres://systemprompt:systemprompt_dev@localhost:5432/systemprompt

services:
  postgres:
    image: postgres:16-alpine
    container_name: systemprompt-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-systemprompt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-systemprompt_dev}
      POSTGRES_DB: ${POSTGRES_DB:-systemprompt}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-systemprompt} -d ${POSTGRES_DB:-systemprompt}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
    name: systemprompt-postgres-data
