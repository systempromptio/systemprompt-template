# SystemPrompt Web Theme Configuration
# Single source of truth for all website styling, branding, and assets
# Changes to this file automatically regenerate CSS, TypeScript configs, and HTML meta tags

branding:
  name: "SystemPrompt"
  title: "SystemPrompt | A2A Agent Platform"
  description: "Open-source agent orchestration platform for AI agents"
  themeColor: "#F6933C"

  logo:
    primary: "/src/assets/logos/logo.png"
    dark: "/src/assets/logos/logo-dark.png"
    small: "/src/assets/logos/logo-512.png"

  favicon: "/vite.svg"

fonts:
  body:
    family: "OpenSans"
    fallback: "-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
    files:
      - path: "/src/assets/fonts/OpenSans/OpenSans-Regular.ttf"
        weight: 400
        style: "normal"
      - path: "/src/assets/fonts/OpenSans/OpenSans-Medium.ttf"
        weight: 500
        style: "normal"
      - path: "/src/assets/fonts/OpenSans/OpenSans-SemiBold.ttf"
        weight: 600
        style: "normal"
      - path: "/src/assets/fonts/OpenSans/OpenSans-Bold.ttf"
        weight: 700
        style: "normal"

  heading:
    family: "Zepto"
    fallback: "Georgia, serif"
    files:
      - path: "/src/assets/fonts/Zepto/Zepto-Regular.ttf"
        weight: 400
        style: "normal"

  brand:
    family: "ArchivoBlack"
    fallback: "Impact, sans-serif"
    files:
      - path: "/src/assets/fonts/ArchivoBlack/ArchivoBlack-Regular.ttf"
        weight: 400
        style: "normal"

colors:
  light:
    primary:
      hsl: "hsl(28, 91%, 60%)"
      rgb: [246, 147, 60]
    secondary:
      hsl: "hsl(28, 91%, 50%)"
      rgb: null
    success: "#34C759"
    warning: "#FF9500"
    error: "#FF3B30"

    surface:
      default: "#FFFFFF"
      dark: "#1C1C1E"
      variant: "hsl(28, 91%, 95%)"
      secondaryContainer: "hsl(28, 91%, 90%)"
      errorContainer: "#FFEBE9"

    text:
      primary: "#000000"
      secondary: "#3C3C43"
      inverted: "#FFFFFF"
      disabled: "#999999"

    background:
      default: "hsl(28, 91%, 98%)"
      dark: "hsl(28, 91%, 20%)"

    border:
      default: "hsl(28, 91%, 80%)"
      dark: "hsl(28, 91%, 50%)"
      outline: "hsl(28, 91%, 70%)"

  dark:
    primary:
      hsl: "hsl(28, 91%, 60%)"
      rgb: [246, 147, 60]
    secondary:
      hsl: "hsl(28, 91%, 70%)"
      rgb: null
    success: "#34C759"
    warning: "#FF9500"
    error: "#FF3B30"

    surface:
      default: "#121212"
      dark: "#0A0A0A"
      variant: "#1E1E1E"
      secondaryContainer: "rgba(255, 122, 0, 0.15)"
      errorContainer: "rgba(255, 59, 48, 0.1)"

    text:
      primary: "#FFFFFF"
      secondary: "hsl(28, 91%, 60%)"
      inverted: "#000000"
      disabled: "#6D6D6D"

    background:
      default: "#080808"
      dark: "#000000"

    border:
      default: "rgba(255, 122, 0, 0.5)"
      dark: "hsl(28, 91%, 40%)"
      outline: "hsl(28, 91%, 50%)"

typography:
  sizes:
    xs: "12px"
    sm: "14px"
    md: "15px"
    lg: "18px"
    xl: "20px"
    xxl: "28px"

  weights:
    regular: 400
    medium: 500
    semibold: 600
    bold: 700

spacing:
  xs: "4px"
  sm: "8px"
  md: "16px"
  lg: "24px"
  xl: "32px"
  xxl: "48px"

radius:
  xs: "2px"
  sm: "4px"
  md: "8px"
  lg: "12px"
  xl: "16px"
  xxl: "24px"
  round: "9999px"

shadows:
  light:
    sm: "0 2px 2px rgba(0, 0, 0, 0.3)"
    md: "0 3px 4.65px rgba(0, 0, 0, 0.4)"
    lg: "0 5px 6.25px rgba(0, 0, 0, 0.5)"
    accent: "0 3px 4.65px hsl(28, 91%, 40%, 0.5)"

  dark:
    sm: "0 2px 2px rgba(0, 0, 0, 0.8)"
    md: "0 3px 4.65px rgba(0, 0, 0, 0.8)"
    lg: "0 5px 6.25px rgba(0, 0, 0, 0.8)"
    accent: "0 3px 4.65px hsl(28, 91%, 40%, 0.5)"

animation:
  fast: "150ms"
  normal: "300ms"
  slow: "500ms"

zIndex:
  base: 1
  content: 10
  navigation: 100
  modal: 1000
  tooltip: 2000

layout:
  headerHeight: "48px"
  sidebarLeft:
    width: "20%"
    minWidth: "240px"
    maxWidth: "320px"
  sidebarRight:
    width: "15%"
    minWidth: "200px"
    maxWidth: "280px"
  navHeight: "64px"
  contentMaxWidth: "1600px"

card:
  radius:
    default: "18px"
    cut: "6px"
  padding:
    sm: "12px"
    md: "16px"
    lg: "20px"
  gradient:
    start: "rgba(255, 102, 0, 0.25)"
    mid: "rgba(255, 102, 0, 0.18)"
    end: "rgba(255, 102, 0, 0.13)"

mobile:
  spacing:
    xs: "4px"
    sm: "8px"
    md: "12px"
    lg: "16px"
    xl: "24px"
    xxl: "32px"

  typography:
    sizes:
      xs: "11px"
      sm: "13px"
      md: "14px"
      lg: "16px"
      xl: "18px"
      xxl: "24px"

  layout:
    headerHeight: "56px"
    navHeight: "64px"

  card:
    padding:
      sm: "10px"
      md: "12px"
      lg: "14px"

touchTargets:
  default: "44px"
  sm: "40px"
  lg: "48px"
