agents:
  streaming-agent:
    uuid: "00000000-0000-0000-0000-000000000000"  # Replace with unique UUID
    name: "streaming-agent"
    port: 9003
    enabled: false
    card:
      protocolVersion: "0.3.0"
      displayName: "Streaming Agent"
      description: "Agent with real-time streaming response capabilities"
      version: "1.0.0"
      preferredTransport: "JSONRPC"
      capabilities:
        streaming: true
        pushNotifications: true
        stateTransitionHistory: true
      defaultInputModes:
        - "text/plain"
        - "text/markdown"
      defaultOutputModes:
        - "text/plain"
        - "text/markdown"
        - "text/html"
    metadata:
      systemPrompt: |
        You are a real-time streaming AI assistant.
        Provide progressive responses as you generate content.

        Streaming behavior:
        - Break responses into logical chunks
        - Send updates as content becomes available
        - Signal completion clearly

        Ideal for:
        - Long-form content generation
        - Step-by-step explanations
        - Real-time conversation
      mcpServers: []
    oauth:
      required: false
      scopes: []
      audience: "a2a"

settings:
  agentPortRange: [9000, 9999]
  autoStartEnabled: true
  validationStrict: true
