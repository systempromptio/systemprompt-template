# SystemPrompt Light Theme
# Bright, clean theme with minimal dark elements

branding:
  name: "SystemPrompt"
  title: "SystemPrompt | A2A Agent Platform"
  description: "Open-source agent orchestration platform for AI agents"
  themeColor: "#F6933C"

  logo:
    primary: "/src/assets/logos/logo.png"
    dark: "/src/assets/logos/logo-dark.png"
    small: "/src/assets/logos/logo-512.png"

  favicon: "/vite.svg"

fonts:
  body:
    family: "OpenSans"
    fallback: "-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
    files:
      - path: "/src/assets/fonts/OpenSans/OpenSans-Regular.ttf"
        weight: 400
        style: "normal"
      - path: "/src/assets/fonts/OpenSans/OpenSans-Medium.ttf"
        weight: 500
        style: "normal"
      - path: "/src/assets/fonts/OpenSans/OpenSans-SemiBold.ttf"
        weight: 600
        style: "normal"
      - path: "/src/assets/fonts/OpenSans/OpenSans-Bold.ttf"
        weight: 700
        style: "normal"

  heading:
    family: "Zepto"
    fallback: "Georgia, serif"
    files:
      - path: "/src/assets/fonts/Zepto/Zepto-Regular.ttf"
        weight: 400
        style: "normal"

  brand:
    family: "ArchivoBlack"
    fallback: "Impact, sans-serif"
    files:
      - path: "/src/assets/fonts/ArchivoBlack/ArchivoBlack-Regular.ttf"
        weight: 400
        style: "normal"

colors:
  light:
    primary:
      hsl: "hsl(28, 91%, 60%)"
      rgb: [246, 147, 60]
    secondary:
      hsl: "hsl(205, 70%, 50%)"
      rgb: [38, 132, 191]
    success: "#10B981"
    warning: "#F59E0B"
    error: "#EF4444"

    surface:
      default: "#FFFFFF"
      dark: "#F9FAFB"
      variant: "hsl(28, 80%, 97%)"
      secondaryContainer: "hsl(28, 80%, 95%)"
      errorContainer: "#FEE2E2"

    text:
      primary: "#111827"
      secondary: "#6B7280"
      inverted: "#FFFFFF"
      disabled: "#D1D5DB"

    background:
      default: "hsl(0, 0%, 100%)"
      dark: "hsl(220, 13%, 97%)"

    border:
      default: "hsl(220, 13%, 91%)"
      dark: "hsl(220, 13%, 85%)"
      outline: "hsl(220, 13%, 80%)"

  dark:
    primary:
      hsl: "hsl(28, 91%, 60%)"
      rgb: [246, 147, 60]
    secondary:
      hsl: "hsl(205, 70%, 60%)"
      rgb: [52, 152, 219]
    success: "#34D399"
    warning: "#FBBF24"
    error: "#F87171"

    surface:
      default: "#1F2937"
      dark: "#111827"
      variant: "#374151"
      secondaryContainer: "rgba(246, 147, 60, 0.1)"
      errorContainer: "rgba(239, 68, 68, 0.1)"

    text:
      primary: "#F9FAFB"
      secondary: "#D1D5DB"
      inverted: "#111827"
      disabled: "#6B7280"

    background:
      default: "#111827"
      dark: "#000000"

    border:
      default: "rgba(246, 147, 60, 0.2)"
      dark: "hsl(28, 91%, 40%)"
      outline: "hsl(28, 91%, 50%)"

typography:
  sizes:
    xs: "12px"
    sm: "14px"
    md: "15px"
    lg: "18px"
    xl: "20px"
    xxl: "28px"

  weights:
    regular: 400
    medium: 500
    semibold: 600
    bold: 700

spacing:
  xs: "4px"
  sm: "8px"
  md: "16px"
  lg: "24px"
  xl: "32px"
  xxl: "48px"

radius:
  xs: "2px"
  sm: "4px"
  md: "8px"
  lg: "12px"
  xl: "16px"
  xxl: "24px"
  round: "9999px"

shadows:
  light:
    sm: "0 1px 2px rgba(0, 0, 0, 0.05)"
    md: "0 4px 6px rgba(0, 0, 0, 0.1)"
    lg: "0 10px 15px rgba(0, 0, 0, 0.1)"
    accent: "0 4px 12px rgba(246, 147, 60, 0.3)"

  dark:
    sm: "0 2px 4px rgba(0, 0, 0, 0.5)"
    md: "0 4px 8px rgba(0, 0, 0, 0.6)"
    lg: "0 10px 20px rgba(0, 0, 0, 0.7)"
    accent: "0 4px 12px rgba(246, 147, 60, 0.5)"

animation:
  fast: "150ms"
  normal: "300ms"
  slow: "500ms"

zIndex:
  base: 1
  content: 10
  navigation: 100
  modal: 1000
  tooltip: 2000

layout:
  headerHeight: "48px"
  sidebarLeft:
    width: "20%"
    minWidth: "240px"
    maxWidth: "320px"
  sidebarRight:
    width: "15%"
    minWidth: "200px"
    maxWidth: "280px"
  navHeight: "64px"
  contentMaxWidth: "1600px"

card:
  radius:
    default: "12px"
    cut: "4px"
  padding:
    sm: "12px"
    md: "16px"
    lg: "20px"
  gradient:
    start: "rgba(246, 147, 60, 0.15)"
    mid: "rgba(246, 147, 60, 0.08)"
    end: "rgba(246, 147, 60, 0.04)"

mobile:
  spacing:
    xs: "4px"
    sm: "8px"
    md: "12px"
    lg: "16px"
    xl: "24px"
    xxl: "32px"

  typography:
    sizes:
      xs: "11px"
      sm: "13px"
      md: "14px"
      lg: "16px"
      xl: "18px"
      xxl: "24px"

  layout:
    headerHeight: "56px"
    navHeight: "64px"

  card:
    padding:
      sm: "10px"
      md: "12px"
      lg: "14px"

touchTargets:
  default: "44px"
  sm: "40px"
  lg: "48px"
