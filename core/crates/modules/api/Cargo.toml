[package]
name = "systemprompt-core-api"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "HTTP API server and gateway for SystemPrompt OS"

[dependencies]
# Core runtime
tokio = { workspace = true }
tokio-stream = { workspace = true }
anyhow = { workspace = true }
async-trait = { workspace = true }

# CLI
clap = { workspace = true }

# HTTP/Web framework
axum = { workspace = true }
tower = { workspace = true }
tower-http = { workspace = true, features = ["normalize-path"] }
tower_governor = { workspace = true }
http = { workspace = true }
reqwest = { workspace = true }
futures-util = { workspace = true }

# MCP transport
rmcp = { workspace = true }

# Database
sqlx = { workspace = true }

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml = { workspace = true }
chrono = { workspace = true }
uuid = { workspace = true }
urlencoding = { workspace = true }
regex = { workspace = true }
indexmap = { workspace = true }
sha2 = { workspace = true }

# Error handling
thiserror = { workspace = true }

# Logging
tracing = { workspace = true }

# Configuration
dotenvy = { workspace = true }

# SystemPrompt crates
systemprompt-models = { path = "../../shared/models" }
systemprompt-identifiers = { path = "../../shared/identifiers" }
systemprompt-traits = { path = "../../shared/traits" }
systemprompt-core-system = { path = "../core" }
systemprompt-core-config = { path = "../config" }
systemprompt-core-users = { path = "../users" }
systemprompt-core-oauth = { path = "../oauth" }
systemprompt-core-logging = { path = "../log" }
systemprompt-core-agent = { path = "../agent" }
systemprompt-core-mcp = { path = "../mcp" }
systemprompt-core-blog = { path = "../blog" }
systemprompt-core-database = { path = "../database" }
systemprompt-core-scheduler = { path = "../scheduler" }

# API registry
inventory = { workspace = true }

# JWT
jsonwebtoken = { workspace = true }
once_cell = { workspace = true }

[lints]
workspace = true
