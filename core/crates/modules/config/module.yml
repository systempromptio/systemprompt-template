# Core Configuration Module Manifest
# Infrastructure module with database consolidation architecture

name: config
version: "1.1.0"
display_name: "System Configuration"
description: "Infrastructure module for centralized configuration management with main binary orchestration"
authors: ["systemprompt-os"]
license: "Apache-2.0"

# Installation weight (lower numbers install first)
# Range: -100 to 100 (Core foundation modules: negative, Application modules: positive)
weight: -99
category: core
dependencies: []

# Schema files with validation metadata
schemas:
  - file: "schema/modules.sql"
    table: "modules"
    required_columns:
      - "id"
      - "name"
      - "version"
      - "display_name"
      - "enabled"
      - "created_at"
      - "updated_at"
  
  - file: "schema/services.sql"
    table: "services"
    note: "LEAN architecture - only runtime state, config comes from services.yaml"
    required_columns:
      - "name"
      - "module_name"
      - "status"
      - "pid"
      - "port"
      - "created_at"
      - "updated_at"
  
  - file: "schema/variables.sql"
    table: "variables"
    required_columns:
      - "id"
      - "name"
      - "type"
      - "created_at"
      - "updated_at"

# Tables created by this module
tables_created:
  - "modules"
  - "services"
  - "variables"

# Seed files with validation metadata
seeds: []

# API configuration
api:
  enabled: true
  path_prefix: "/api/v1/config"
