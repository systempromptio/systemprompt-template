name: Code Style Check

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  style-check:
    name: Style Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          components: rustfmt, clippy
          override: true

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache cargo index
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-git-

      - name: Cache cargo build
        uses: actions/cache@v3
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-target-

      - name: Check code formatting
        run: |
          echo "🎨 Checking code formatting..."
          cargo fmt --all -- --check

      - name: Run Clippy linter
        run: |
          echo "🔍 Running clippy linter..."
          cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Run custom validators
        run: |
          echo "✨ Running custom style validators..."
          chmod +x ./tests/validator/validate.sh
          ./tests/validator/validate.sh

      - name: Style check summary
        if: success()
        run: |
          echo "✅ All style checks passed!"
          echo ""
          echo "Code follows SystemPrompt coding standards:"
          echo "  - Code formatting (rustfmt)"
          echo "  - Linting rules (clippy)"
          echo "  - Custom validators (no inline comments, debug statements, etc.)"
          echo ""
          echo "See tests/validator/coding-standards.md for details."

      - name: Style check failure
        if: failure()
        run: |
          echo "❌ Style checks failed!"
          echo ""
          echo "Please fix the issues above before merging."
          echo ""
          echo "Quick fixes:"
          echo "  - Format code: cargo fmt --all"
          echo "  - Fix lints: cargo clippy --fix --workspace"
          echo "  - Run all checks: just style-check"
          echo ""
          echo "See tests/validator/coding-standards.md for coding standards."
          exit 1
