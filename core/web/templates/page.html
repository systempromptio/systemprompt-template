<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- SEO Meta Tags -->
  <title>{{TITLE}} | tyingshoelaces</title>
  <meta name="description" content="{{DESCRIPTION}}" />
  <meta name="author" content="{{AUTHOR}}" />
  <meta name="keywords" content="{{KEYWORDS}}" />

  <!-- Open Graph -->
  <meta property="og:title" content="{{TITLE}}" />
  <meta property="og:description" content="{{DESCRIPTION}}" />
  <meta property="og:image" content="{{IMAGE}}" />
  <meta property="og:type" content="article" />

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />

  <!-- Styles -->
  <link rel="stylesheet" href="/blog.css" />

  <!-- Structured Data (JSON-LD) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "{{ARTICLE_TYPE}}",
    "headline": "{{TITLE}}",
    "description": "{{DESCRIPTION}}",
    "image": "{{IMAGE}}",
    "author": {
      "@type": "Person",
      "name": "{{AUTHOR}}"
    },
    "publisher": {
      "@type": "Organization",
      "name": "{{ORG_NAME}}",
      "logo": {
        "@type": "ImageObject",
        "url": "{{ORG_LOGO}}"
      }
    },
    "datePublished": "{{DATE_PUBLISHED}}",
    "dateModified": "{{DATE_MODIFIED}}",
    "mainEntityOfPage": {
      "@type": "WebPage",
      "@id": "{{ORG_URL}}/{{SLUG}}"
    },
    "inLanguage": "{{ARTICLE_LANGUAGE}}"
  }
  </script>
</head>
<body>
  <div class="blog-background"></div>
  <div class="blog-shape-left"></div>

  <header class="site-header">
    <nav class="site-nav">
      <a href="/" class="logo-link">
        <img src="/favicon.ico" alt="tyingshoelaces logo" class="logo" />
        <span class="site-name">tyingshoelaces</span>
      </a>
      <a href="/" class="chat-cta">
        <svg class="chat-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
        </svg>
        Chat with us
      </a>
    </nav>
  </header>

  <main class="blog-post">
    <article>
      <header class="post-header">
        <h1>{{TITLE}}</h1>
      </header>

      <div class="post-content">
        {{{CONTENT}}}
      </div>
    </article>
  </main>

  <footer>
    <div class="footer-content">
      {{{FOOTER_NAV}}}
    </div>
  </footer>
</body>
</html>
