steps:
  - script: 01-happy-path.sh
    label: Walk the full hook → allow → execute path
    narrative: >
      POSTs a PreToolUse hook for developer_agent calling
      mcp__systemprompt__systemprompt — the CLI-wrapper tool exposed by the
      systemprompt MCP server — sees governance return allow, then actually
      invokes the tool via the CLI with {command: "admin agents list"} so you
      watch the same request land in the real agent runtime. This is the
      Claude Code hook workflow end to end.
    outcome: >
      An allow response from /hooks/govern, a live agents listing returned by
      the systemprompt MCP server, and a matching row in governance_decisions
      tied to session demo-happy-path.
  - script: 02-refused-path.sh
    label: Deny a user-scope agent reaching for an admin MCP tool
    narrative: >
      Fires the same hook as associate_agent — a user-scope identity — against
      the admin-only mcp__systemprompt__list_agents tool. The scope_restriction
      rule fires at the governance layer, which is the backup line of defense
      behind tool mapping.
    outcome: >
      A deny response citing scope_restriction, plus the matching deny row in
      governance_decisions — proof that even if tool mapping is bypassed,
      governance still holds.
  - script: 03-audit-trail.sh
    label: Query the decisions table and break down cost by agent
    narrative: >
      Runs infra db query against governance_decisions to pull the last five
      decisions with agent, scope, policy, and reason, then calls analytics
      costs breakdown --by agent. This is the evidence you hand to a
      compliance reviewer.
    outcome: >
      A table showing the allow and deny records from the previous steps with
      policy names and reasons, plus per-agent cost totals.
  - script: 04-governance-happy.sh
    label: Allow a clean admin call and show every rule that fired
    narrative: >
      POSTs a PreToolUse hook for developer_agent calling Read with a plain
      file path, then dumps the evaluated_rules column. You see scope_check,
      secret_scan, and rate_limit each return PASS — not a black-box allow.
    outcome: >
      The API returns permissionDecision: allow and the audit row lists all
      three rules with PASS reasons.
  - script: 05-governance-denied.sh
    label: Deny a user-scope agent and a destructive tool in one run
    narrative: >
      Fires two hook calls as associate_agent: one reaches for an admin-only
      MCP tool, the other calls delete_agent. scope_check blocks the first;
      scope_check and blocklist both trigger on the second.
    outcome: >
      Two deny responses with distinct policy IDs, logged to
      governance_decisions so you can see the reason Claude Code would
      surface to the agent.
  - script: 06-secret-breach.sh
    label: Block an AWS key, a GitHub PAT, and a private key in tool input
    narrative: >
      Sends four PreToolUse hooks as admin-scope developer_agent: a Bash curl
      carrying AKIA..., a Write dropping ghp_... into .env, a Write piping a
      PEM key into id_rsa, and a clean Read as control. Secret detection
      overrides scope.
    outcome: >
      Three denies (secret_scan) and one allow, all attributed to an admin
      agent in the audit table — proof the safety net holds against
      prompt-injection exfiltration.
  - script: 07-rate-limiting.sh
    label: Exceed the rate-limit policy and watch governance deny
    narrative: >
      Shows the HTTP rate-limit config, then reads the governance rate_limit
      policy (requests_per_window / window_secs) and fires that many PreToolUse
      calls plus an overshoot from one fresh session_id against /hooks/govern.
      The sliding-window limiter trips inside the policy pipeline and starts
      returning deny.
    outcome: >
      A live allow vs deny tally for one session, followed by an audit query
      attributing every deny to policy=rate_limit with a RateLimitWindow
      reason — proof the limiter actually fires, not just that it's configured.
  - script: 08-hooks.sh
    label: List, validate, and fire a hook end-to-end
    narrative: >
      Lists every PreToolUse, PostToolUse, and lifecycle hook across installed
      plugins and validates the wiring, then POSTs a synthetic PostToolUse to
      /hooks/track — the exact wire path Claude Code uses to report a local
      hook fire — and reads the inserted row back out of plugin_usage_events.
    outcome: >
      A validated hook inventory plus a fresh plugin_usage_events row keyed on
      a one-shot session_id — proof the hook-tracking path is wired into the
      audit store, not just the manifest.
