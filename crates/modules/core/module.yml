name: core
version: 0.1.0
display_name: "Core"
type: infrastructure
description: Core infrastructure providing analytics, middleware, request context, and shared services

dependencies:
  - database
  - log
  - users
  - agent

api:
  enabled: true
  endpoints:
    - /api/v1/core/analytics/sessions
    - /api/v1/core/analytics/events
    - /api/v1/core/analytics/statistics

schemas:
  - file: "schema/functions.sql"
    table: ""
    required_columns: []
  - file: "schema/conversation_subjects.sql"
    table: "conversation_subjects"
    required_columns: []
  - file: "schema/endpoint_requests.sql"
    table: "endpoint_requests"
    required_columns: []

seeds: []

features:
  - Request context middleware
  - Analytics tracking (sessions, events, statistics)
  - Header extraction utilities
  - Broadcaster for SSE events
  - Update service for platform updates
  - Schema validation
